# RL Maskable PPO bootstrap smoke config
# Synthetic/transfer-only pretraining smoke run for environments without real KOSPI data.

env:
  initial_balance: 100_000_000
  commission_rate: 0.00003
  tick_size: 0.05
  tick_value: 250_000
  contract_multiplier: 250_000
  max_contracts: 1
  slippage: 0.0
  margin_rate: 0.15
  n_market_features: 25
  n_aux_features: 0
  n_position_features: 6

tft_aux:
  enabled: false
  model_path: models/futures/tft/tft_cls_best
  lookback: 60
  features: [prob_up_1m, prob_up_5m, prob_up_15m]
  market_open: "09:00"
  market_close: "15:45"

reward:
  w_profit: 10.0
  w_cost: 0.3
  w_risk: 0.0
  w_mtm: 0.0
  inaction_penalty: 0.0
  reward_scale: 100.0
  max_loss: -5_000_000
  loss_penalty_coeff: 2.0

mppo:
  learning_rate: 0.0001
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.03
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 128
  batch_size: 32
  n_epochs: 4
  total_timesteps: 100000
  policy_kwargs:
    net_arch:
      pi: [64, 64]
      vf: [64, 64]

dqn:
  learning_rate: 0.0001
  gamma: 0.99
  buffer_size: 10_000
  learning_starts: 500
  batch_size: 32
  target_update_interval: 500
  exploration_fraction: 0.1
  exploration_final_eps: 0.05
  total_timesteps: 100000

a2c:
  learning_rate: 0.0007
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 5
  total_timesteps: 100000

ppo:
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 128
  batch_size: 32
  n_epochs: 4
  total_timesteps: 100000

sac:
  learning_rate: 0.0003
  gamma: 0.99
  buffer_size: 10_000
  tau: 0.005
  ent_coef: auto
  batch_size: 32
  total_timesteps: 100000

ma_cross:
  short_window: 5
  long_window: 20

slippage_test_values: [0.00, 0.05]

data:
  source: clickhouse
  database: synthetic
  table: hybrid_bootstrap
  symbol: "BOOTSTRAP"
  train_ratio: 0.8
  min_bars_per_day: 100
  mirror_augmentation: false
  quality:
    enabled: true
    reject_duplicate_datetime: true
    require_monotonic_datetime: true
    max_zero_volume_ratio: 0.95
    max_zero_volume_price_move_ratio: 0.20

training:
  eval_freq: 1000
  checkpoint_freq: 10000
  tensorboard_log: "./results/rl/bootstrap_smoke/tensorboard/"
  save_dir: "./models/futures/rl/bootstrap_smoke/"

hierarchical:
  bars_per_step: 15
  high_level_timesteps: 100_000
  training_mode: sequential
  joint_timesteps: 100_000
  joint_update_ratio: 15
  risk_budgets:
    aggressive: 1.0
    neutral: 0.5
    defensive: 0.0
  high_level:
    learning_rate: 0.0003
    gamma: 0.99
    n_steps: 32
    batch_size: 16
    n_epochs: 4
    ent_coef: 0.05
  directional_bias:
    enabled: false
    mode: neutral
    strength: 0.3
    long_threshold: 0.6
    short_threshold: 0.6
    adaptive: false
    regime_signals:
      use_trend: true
      use_volatility: true
      lookback_bars: 60

position_sizing:
  enabled: true
  fraction: 0.5
  min_trades: 10
  min_scale: 0.2
  max_scale: 1.0
  default_win_rate: 0.45
  default_wl_ratio: 1.83

paper:
  symbol: ""
  warmup_bars: 200
  force_close_time: "15:35"
  telegram_notify: false
  log_dir: "./results/rl/bootstrap_smoke/paper/"

drift_monitoring:
  enabled: false
  kl_threshold: 0.1
  psi_threshold: 0.2
  confidence_shift_threshold: 0.15
  sharpe_degradation_threshold: -0.5
  win_rate_degradation_threshold: -0.1
  reference_window_days: 30
  alert_cooldown_minutes: 60
  log_to_clickhouse: false
  expose_prometheus: false
