# Cross-market transfer config for adapting external futures patterns to KOSPI-like data

inputs:
  source_paths: []
  allow_sample_fallback: true

adapter:
  timezone: Asia/Seoul
  target_market_open: "09:00"
  bars_per_day: 390
  target_start_price: 350.0
  volatility_scale: 0.85
  noise_scale: 0.0005
  volume_scale: 1.0

output:
  output_dir: artifacts/datasets/transfer
  save_dataset: true
  manifest_version: 1
  charting:
    enabled: true
    output_dirname: charts
    file_format: png
    create_overview: true
    partition_when_days_gte: 31
    create_monthly_charts: true
    create_yearly_charts: true
    overview_resample_rule: 15min
    monthly_resample_rule: 15min
    yearly_resample_rule: 1D
    moving_averages: [20, 60]
    include_volume: true
    style: charles
    dpi: 144
    figscale: 1.2
    figratio: [16, 9]
    warn_too_much_data: 100000
