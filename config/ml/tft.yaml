tft:
  # 입력 차원
  n_features: 25                  # RLFeatureCalculator 출력
  n_time_features: 3              # hour_norm, sin_progress, cos_progress
  total_input_dim: 28             # 25 + 3

  # 아키텍처
  hidden_size: 64
  lstm_layers: 2
  n_heads: 4
  dropout: 0.1
  grn_hidden: 32

  # 시퀀스
  lookback: 60                    # 과거 60분 참조
  horizons: [1, 5, 15]            # 예측 지평 (분)

  # 모드: "regression" (수익률 예측) | "classification" (방향 분류)
  mode: regression
  label_smoothing: 0.05            # classification용 노이즈 타겟 보정
  classification_threshold: 0.0    # ret > threshold → UP(1)

tft_training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 50
  patience: 10
  grad_clip: 1.0
  eval_interval: 5                # 에폭 단위 온라인 평가
  warmup_steps: 500

data:
  source: clickhouse
  database: kospi
  table: kospi200f_1m
  symbol: "101S6000"
  train_ratio: 0.8
  min_bars_per_day: 300
  mirror_augmentation: false      # TFT는 가격 미러링 불필요

training:
  save_dir: ./models/futures/tft/
