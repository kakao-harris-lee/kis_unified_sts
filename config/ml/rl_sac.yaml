# RL SAC (Soft Actor-Critic) - KOSPI200 선물
# Off-policy 알고리즘. Replay buffer로 14개월 데이터 효율적 재사용.
# 연속 행동 공간 사용 → ContinuousActionWrapper로 이산 행동 변환.

# === Gymnasium 환경 (rl_mppo.yaml과 동일) ===
env:
  initial_balance: 100_000_000
  commission_rate: 0.00003
  tick_size: 0.05
  tick_value: 250_000
  contract_multiplier: 250_000
  max_contracts: 1
  slippage: 0.0
  margin_rate: 0.15
  n_market_features: 25
  n_position_features: 6
  market_open: "09:00"
  market_close: "15:45"

# === 보상함수 가중치 (Phase 4와 동일) ===
reward:
  w_profit: 10.0
  w_cost: 0.3
  w_risk: 0.0
  w_mtm: 0.0
  inaction_penalty: 0.0
  reward_scale: 100.0
  max_loss: -5_000_000
  loss_penalty_coeff: 2.0

# === SAC 하이퍼파라미터 ===
sac:
  learning_rate: 0.0003            # SAC default (PPO보다 3x)
  gamma: 0.999                     # MPPO와 동일 (장 마감 반영)
  buffer_size: 100_000             # Replay buffer 크기
  learning_starts: 5_000           # 학습 시작 전 수집 스텝
  batch_size: 256                  # Off-policy이므로 큰 배치 사용
  tau: 0.005                       # Target network soft update rate
  ent_coef: "auto"                 # 자동 엔트로피 계수 조정
  target_entropy: "auto"           # 자동 목표 엔트로피
  train_freq: 1                    # 매 스텝마다 학습
  gradient_steps: 1                # 스텝당 gradient update 횟수
  total_timesteps: 3_000_000       # Off-policy → 더 적은 타임스텝으로도 수렴
  policy_kwargs:
    net_arch: [256, 256]           # Actor/Critic 네트워크 아키텍처

# === 연속 행동 공간 설정 ===
continuous_action:
  entry_threshold: 0.3             # |action| > 0.3 → 진입
  exit_threshold: 0.1              # |action| > 0.1 → 청산 (포지션 있을 때)

# === 비교 모델 (MPPO baseline) ===
mppo:
  learning_rate: 0.0001
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  total_timesteps: 5_000_000
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

ma_cross:
  short_window: 5
  long_window: 20

# === 슬리피지 실험 ===
slippage_test_values: [0.00, 0.05, 0.10, 0.15, 0.20]

# === 데이터 (rl_mppo.yaml과 동일) ===
data:
  source: clickhouse
  database: kospi
  table: kospi200f_1m
  symbol: "101S6000"
  train_ratio: 0.8
  min_bars_per_day: 300
  mirror_augmentation: true

# === 학습 관리 ===
training:
  eval_freq: 10_000
  checkpoint_freq: 50_000
  tensorboard_log: "./results/rl/tensorboard/"
  save_dir: "./models/futures/rl/"

# === Paper Trading ===
paper:
  symbol: ""                      # 비우면 mini 근월물 자동 감지
  warmup_bars: 200
  force_close_time: "15:35"
  telegram_notify: true
  log_dir: "./results/rl/paper/"
