# RL Maskable PPO - KOSPI200 선물
# 모든 RL 학습/환경/평가 파라미터 정의

# === Gymnasium 환경 ===
env:
  initial_balance: 100_000_000   # 1억 (KOSPI200 선물 1계약 증거금 ~6천만)
  commission_rate: 0.00003       # CostConfig.futures() 와 동일
  tick_size: 0.05
  tick_value: 250_000
  contract_multiplier: 250_000
  max_contracts: 1
  slippage: 0.0                  # 학습 시 기본값, 평가 시 오버라이드
  margin_rate: 0.15              # 증거금률 (선물 위탁증거금 ~15%)

  # 상태 공간
  n_market_features: 25          # 기술적 지표 수
  n_position_features: 3         # position, contracts, unrealized_pnl

  # 장 운영시간 (KST)
  market_open: "09:00"
  market_close: "15:45"

# === 보상함수 가중치 (논문 식 2~5 + mark-to-market) ===
reward:
  w_profit: 1.0
  w_cost: 0.1                      # 수수료 페널티 최소화 (탐색 유도)
  w_risk: 0.1
  w_mtm: 1.0                       # mark-to-market 보상 (핵심 학습 시그널)
  inaction_penalty: 0.001           # FLAT 페널티 (~0.4/에피소드, 거래 강제)
  reward_scale: 100.0               # 보상 스케일 (10M balance → 실질 ±1 범위)
  max_loss: -5_000_000
  loss_penalty_coeff: 2.0

# === M-PPO 하이퍼파라미터 ===
mppo:
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.1                     # 높은 엔트로피로 탐색 강화 (0.01→0.1)
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  total_timesteps: 5_000_000
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

# === 비교 모델 ===
dqn:
  learning_rate: 0.0001
  gamma: 0.99
  buffer_size: 100_000
  learning_starts: 10_000
  batch_size: 64
  target_update_interval: 1000
  exploration_fraction: 0.1
  exploration_final_eps: 0.05
  total_timesteps: 5_000_000

a2c:
  learning_rate: 0.0007
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 5
  total_timesteps: 5_000_000

ppo:
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  total_timesteps: 5_000_000

ma_cross:
  short_window: 5
  long_window: 20

# === 슬리피지 실험 ===
slippage_test_values: [0.00, 0.05, 0.10, 0.15, 0.20]

# === 데이터 ===
data:
  source: clickhouse
  database: kospi
  table: kospi200f_1m
  symbol: "101S6000"                # KOSPI200 선물 (연결선물)
  train_ratio: 0.8                  # 80% train, 20% test
  min_bars_per_day: 300             # 최소 바 수 (불완전 일자 제외)

# === 학습 관리 ===
training:
  eval_freq: 10_000
  checkpoint_freq: 50_000
  tensorboard_log: "./results/rl/tensorboard/"
  save_dir: "./models/futures/rl/"
