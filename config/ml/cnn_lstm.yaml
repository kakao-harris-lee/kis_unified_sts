# CNN-LSTM Model Configuration (Futures)

model:
  # 모델 타입
  type: cnn-lstm  # "lstm" or "cnn-lstm"

  # 아키텍처
  input_dim: 10
  hidden_dim: 64
  num_layers: 2
  num_classes: 3  # Hold, Up, Down
  dropout: 0.2

  # CNN 설정 (cnn-lstm only)
  cnn_channels: [32, 64]
  kernel_size: 3

  # 시퀀스 설정
  seq_len: 60  # 60 bars (1-minute)

training:
  # 라벨 생성
  horizon: 5  # 5분 후 예측
  threshold: 0.001  # ±0.1% 변화 기준

  # 학습 설정
  epochs: 100
  batch_size: 64
  learning_rate: 0.001

  # Early Stopping
  early_stopping_patience: 20

  # Scheduler
  scheduler_patience: 10
  scheduler_factor: 0.5

features:
  # 10개 입력 피처 (순서 중요!)
  columns:
    - returns
    - ma_ratio_5
    - ma_ratio_10
    - ma_ratio_20
    - rsi
    - bb_position
    - volume_ratio
    - volatility
    - hl_range
    - candle_body

  # 지표 설정
  rsi_period: 14
  bb_period: 20
  bb_std: 2.0
  volatility_period: 20

inference:
  # 추론 설정
  device: auto  # "auto", "cuda", "mps", "cpu"
  lookback_window: 60

  # 모델 경로
  model_path: models/futures/trading_lstm.pth

  # 앙상블 (multi-horizon)
  ensemble:
    enabled: true
    horizons: [1, 3, 5, 10]
    model_dir: models/futures/ensemble
