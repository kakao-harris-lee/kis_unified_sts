# RL Maskable PPO - clean-slice experiment (2026-02-09 ~ 2026-02-26)

env:
  initial_balance: 100_000_000
  commission_rate: 0.00003
  tick_size: 0.05
  tick_value: 250_000
  contract_multiplier: 250_000
  max_contracts: 1
  slippage: 0.0
  margin_rate: 0.15
  n_market_features: 25
  n_aux_features: 0
  n_position_features: 6

tft_aux:
  enabled: false
  model_path: models/futures/tft/tft_cls_best
  lookback: 60
  features: [prob_up_1m, prob_up_5m, prob_up_15m]
  market_open: "09:00"
  market_close: "15:45"

reward:
  w_profit: 10.0
  w_cost: 0.3
  w_risk: 0.0
  w_mtm: 0.0
  inaction_penalty: 0.0
  reward_scale: 100.0
  max_loss: -5_000_000
  loss_penalty_coeff: 2.0

mppo:
  learning_rate: 0.0001
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  total_timesteps: 600_000
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

dqn:
  learning_rate: 0.0001
  gamma: 0.99
  buffer_size: 100_000
  learning_starts: 10_000
  batch_size: 64
  target_update_interval: 1000
  exploration_fraction: 0.1
  exploration_final_eps: 0.05
  total_timesteps: 1_000_000

a2c:
  learning_rate: 0.0007
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 5
  total_timesteps: 1_000_000

ppo:
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  total_timesteps: 1_000_000

ma_cross:
  short_window: 5
  long_window: 20

slippage_test_values: [0.00, 0.05, 0.10, 0.15, 0.20]

data:
  source: clickhouse
  database: kospi
  table: kospi200f_1m
  symbol: "101S6000"
  start_date: "2026-02-09 00:00:00"
  end_date: "2026-02-26 23:59:59"
  train_ratio: 0.8
  min_bars_per_day: 300
  mirror_augmentation: true
  allow_sample_fallback: false
  quality:
    enabled: true
    max_zero_volume_ratio: 0.95
    max_zero_volume_price_move_ratio: 0.20

training:
  eval_freq: 10_000
  checkpoint_freq: 50_000
  tensorboard_log: "./results/rl/tensorboard/clean_20260226/"
  save_dir: "./models/futures/rl/clean_20260226/"

hierarchical:
  bars_per_step: 15
  high_level_timesteps: 500_000
  risk_budgets:
    aggressive: 1.0
    neutral: 0.5
    defensive: 0.0
  high_level:
    learning_rate: 0.0003
    gamma: 0.99
    n_steps: 128
    batch_size: 32
    n_epochs: 10
    ent_coef: 0.05

position_sizing:
  enabled: true
  fraction: 0.5
  min_trades: 10
  min_scale: 0.2
  max_scale: 1.0
  default_win_rate: 0.45
  default_wl_ratio: 1.83

paper:
  symbol: ""
  warmup_bars: 200
  force_close_time: "15:35"
  telegram_notify: true
  log_dir: "./results/rl/paper/"
