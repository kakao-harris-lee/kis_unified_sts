# Hybrid learning data pipeline configuration
# Phase 0 baseline fixation + future dataset pipeline phases.

phase0:
  baseline:
    source_config: ml/rl_mppo.yaml
    output_dir: artifacts/rl/hybrid/baseline
    experiment_name: hybrid_learning_pipeline_baseline
    manifest_version: 1
    save_source_config_copy: true

phase1:
  regime_catalog:
    source_config: ml/rl_mppo.yaml
    output_dir: artifacts/datasets/regime_catalog
    allow_sample_fallback: true
    save_labeled_bars: true
    save_daily_summary: true
    charting:
      enabled: true
      output_dirname: charts
      file_format: png
      create_overview: true
      partition_when_days_gte: 31
      create_monthly_charts: true
      create_yearly_charts: true
      overview_resample_rule: 30min
      monthly_resample_rule: 30min
      yearly_resample_rule: 1D
      moving_averages: [20, 60]
      include_volume: true
      style: charles
      dpi: 144
      figscale: 1.2
      figratio: [16, 9]
      warn_too_much_data: 100000
    trend_window: 30
    short_vol_window: 20
    long_vol_window: 120
    morning_window: 30
    bull_return_threshold: 0.0025
    bear_return_threshold: -0.0025
    high_vol_ratio_threshold: 1.35
    shock_vol_ratio_threshold: 2.0
    low_vol_ratio_threshold: 0.75
    crash_return_threshold: -0.015
    rebound_return_threshold: 0.012
    melt_up_return_threshold: 0.015
    gap_down_threshold: -0.006
    gap_up_threshold: 0.006
    squeeze_range_threshold: 0.004
    opening_drive_return_threshold: 0.004
    opening_drive_volume_ratio_threshold: 1.2

phase2:
  synthetic_dataset:
    source_config: ml/synthetic_data.yaml
    output_dir: artifacts/datasets/synthetic
    save_dataset: true
    save_daily_summary: true

phase5:
  hybrid_dataset:
    source_config: ml/hybrid_dataset.yaml
    output_dir: artifacts/datasets/hybrid

phase3:
  calibration:
    real_summary: artifacts/datasets/regime_catalog/summary.json
    synthetic_summary: artifacts/datasets/synthetic/summary.json
    output_dir: artifacts/datasets/calibration

phase4:
  transfer_dataset:
    source_config: ml/cross_market_transfer.yaml
    output_dir: artifacts/datasets/transfer
