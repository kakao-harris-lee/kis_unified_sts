# Daily candle quality controls.
#
# These guards protect daily-indicator and daily-strategy inputs from duplicate
# Parquet rows and placeholder historical candles.

# Fetch extra raw rows before quality filtering so enough usable candles remain.
fetch_multiplier: 3

# Drop consecutive rows when the full OHLCV tuple repeats this many times.
# This targets placeholder candles such as synthetic seeded history.
repeated_ohlcv_run_min: 5

# Drop rows with zero/negative volume before indicator calculation.
reject_nonpositive_volume: true

# Futures-minute coverage gate (post-backfill alert on shortfall).
#
# After the daily futures-minute backfill, the active mini front-month is
# checked for >= the Task-3 completeness threshold of one-minute bars on each
# closed trading day in the window.  On shortfall an operator Telegram alert is
# emitted so a silent ~70%-loss never recurs.  READ-ONLY on parquet.
futures_minute_coverage:
  # Trading-day window to verify (calendar-aware; non-trading days ignored).
  lookback_days: 5
  # Minimum bars to call a closed day "covered".  Empty => reuse the Task-3
  # parquet_backfill completeness threshold (MINUTE_COMPLETENESS_MIN_ROWS),
  # the single source of truth for "expected bars".  Env override:
  # FUTURES_MINUTE_COVERAGE_MIN_ROWS.
  min_rows: null
  # Lower floor below which a short day is treated as a legitimate early-close /
  # half-day rather than a shortfall.  Empty => quarter of the full session.
  half_day_min_rows: null
  # Front-month product to verify ("mini" or "kospi200").
  product: "mini"
  notify_on_shortfall: true
