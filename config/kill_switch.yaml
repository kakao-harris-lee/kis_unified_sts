# Kill Switch Configuration
# Spec: docs/plans/2026-04-20-futures-paradigm-phase4-execution.md §6.1
# Phase 0.2/0.4 update: docs/plans/2026-05-03-llm-primary-rl-minimization.md §4
# Loaded by: services/kill_switch/main.py via KillSwitchConfig.from_yaml()
#
# Provider-backed conditions data sources (Phase 0.4):
#   api_error_rate_5min      → Redis key: kill_switch:metrics:api_error_rate_5min
#                              Written by: shared/kis/client.py (TODO Phase 3 Track A)
#   news_pipeline_lag_seconds → Redis stream: stream:news.raw (last message timestamp)
#                               Written by: news collector (services/)
#   clickhouse_insert_fail_rate → Redis key: kill_switch:metrics:clickhouse_insert_fail_rate
#                                 Written by: services/trading/position_tracker.py
#                                 (TODO Phase 3 Track A)
# Until TODO items are wired, providers return 0.0 (never trigger).
#
# force_flatten signalling (Phase 0.2):
#   On trip, writes Redis key: kill_switch:force_flatten:requested (TTL 300s)
#   and appends to stream: kill_switch:events (TTL 24h).
#   TradingOrchestrator consumer follow-up is a deferred task.

kill_switch:
  enabled: true
  check_interval_seconds: 30
  force_flat_on_trigger: true
  sentinel_path: "/var/run/kis_kill_switch.tripped"
  conditions:
    daily_loss:
      enabled: true
      limit_pct: 0.03            # daily realised+unrealised loss / equity
    weekly_loss:
      enabled: true
      limit_pct: 0.07
    consecutive_losses:
      enabled: true
      threshold: 6
    api_error_rate_5min:
      enabled: true
      threshold: 0.2             # 20% of recent KIS calls erroring (fraction 0–1)
    news_pipeline_lag_seconds:
      enabled: true
      threshold: 1800            # 30 minutes — conservative default per plan §4 Phase 0.4
      # Redis stream key inspected for lag computation. Must match the news
      # collector's output stream (canonical: config/news_sources.yaml::redis_stream).
      stream_key: "stream:news.raw"
    clickhouse_insert_fail_rate:
      enabled: true
      threshold: 0.1             # 10% of inserts failing in 5-min window (fraction 0–1)
