# Track A — 중장기 코어 포트폴리오 수동 원장 (Phase 5A).
#
# Source: docs/통합_투자_시스템_전략_설계서.md §2 (섹터 배분 35/35/15/15,
# 편입/편출 규칙, Kill Criteria) / docs/plans/2026-07-02-unified-investment-
# system-roadmap.md §5.3·§5.5. Loaded by
# shared/portfolio/core_holdings.py::CoreHoldings.
#
# 트랙 A는 수동 트랙이다 — 이 파일은 기록/표시/알림에만 쓰이며, 어떤 코드도
# 이 파일로부터 자동 주문을 발행하지 않는다. 종목 등록/수량 변경은 operator가
# 이 파일을 직접 편집한다 (CLI는 이 파일을 재기록하지 않는다 — 주석 보존).
#
# 수동 평가(last_valuation)는 `sts portfolio value <symbol> <price>`가
# 사이드카 파일 core_holdings_valuations.yaml 에 기록하며, 로더가 병합한다.
# 사이드카 값이 이 파일의 inline last_valuation 보다 우선한다.

# --- 섹터 배분 프레임 (설계서 §2.1 — 코어 내 목표 비중, 합계 1.0)
sectors:
  defense:
    label: "방산"
    target_weight: 0.35 # 수주잔고 확정형 — 앵커(안정 성장)
  semiconductor_equipment:
    label: "반도체 장비"
    target_weight: 0.35 # CAPEX 사이클 연동 — 사이클 알파
  robotics:
    label: "로보틱스"
    target_weight: 0.15 # 기대 선반영형 — 성장 옵션
  cash:
    label: "현금 버퍼"
    target_weight: 0.15 # 리밸런싱 재원

# --- 리밸런싱 규칙 (설계서 §2.3)
rebalancing:
  drift_threshold_pct: 0.10 # 섹터 비중 목표 대비 ±10%p 이탈 시 수시 리밸런싱
  single_holding_max: 0.25 # 단일 종목이 코어의 25% 초과 시 수시 리밸런싱

# --- 현금 버퍼 실잔액 (KRW). 트랙 A equity = Σ(shares×평가가) + cash_krw.
# 0이고 holdings가 비어 있으면 트랙 A는 미프로비저닝(equity 미발행) 상태.
cash_krw: 0

# --- 보유 종목 (현재 비어 있음 — 스키마는 아래 주석 참조).
# 편입 기준 (설계서 §2.2, 전부 충족 시):
#   1. thesis: 투자 논거 1문장 기술 가능
#   2. kill_criteria: 논거 무효화 조건 사전 명시 (비어 있으면 로더가 경고)
#   3. 분할 매수 계획 (최소 3회 분할, 1회 매수는 목표 비중의 40% 이하)
#
# holdings:
#   - symbol: "012450"
#     name: "한화에어로스페이스"
#     sector: defense                     # sectors 키 중 하나
#     thesis: "수주잔고 확정형 — 폴란드 2차 실행분 매출 인식 구간"
#     kill_criteria:
#       - "수주잔고 분기 연속 2회 감소"
#       - "지상방산 수출 계약 취소/축소"
#     shares: 0                           # 보유 수량 (operator 수동 관리)
#     avg_price: 0                        # 평균 단가 (KRW)
#     last_valuation: { date: null, price: null } # 수동 평가 (CLI로 갱신)
holdings: []

# --- 후보 종목 (동일 스키마, shares/avg_price/last_valuation 없이)
