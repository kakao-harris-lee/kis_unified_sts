# Shadow Loggers flush configuration
#
# Controls the TradingOrchestrator background task that periodically drains the
# in-memory buffer of shared.strategy.llm_veto_logger.
#
# The logger buffers veto events in a bounded deque (maxlen=10_000). External
# archive persistence is disabled until a RuntimeLedger/Parquet target is added.

shadow_loggers:
  # How often (seconds) to drain the in-memory buffer.
  flush_interval_seconds: 60.0

  # When true, perform a final drain in TradingOrchestrator.stop().
  final_flush_on_stop: true
