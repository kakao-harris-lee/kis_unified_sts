    # -------------------------------------------------------------------------
    # Tier1 (M1 WS3): all indicators below are computed by the canonical
    # indicator engine (shared/indicators/engine). As of the TA-Lib
    # consolidation (#576~#590) + the 2026-07-06 alignment, every id here is in
    # default_engine().supported_ids():
    #   * williams_r/cci/trix/obv → TALibBackend (WILLR/CCI/TRIX/OBV).
    #   * mfi/rvol/volume_acceleration → TALibBackend (mfi) / NumpyBackend.
    #   * ichimoku → NumpyBackend (_ichimoku, current-bar spans).
    # The SoT guardrail test (tests/unit/strategy_builder/test_catalog_registry_sot.py)
    # enforces that every runtime_supported id below is engine-computable.
    # -------------------------------------------------------------------------

    - id: williams_r
      name: Williams %R
      name_ko: 윌리엄스 %R
      category: oscillator
      description: >-
        Williams %R momentum oscillator (range -100..0; < -80 oversold, > -20
        overbought). Computed by the indicator engine (TA-Lib WILLR).
      params:
        - name: period
          type: number
          default: 14
          min: 1
          max: 100
      outputs:
        - id: value
          name: Value
      default_output: value
      implemented: true
      backtest_supported: true
      runtime_supported: true

    - id: cci
      name: CCI
      name_ko: CCI
      category: oscillator
      description: >-
        Commodity Channel Index over typical price. Computed by the indicator
        engine (TA-Lib CCI).
      params:
        - name: period
          type: number
          default: 9
          min: 1
          max: 100
      outputs:
        - id: value
          name: Value
      default_output: value
      implemented: true
      backtest_supported: true
      runtime_supported: true

    - id: trix
      name: TRIX
      name_ko: TRIX
      category: oscillator
      description: >-
        Triple-smoothed EMA rate-of-change oscillator with a signal line.
        Computed by the indicator engine (TA-Lib TRIX + EMA signal); emitted as
        flat keys trix / trix_signal.
      params:
        - name: n
          type: number
          default: 12
          min: 1
          max: 100
        - name: signal
