      builder_state:
        metadata:
          id: vwap_reclaim
          name: VWAP 회복
          description: 종가가 VWAP을 회복하며 단기 모멘텀이 양수일 때 매수
          category: intraday
          tags: [vwap, reclaim, momentum]
