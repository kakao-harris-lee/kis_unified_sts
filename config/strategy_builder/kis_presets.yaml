strategy_builder_kis:
  presets:
    - id: golden_cross
      name: 골든크로스
      description: 단기 MA가 장기 MA를 상향 돌파 시 매수
      category: 추세추종
      params:
        - name: short_period
          label: 단기 MA
          min: 3
          max: 20
          default: 5
          step: 1
        - name: long_period
          label: 장기 MA
          min: 20
          max: 120
          default: 20
          step: 5
      builder_state:
        metadata:
          id: golden_cross
          name: 골든크로스
          description: 단기 MA가 장기 MA를 상향 돌파 시 매수
          category: trend
          tags: [ma, crossover, trend]
          author: KIS
        indicators:
          - id: sma_1
            indicatorId: sma
            alias: sma_fast
            params: {period: 5}
            output: value
          - id: sma_2
            indicatorId: sma
            alias: sma_slow
            params: {period: 20}
            output: value
        entry:
          logic: AND
          conditions:
            - id: entry_1
              left: {type: indicator, indicatorAlias: sma_fast, indicatorOutput: value}
              operator: cross_above
              right: {type: indicator, indicatorAlias: sma_slow, indicatorOutput: value}
        exit:
          logic: AND
          conditions:
            - id: exit_1
              left: {type: indicator, indicatorAlias: sma_fast, indicatorOutput: value}
              operator: cross_below
              right: {type: indicator, indicatorAlias: sma_slow, indicatorOutput: value}
        risk:
          stopLoss: {enabled: true, percent: 5}
          takeProfit: {enabled: false, percent: 10}
          trailingStop: {enabled: false, percent: 3}

    - id: momentum
      name: 모멘텀
      description: N일 수익률 기준 매수/매도
      category: 추세추종
      params:
        - name: lookback_days
          label: 수익률 기간
          min: 20
          max: 120
          default: 60
          step: 10
        - name: buy_threshold
          label: 매수 기준(%)
          min: 10
          max: 50
          default: 30
          step: 5
        - name: sell_threshold
          label: 매도 기준(%)
          min: -50
          max: -5
          default: -20
          step: 5
      builder_state:
        metadata:
          id: momentum
          name: 모멘텀
          description: N일 수익률 기준 매수/매도
          category: momentum
          tags: [momentum, rate_of_change]
          author: KIS
        indicators:
          - id: roc_1
            indicatorId: roc
            alias: roc_1
            params: {period: 60}
            output: value
        entry:
          logic: AND
          conditions:
            - id: entry_1
              left: {type: indicator, indicatorAlias: roc_1, indicatorOutput: value}
              operator: greater_than
              right: {type: value, value: 30}
        exit:
          logic: OR
          conditions:
            - id: exit_1
              left: {type: indicator, indicatorAlias: roc_1, indicatorOutput: value}
              operator: less_than
              right: {type: value, value: -20}
        risk:
          stopLoss: {enabled: true, percent: 5}
          takeProfit: {enabled: false, percent: 10}
          trailingStop: {enabled: false, percent: 3}

    - id: trend_filter
      name: 추세 필터
      description: MA 위/아래 추세 방향 매매
      category: 추세추종
      params:
        - name: ma_period
          label: MA 기간
          min: 20
          max: 120
          default: 60
          step: 10
      builder_state:
        metadata:
          id: trend_filter
          name: 추세 필터
          description: MA 위/아래 추세 방향 매매
          category: trend
          tags: [trend, ma, filter]
          author: KIS
        indicators:
          - id: sma_1
            indicatorId: sma
            alias: sma_1
            params: {period: 60}
            output: value
          - id: chg_1
            indicatorId: change
            alias: chg_1
            params: {}
            output: value
        entry:
          logic: AND
          conditions:
            - id: entry_1
              left: {type: price, priceField: close}
              operator: greater_than
              right: {type: indicator, indicatorAlias: sma_1, indicatorOutput: value}
            - id: entry_2
              left: {type: indicator, indicatorAlias: chg_1, indicatorOutput: value}
              operator: greater_than
              right: {type: value, value: 0}
        exit:
          logic: AND
          conditions:
            - id: exit_1
              left: {type: price, priceField: close}
              operator: less_than
              right: {type: indicator, indicatorAlias: sma_1, indicatorOutput: value}
            - id: exit_2
              left: {type: indicator, indicatorAlias: chg_1, indicatorOutput: value}
              operator: less_than
              right: {type: value, value: 0}
        risk:
          stopLoss: {enabled: true, percent: 5}
          takeProfit: {enabled: false, percent: 10}
          trailingStop: {enabled: false, percent: 3}

    - id: week52_high
      name: 52주 신고가
      description: 52주 최고가 돌파 시 매수
      category: 돌파매매
      params:
        - name: breakout_margin
          label: 돌파 마진(%)
          min: 0
          max: 5
          default: 0
          step: 0.5
      builder_state:
        metadata:
          id: week52_high
          name: 52주 신고가
          description: 52주 최고가 돌파 시 매수
          category: breakout
          tags: [52week, high, breakout]
          author: KIS
        indicators:
          - id: maximum_1
            indicatorId: maximum
            alias: high_52w
            params: {period: 252}
            output: value
          - id: breakout_margin_1
            indicatorId: breakout_margin
            alias: breakout_margin_1
            params: {period: 252}
            output: value
        entry:
          logic: AND
          conditions:
            - id: entry_1
              left: {type: price, priceField: close}
              operator: greater_than
              right: {type: indicator, indicatorAlias: high_52w, indicatorOutput: value}
            - id: entry_2
              left: {type: indicator, indicatorAlias: breakout_margin_1, indicatorOutput: value}
              operator: greater_than
              right: {type: value, value: 0}
        exit:
          logic: OR
          conditions:
            - id: exit_1
              left: {type: price, priceField: close}
              operator: less_than
              right: {type: indicator, indicatorAlias: high_52w, indicatorOutput: value}
            - id: exit_2
              left: {type: indicator, indicatorAlias: breakout_margin_1, indicatorOutput: value}
              operator: less_than
              right: {type: value, value: 0}
        risk:
          stopLoss: {enabled: true, percent: 5}
          takeProfit: {enabled: true, percent: 15}
          trailingStop: {enabled: false, percent: 3}

    - id: consecutive
      name: 연속 상승/하락
      description: N일 연속 상승 시 매수
