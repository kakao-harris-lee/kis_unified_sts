              left: {type: price, priceField: close}
              operator: less_than
              right: {type: indicator, indicatorAlias: bb_20, indicatorOutput: lower}
            - id: entry_2
              left: {type: indicator, indicatorAlias: rsi_14, indicatorOutput: value}
              operator: less_than
              right: {type: value, value: 35}
