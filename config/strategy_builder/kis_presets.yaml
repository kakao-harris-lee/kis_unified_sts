        indicators:
          - id: vwap_1
            indicatorId: vwap
            alias: vwap_1
            params: {}
            output: value
          - id: chg_1
            indicatorId: change
            alias: chg_1
            params: {}
            output: value
        entry:
          logic: AND
          conditions:
            - id: entry_1
