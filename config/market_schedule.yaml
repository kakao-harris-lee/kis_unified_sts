# 한국 시장 스케줄 설정
# 거래 시간, 공휴일, 특별 거래일 관리

market_schedule:
  # 주식 거래 시간
  stock:
    # 정규 거래
    regular:
      open: "09:00"
      close: "15:30"
    # 시간외 거래 (선택)
    extended:
      pre_market_open: "08:30"
      pre_market_close: "08:40"
      after_market_open: "15:40"
      after_market_close: "16:00"
    # 거래 불가 시간대 (점심 등 - 한국은 없음)
    breaks: []

  # 선물 거래 시간
  futures:
    regular:
      # 08:45 정규장 반영은 정책 게이트 통과 후 변경한다.
      # docs/runbooks/market-structure-policy.md의 Futures 08:45 Regular Session Gate 참조.
      open: "09:00"
      close: "15:45"
    # 야간 거래 (KOSPI200 선물 야간세션 18:00-05:00)
    # Phase 5 정책: 명시적으로 비활성. 활성화하려면 enabled를 true로 바꾸고
    # docs/runbooks/market-structure-policy.md의 Futures Night Session Gate를
    # 다시 검토할 것. shared/execution/executor.py가 야간세션 시각에 주문이
    # 들어오면 enabled=false인 경우 fail-closed로 거부한다.
    night:
      enabled: false
      open: "18:00"
      close: "05:00"  # 다음날

  # 거래 시작 전 준비 시간 (분)
  pre_market_buffer: 5

  # 거래 종료 전 정리 시간 (분)
  pre_close_buffer: 5

