# Theme Discovery Producer Configuration
# Converts the screener universe snapshot into paper-safe theme targets.

redis_keys:
  universe: "${UNIVERSE_LATEST_KEY:system:universe:latest}"
  themes_latest: "${THEMES_LATEST_KEY:system:themes:latest}"
  targets_latest: "${THEME_TARGETS_LATEST_KEY:system:theme_targets:latest}"
  targets_stream: "${THEME_TARGETS_STREAM:system:theme_targets}"

interval_seconds: 15
ttl_seconds: 86400
top_n: 20
max_universe_age_seconds: 1800

thresholds:
  minimum_screener_score: 0.0
  theme_breadth_full_count: 3
  keyword_catalyst_score: 0.85
  default_intraday_persistence: 0.6
  default_freshness_score: 1.0
  # Floor applied to volume_surge_score when the screener flags volume_power.
  volume_power_source_floor: 0.8

# Keywords that must not, on their own, admit a theme match.
# Treat these as broad-match terms: raise weights only after the
# theme/fusion quality report shows reviewed false-positive evidence is clean.
generic_keywords:
  - "ai"

# Theme leader scoring weights, admission threshold, and risk penalties.
scoring:
  weights:
    relative_strength: 0.25
    trading_value: 0.20
    volume_surge: 0.15
    catalyst: 0.15
    theme_breadth: 0.10
    intraday_persistence: 0.10
    freshness: 0.05
  active_threshold: 0.70
  soft_penalty_per_flag: 0.08
  soft_penalty_cap: 0.35
  hard_risk_flags:
    - "investment_warning"
    - "investment_risk"
    - "trading_halt"
    - "administrative_issue"
    - "preferred_share"

keyword_themes:
  ai_hbm:
    label: "AI/HBM"
    keywords:
      - "ai"
      - "artificial intelligence"
      - "hbm"
      - "high bandwidth memory"
      - "memory"
      - "semiconductor"
      - "반도체"
      - "인공지능"
  ai_power_infra:
    label: "AI Power Infra"
    keywords:
      - "data center"
      - "power infra"
      - "power grid"
      - "transformer"
      - "electric equipment"
      - "cooling"
      - "datacenter"
      - "전력"
      - "변압기"
      - "데이터센터"
  shipbuilding_defense:
    label: "Shipbuilding/Defense"
    keywords:
      - "shipbuilding"
      - "shipyard"
      - "naval"
      - "defense"
      - "warship"
      - "marine engine"
      - "조선"
      - "방산"
      - "방위산업"
    # Suppress known homonyms of "조선" (e.g. refractory/wire firms that are not
    # shipbuilders). Uncomment / extend as false positives are observed.
    # exclude_keywords:
    #   - "조선내화"
    #   - "조선선재"
  physical_ai:
    label: "Physical AI"
    keywords:
      - "physical ai"
      - "robot"
      - "robotics"
      - "humanoid"
      - "automation"
      - "actuator"
      - "sensor"
      - "로봇"
      - "자동화"
