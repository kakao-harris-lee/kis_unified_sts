# Macro event calendar — updated manually at the start of each month.
# impact_tier: 1 = top tier (FOMC, CPI, NFP), 2 = medium (BOK, PPI), 3 = minor
# scheduled_at: UTC ISO 8601 (append Z). KST = UTC+9.
#
# Historical entries (2025-07 onward) used for Phase 3 backtest evaluation of
# Setup C. Release times are the announcement moments (not the KST session
# when impact lands — the Setup C window_minutes parameter handles latency).
#
# Sources:
# - FOMC: federalreserve.gov/monetarypolicy/fomccalendars.htm
# - US CPI: bls.gov/schedule/news_release/cpi.htm (8:30 ET = 12:30 or 13:30 UTC DST)
# - US NFP: bls.gov/schedule/news_release/empsit.htm (8:30 ET)
# - BOK: bok.or.kr (09:00 KST = 00:00 UTC)

