# Macro event calendar — updated manually at the start of each month.
# impact_tier: 1 = top tier (FOMC, CPI, NFP), 2 = medium (BOK, PPI), 3 = minor
# scheduled_at: UTC ISO 8601 (append Z). KST = UTC+9.
#
# TIMING SEMANTICS FOR SETUP C
# ──────────────────────────────────────────────────────────────────────────────
# Setup C fires when scheduled_at <= ctx.now (KST) AND elapsed < window_minutes
# (default 15 min). ctx.now is the live tick timestamp during the KR session
# 09:00–15:45 KST (= 00:00–06:45 UTC).
#
# Events that CAN fire Setup C (KST-session-time):
#   BOK rate decisions      10:00 KST = 01:00 UTC  (in-session)
#   China PMI/NBS data      09:00 KST = 00:00 UTC  (in-session)
#   KOSPI200 rebalance eff  15:00 KST = 06:00 UTC  (in-session, close window)
#   KR CPI (some years)     08:00 KST = 23:00 UTC prev — within 15-min gap window at 09:00
#
# Events that CANNOT fire Setup C (fire outside KR session):
#   FOMC rate decision      03:00–05:00 KST (pre-session)
#   US CPI                  22:30 KST next day (post-session)
#   US NFP                  22:30 KST next day (post-session)
#   → These are retained for operator reference and Setup A gap context only.
#
# Sources:
#   BOK:          bok.or.kr (press release 10:00 KST, sometimes 09:00 after reform)
#   China NBS:    stats.gov.cn PMI = last business day of month ~09:00 KST
#   KOSPI200 rebalance: KRX quarterly (Mar/Jun/Sep/Dec, announcement ~10 business
#                       days before close; effective at T-1 close)
#   FOMC:         federalreserve.gov/monetarypolicy/fomccalendars.htm
#   US CPI:       bls.gov (8:30 ET = 13:30 UTC EDT / 22:30 KST)
#   US NFP:       bls.gov (8:30 ET first Friday of month)
#   KR CPI:       kostat.go.kr (08:00 KST last business day of prior month)
# ──────────────────────────────────────────────────────────────────────────────

