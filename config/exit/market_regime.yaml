# E4: Market Regime Exit Strategy Configuration
# 시장 상태 기반 청산 전략
#
# 핵심 아이디어:
# - BEAR 시장: 즉시 청산 (수익/손실 무관)
# - SIDEWAYS_DOWN: 손실 시 즉시 청산, 수익도 빠른 청산
# - SIDEWAYS_FLAT: 보수적 청산 (낮은 수익 목표)
# - BULL: 관대한 청산 (E1/E2에 맡김)

exit:
  type: market_regime
  version: "E4"
  enabled: true

  params:
    # 시장 상태별 필요 수익률
    # -999.0 = 조건 없음 (스킵, E1/E2에 맡김)
    # 0.0 = 손실 시 청산
    # 양수 = 해당 수익 미달 시 청산
    # 999.0 = 무조건 청산
    regime_thresholds:
      BEAR_STRONG: 999.0      # 무조건 청산 (시장 급락)
      BEAR_MODERATE: 999.0    # 무조건 청산 (하락 추세)
      SIDEWAYS_DOWN: 0.005    # +0.5% 미달 시 청산
      SIDEWAYS_FLAT: 0.0      # 손실 시 청산
      SIDEWAYS_UP: -999.0     # 스킵 (E1/E2에 맡김)
      BULL_MODERATE: -999.0   # 스킵
      BULL_STRONG: -999.0     # 스킵
      UNKNOWN: -999.0         # 스킵

    # 즉시 청산 상태 (조건 무시)
    immediate_exit_states:
      - BEAR_STRONG
      - BEAR_MODERATE

    # MAXIMIZE 상태에서도 BEAR 청산 적용 여부
    # true: BEAR 시장이면 MAXIMIZE도 청산
    # false: MAXIMIZE는 항상 E1/E2에 맡김
    exit_maximize_in_bear: true
