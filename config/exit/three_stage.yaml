# 3-Stage Dynamic Exit Strategy 설정
#
# 모든 임계값은 여기서 정의됨 (하드코딩 금지)
# 코드 수정 없이 이 파일만 변경하여 전략 조정 가능

exit:
  type: three_stage
  version: E1
  enabled: true
  description: "3단계 동적 청산 전략 (Survival → Breakeven → Maximize)"

  params:
    # =========================================================================
    # Stage 1: Survival (생존)
    # - 진입 직후 손절 대기 상태
    # - 목표: 큰 손실 방지
    # =========================================================================
    stop_loss_pct: -0.015  # -1.5% 손절 (음수로 표기)
    # 원본: -2.0% → 조정: -1.5% (더 타이트하게)

    # =========================================================================
    # Stage 2: Breakeven (본전 확보)
    # - breakeven_threshold_pct 도달 시 전환
    # - Stop Price → 진입가 + 수수료 (본전 확보)
    # =========================================================================
    breakeven_threshold_pct: 0.015  # +1.5% 도달 시 Stage 2로 전환
    # 원본: +2.0% → 조정: +1.5% (빠른 본전 전환)

    # =========================================================================
    # Stage 3: Maximize (수익 극대화)
    # - maximize_threshold_pct 도달 시 전환
    # - Trailing Stop으로 수익 극대화
    # =========================================================================
    maximize_threshold_pct: 0.03  # +3% 도달 시 Stage 3로 전환
    # 원본: +5% → 조정: +3% (빠른 트레일링 진입)

    trailing_stop_pct: -0.03  # 최고가 대비 -3% 하락 시 청산
    # 최고가에서 3% 하락하면 이익 실현

    # Overshooting 감지: 급등 시 트레일링 갭 축소
    overshoot_threshold_pct: 0.07  # +7% 이상 급등 감지
    overshoot_trailing_pct: -0.015  # 급등 시 -1.5%로 축소 (빠른 이익 실현)

    # =========================================================================
    # Time-based 청산
    # =========================================================================
    time_cut_minutes: 20  # 20분 경과 + 수익 없음 → 청산
    # 원본: 30분 → 조정: 20분

    eod_close_hour: 15    # 장 마감 청산 시각 (시)
    eod_close_minute: 15  # 장 마감 청산 시각 (분)
    # 15:15에 모든 포지션 강제 청산

    # =========================================================================
    # 기타 설정
    # =========================================================================
    fee_rate: 0.003  # 거래 수수료 0.3% (편도 0.15% * 2)

    enable_bear_exit: true  # BEAR 시장 시 전량 청산 활성화


# =========================================================================
# 주식 vs 선물 별도 설정 예시 (자산 유형별로 다른 파일 사용 가능)
# =========================================================================
#
# 주식용 (config/exit/three_stage_stock.yaml):
#   stop_loss_pct: -0.015
#   breakeven_threshold_pct: 0.015
#   maximize_threshold_pct: 0.03
#   time_cut_minutes: 20
#
# 선물용 (config/exit/three_stage_futures.yaml):
#   stop_loss_pct: -0.005  # 더 타이트한 손절 (5틱)
#   breakeven_threshold_pct: 0.005
#   maximize_threshold_pct: 0.01
#   time_cut_minutes: 5  # 스캘핑용 짧은 시간
