# ATR Dynamic Exit Strategy 설정
#
# ATR 기반 동적 손절/트레일링 스탑 청산 전략
# 모든 임계값은 여기서 정의됨 (하드코딩 금지)
# 코드 수정 없이 이 파일만 변경하여 전략 조정 가능

exit:
  type: atr_dynamic
  version: E1
  enabled: true
  description: "ATR 기반 동적 청산 전략 (Hard Stop → Trailing Stop → Momentum Decay)"

  params:
    # =========================================================================
    # ATR 계산 설정
    # - ATR(Average True Range): 가격 변동성을 측정하는 지표
    # - 변동성이 클수록 청산 기준도 동적으로 확대됨
    # =========================================================================
    atr_period: 14  # ATR 계산 기간 (일반적으로 14일 사용)

    # =========================================================================
    # Hard Stop (손절)
    # - 손실이 (ATR × stop_atr_multiplier)를 초과하면 즉시 청산
    # - 목표: 큰 손실 방지
    # =========================================================================
    stop_atr_multiplier: 2.5  # 손절 기준: 진입가 대비 ATR × 2.5 하락 시

    # =========================================================================
    # Trailing Stop (트레일링 스탑)
    # - 수익이 trail_activation_atr에 도달하면 트레일링 스탑 활성화
    # - 최고가 대비 (ATR × trail_atr_multiplier) 하락 시 청산
    # - 목표: 수익 극대화
    # =========================================================================
    trail_activation_atr: 1.0  # 트레일링 스탑 활성화: 수익 > ATR × 1.0
    trail_atr_multiplier: 2.0  # 트레일링 스탑 거리: 최고가 대비 ATR × 2.0

    # =========================================================================
    # Momentum Decay Exit (모멘텀 소진 청산)
    # - 가격 되돌림 > ATR and 거래량 가속도 < 0
    # - 목표: 모멘텀 약화 시 조기 청산
    # =========================================================================
    momentum_decay_exit: false  # 기본값: 비활성화 (true로 변경 시 활성화)

    # =========================================================================
    # Max Hold Days (최대 보유 기간)
    # - 진입 후 N일 경과 시 강제 청산
    # - 0 = 비활성화 (무제한 보유)
    # =========================================================================
    max_hold_days: 0  # 기본값: 무제한 보유

    # =========================================================================
    # Percentage-based Hard Stop Fallback (백업 손절)
    # - ATR 데이터 없을 때 사용하는 고정 비율 손절
    # - 손실이 max_loss_pct를 초과하면 무조건 청산 (안전장치)
    # - 0 = 비활성화 (권장하지 않음)
    # =========================================================================
    max_loss_pct: 5.0  # 최대 손실 허용: -5.0%

    # =========================================================================
    # EOD Close (장 마감 청산)
    # - 지정 시각에 모든 포지션 강제 청산
    # - 선물 intraday 전략에 주로 사용
    # =========================================================================
    eod_close_enabled: false  # 기본값: 비활성화
    eod_close_hour: 15        # 장 마감 청산 시각 (시)
    eod_close_minute: 15      # 장 마감 청산 시각 (분)
    # 예: 15:15에 모든 포지션 청산

    # =========================================================================
    # Exit Signal Confidence
    # - 청산 시그널 신뢰도 (0.0 ~ 1.0)
    # =========================================================================
    default_exit_confidence: 0.85  # 기본 청산 시그널 신뢰도


# =========================================================================
# 주식 vs 선물 별도 설정 예시 (자산 유형별로 다른 파일 사용 가능)
# =========================================================================
#
# 주식용 (config/exit/atr_dynamic_stock.yaml):
#   atr_period: 14
#   stop_atr_multiplier: 2.5
#   trail_activation_atr: 1.0
#   trail_atr_multiplier: 2.0
#   max_hold_days: 5  # 스윙 트레이딩: 5일 보유 제한
#   eod_close_enabled: false
#
# 선물용 (config/exit/atr_dynamic_futures.yaml):
#   atr_period: 14
#   stop_atr_multiplier: 2.0  # 더 타이트한 손절
#   trail_activation_atr: 0.5  # 빠른 트레일링 진입
#   trail_atr_multiplier: 1.5  # 좁은 트레일링 갭
#   max_hold_days: 0  # Intraday: 무제한
#   eod_close_enabled: true  # 장 마감 시 전량 청산
#   eod_close_hour: 15
#   eod_close_minute: 15


# =========================================================================
# Exit Priority (청산 우선순위)
# =========================================================================
# 1. Hard stop (ATR-based stop loss) - 최우선 손절
# 2. Percentage-based fallback (max_loss_pct) - 백업 손절
# 3. EOD close (if enabled) - 장 마감 청산
# 4. Trailing stop (if profit > trail_activation_atr × ATR) - 트레일링 스탑
# 5. Momentum decay (if momentum_decay_exit=True) - 모멘텀 소진
# 6. Max hold days (if max_hold_days > 0) - 최대 보유 기간


# =========================================================================
# Per-Position Exit Parameter Overrides (고급 기능)
# =========================================================================
# 진입 시그널의 metadata로 포지션별 청산 파라미터를 오버라이드할 수 있음:
#
# position.metadata = {
#     "exit_stop_atr_multiplier": 2.0,      # 이 포지션만 더 타이트한 손절
#     "exit_trail_activation_atr": 0.8,     # 이 포지션만 빠른 트레일링
#     "exit_trail_atr_multiplier": 1.5,     # 이 포지션만 좁은 트레일링 갭
#     "exit_max_hold_days": 3,              # 이 포지션만 3일 보유 제한
#     "exit_max_loss_pct": 3.0,             # 이 포지션만 -3% 손절
# }
#
# 주로 trend mode 진입 시그널에서 사용 (강한 트렌드일 때 더 긴 트레일링 적용 등)
