# LLM Market Analysis Configuration
# 환경변수로 덮어쓸 수 있음:
# LLM_PROVIDER, LLM_MODEL, OPENAI_API_KEY, ANTHROPIC_API_KEY,
# TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, DART_API_KEY

llm:
  # 사용 LLM 제공자 선택: "openai" | "claude"
  provider: "openai"
  # LLM 응답 JSON 스키마 엄격 검증(파싱 실패 시 규칙기반 fallback)
  strict_json_schema: true
  # Prompt cache (Redis 우선, 실패 시 프로세스 메모리 fallback)
  prompt_cache_enabled: true
  prompt_cache_ttl_seconds: 21600
  prompt_cache_prefix: "llm:prompt_cache"
  # 대량 분석 시 청크 단위 배치 크기
  batch_size: 10

openai:
  # OpenAI API 설정 (provider=openai 일 때 사용)
  model: "gpt-4o-mini"
  max_tokens: 1500
  temperature: 0.3

claude:
  # Anthropic Claude API 설정 (provider=claude 일 때 사용)
  model: "claude-3-5-haiku-latest"
  max_tokens: 1500
  temperature: 0.3

stock:
  # 주식 스크리닝 필터
  markets: ["KOSPI"]        # ["KOSPI", "KOSDAQ"] 로 확장 가능
  min_price: 5000           # 최소 주가 (원)
  min_market_cap: 500000000000    # 최소 시가총액 (5000억)
  max_market_cap: 100000000000000 # 최대 시가총액 (100조)
  top_n_volume: 20          # 거래량 상위 N개 분석
  final_selection: 5        # 최종 추천 종목 수
  backtest_days: 60         # 백테스트 기간 (일)
  history_days: 252         # 스크리닝용 히스토리 기간 (일)
  min_history_days: 90      # 최소 필요 히스토리 (일)
  new_listing_min_days: 20  # 신규 상장 최소 일수 (미만 제외)
  new_listing_penalty: 0.7  # 신규 상장 스코어 계수
  volume_lookback_days: 20  # 거래량 평균 계산 기간 (일)
  min_trade_value: 500000000   # 최소 거래대금 (5억)
  min_turnover: 0.003          # 거래대금/시가총액 최소 비율
  momentum_lookback_days: 252  # 모멘텀/52주 고점 기준
  max_atr_pct: 0.08            # ATR/가격 최대 비율
  max_drawdown_pct: 0.25       # 최대 낙폭 제한
  min_backtest_trades: 10      # 백테스트 최소 거래 수
  min_backtest_win_rate: 45    # 백테스트 최소 승률
  min_recommendation_score: 5.0  # 최소 추천 스코어 (미달 시 추천 제외)
  max_position: 0.2         # 최대 포지션 비율 (20%)

  # Negative screening (옵션)
  blacklist: ["관리종목", "투자주의", "환기종목", "거래정지"]
  keyword_filter: ["횡령", "배임", "감자", "상장폐지", "회생절차"]
  risk_keywords: ["유상증자", "전환사채", "CB", "BW", "불성실공시", "감사의견", "실적부진"]
  exclude_name_keywords: ["스팩", "SPAC", "리츠", "REIT"]
  exclude_preferred_shares: true
  enable_kis_target_price: true    # KIS 종목투자의견(목표가) 반영
  target_lookback_days: 180        # 목표가 조회 기간
  target_recent_days: 30           # 최근 목표가 리비전 비교 기간
  target_stale_days: 90            # 이 일수 이후 목표가 신호 감쇠
  target_min_coverage: 2           # 목표가 신뢰도 최소 커버리지
  target_high_dispersion_pct: 40.0 # 목표가 분산이 큰 경우 감쇠
  target_low_quality_multiplier: 0.5
  target_high_dispersion_multiplier: 0.7
  target_revision_score: 2.0
  target_revision_min_pct: 3.0

  # 스코어 가중치
  score_weight_momentum: 0.35
  score_weight_technical: 0.15
  score_weight_backtest: 0.20
  score_weight_news: 0.10
  score_weight_liquidity: 0.10
  score_weight_target_price: 0.10
  score_weight_risk: 0.10
  score_weight_theme: 0.15         # 시장 주도 테마/섹터 연관성 가중치
  score_weight_nps_ownership: 0.10 # 국민연금 보유 신호 가중치

  # LLM scored news join (stream:news.scored -> stock candidate payload)
  scored_news_enabled: true
  scored_news_stream: "stream:news.scored"
  scored_news_sources: ["marketaux", "naver_search"]
  scored_news_lookback_seconds: 86400
  scored_news_max_entries: 500
  scored_news_max_per_stock: 3
  scored_news_min_impact_score: 0.10
  scored_news_positive_sentiment_threshold: 0.20
  scored_news_negative_sentiment_threshold: -0.20

  # 국민연금 지분공시 기반 보유 신호
  nps_enabled: true
  nps_holder_keywords: ["국민연금", "국민연금공단"]
  nps_holding_ratio_anchor_pct: 10.0
  nps_base_score_max: 10.0
  nps_change_pctp_multiplier: 2.0
  nps_change_score_cap: 5.0
  nps_score_cap: 15.0
  nps_max_report_age_days: 90
  nps_stale_score_multiplier: 0.5

  # LLM Scoring (confidence factor)
  llm_scoring_enabled: true
  llm_scoring_model: ""              # 빈 값 = 기본 모델 사용
  llm_scoring_max_tokens: 500
  llm_scoring_temperature: 0.2

  # Technical timing consensus injected into LLM candidate scoring.
  # 2개 이상 신호 겹침을 기본값으로 두고, 실험별 전략 YAML에서 동일 파라미터를 조정한다.
  technical_consensus:
    min_entry_votes: 2
    min_exit_votes: 2
    min_entry_core_votes: 2
    min_exit_core_votes: 2
    rsi_oversold: 35.0
    rsi_recovery: 40.0
    rsi_overbought: 70.0
    rsi_rollover: 60.0
    williams_oversold: -80.0
    williams_reversal: -65.0
    williams_overbought: -20.0
    williams_exit: -35.0
    macd_hist_threshold: 0.0
    include_trend_vote: true
    trend_buffer_pct: 0.0
    include_volume_vote: true
    min_volume_ratio: 1.2
    exit_retrace_from_high_pct: 0.03

futures:
  # 선물 분석 가중치
  weight_global: 0.4        # 글로벌 시장 가중치
  weight_flow: 0.35         # 수급 가중치
  weight_technical: 0.25    # 기술적 분석 가중치
  stop_loss_pt: 3.0         # 손절 포인트
  take_profit_pt: 5.0       # 익절 포인트

  # 외국인 선물 흐름 (market-structure read-model 소싱; 신규 키 없음)
  structure_key: "market:structure:latest"  # 외인선물 순매수 스냅샷 해시
  structure_stale_seconds: 86400            # 스냅샷 최대 허용 age(초) — 초과 시 degrade
  flow_foreign_weight: 5.0                  # flow_score 외인 방향 가중(±, put-call과 정합)

  # Futures-specific LLM prompt addendum (Phase 1.1-a)
  # Injected as additional system prompt context when LLMContextPublisher is
  # initialized with asset_class="futures". Focuses the LLM on KOSPI200 futures
  # intraday regime/risk classification rather than stock universe quality scoring.
  # All fields must remain config-driven — do NOT hardcode in Python.
  prompt_addendum: |
    You are analyzing for **KOSPI200 futures intraday trading**.
    Output regime classification (BULL_STRONG/BULL_MODERATE/NEUTRAL/BEAR_MODERATE/BEAR_STRONG/SIDEWAYS_UP/SIDEWAYS_DOWN),
    overall_signal (STRONG_BULLISH/BULLISH/NEUTRAL/BEARISH/STRONG_BEARISH),
    risk_mode (RISK_ON/NEUTRAL/RISK_OFF), risk_score (0-100, higher = more risk),
    and confidence (0-1) appropriate for **futures** position sizing & threshold tuning.
    Focus on: KOSPI200 macro regime, day-session volatility, event-driven moves,
    intraday momentum, and institutional futures flow — NOT individual stock quality scoring.

market_context_publisher:
  # LLM 시장 분석 결과를 Redis에 주기적으로 발행
  enabled: true                      # 백그라운드 발행 활성화
  run_on_startup: true               # 시작 시 즉시 분석 실행
  # Operator §7-2 decision (2026-05-03): 1h interval (was 30 min).
  # On-demand refresh is triggered by Setup A/C signal arrival via
  # LLMContextPublisher.request_refresh() (Phase 1.1-b).
  analysis_interval_minutes: 60      # 분석 실행 주기 (분) — §7-2 결정: 1h
  redis_ttl_seconds: 7200            # Redis 캐시 TTL (2시간)

notification:
  # 알림 시간대 설정
  start_time: "08:30"
  end_time: "15:40"
  critical_always: true     # 중요 알림은 시간 제한 무시

output:
  # 분석 결과 저장 경로
  dir: "output/llm"

krx_api:
  # KRX Open API 설정
  # API Key는 환경변수 KRX_API_KEY로 설정
  base_url: "https://data-dbg.krx.co.kr/svc/apis"
  timeout_seconds: 30
  analysis_days: 20

  # data.krx.co.kr 익명 스크레이핑 설정 (KRXDataCollector)
  # KRX 정책 변경(2026)으로 일반 bld(dbms/MDC/STAT/...)는 세션 없이
  # 400 + "LOGOUT" 응답. outerLoader 화이트리스트 화면의 MDC_OUT bld만
  # 쿠키 부트스트랩(JSESSIONID) 후 익명 조회 가능.
  scrape:
    base_url: "https://data.krx.co.kr"
    timeout_seconds: 10
    # 스크레이핑 요청 간 최소 간격 (예의상 rate limit)
    request_interval_seconds: 2.0
    investor_trading:
      # 투자자별 거래실적 일별추이 (거래대금 기준, 익명 가용 실측 2026-07-02)
      bld: "dbms/MDC_OUT/STAT/standard/MDCSTAT02203_OUT"
      screen_id: "MDCSTAT022"
      # 합산 대상 시장 (STK=KOSPI, KSQ=KOSDAQ)
      markets: ["STK", "KSQ"]

  # 섹터별 ETF 코드 매핑
  sector_etfs:
    반도체: ["091160", "091170", "395160"]
    2차전지: ["305720", "371460", "394670"]
    바이오: ["244580", "261060"]
    금융: ["091180", "140700"]
    자동차: ["091170", "204450"]
    철강: ["117680"]
    조선: ["140710"]
    건설: ["117700"]
    에너지: ["117460", "261220"]
    인터넷: ["261110"]
    게임: ["251340"]

  # 주요 지수 코드 매핑
  indices:
    KOSPI: "KS11"
    KOSDAQ: "KQ11"
    KOSPI200: "KS200"
    KOSPI_LARGE: "KS100"
    KOSDAQ150: "KQ150"
