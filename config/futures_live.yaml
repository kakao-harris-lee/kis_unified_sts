## Live-mode futures configuration — Phase 5 Task 5
##
## Consumed by `shared/execution/live_mode_guard.py::LiveModeGuard`.
## The order_router daemon (services/order_router/main.py) calls
## `LiveModeGuard.is_live_suspended(redis)` BEFORE every order submission;
## when suspended, the order is rejected and the signal is XACK'd as a
## skip (no retry).
##
## Two independent suspend triggers, by design:
##   1. `enabled: false` — config-level pause (default; "off" until Phase 5
##      Gate 2 checklist is complete and the operator flips it manually).
##   2. Redis flag at `suspend_key` (default `futures:live:suspended`) — a
##      runtime kill from operator without a process restart. Set with
##      `redis-cli -n 1 set futures:live:suspended 1`; clear with
##      `redis-cli -n 1 del futures:live:suspended`.
##
## Hard caps below are stricter than `config/risk.yaml` defaults — they are
## additional Gate-3 ladder caps (1→2→5 contracts, doc:
## docs/plans/2026-04-20-futures-paradigm-phase5-rollout.md §2.3).
## `max_position_size_contracts` is the ladder step; `max_daily_trades` is
## the per-day order ceiling; `symbol_lock_enabled` rejects orders for any
## symbol other than the front-month KOSPI200 mini.

futures_live:
  enabled: false                          # Gate 2 must complete before flipping
  max_position_size_contracts: 1          # Gate 3 starts here
  max_daily_trades: 2                     # stricter than risk.yaml
  symbol_lock_enabled: true               # only front-month mini accepted
  account_suffix: "_live"                 # env-var suffix convention
  suspend_key: "futures:live:suspended"   # Redis flag for manual pause
