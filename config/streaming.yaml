# Redis Streams Configuration

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: ${REDIS_DB:1}

streams:
  # 원시 데이터 스트림
  raw_data:
    name: RAW_DATA_STREAM
    maxlen: 10000

  # 피처 스트림 (기술적 지표 포함)
  feature:
    name: FEATURE_STREAM
    maxlen: 10000

  # 예측 스트림 (CNN-LSTM 결과)
  prediction:
    name: PREDICTION_STREAM
    maxlen: 10000

  # 주문 명령 스트림
  order_command:
    name: ORDER_COMMAND_STREAM
    maxlen: 5000

consumer:
  # 메시지 읽기 설정
  read_count: 10
  block_ms: 1000

  # Consumer Group 이름
  groups:
    processor: processor_group
    prediction: prediction_group
    strategy: strategy_group
    order: order_group

# Indicator Engine 설정
indicator_engine:
  staleness_seconds: 180         # 마지막 tick 이후 N초 경과 시 지표를 stale 처리 (3분)
  mtf_timeframes: [5, 15, 'daily']  # Multi-timeframe support: 5분, 15분, 일봉
  mtf_maxlen: 250                # MTF 캔들 저장 최대 개수 (일봉 1년 = 250 거래일)

# KIS WebSocket Stock Price Feed (H0STCNT0) 설정
stock_feed:
  max_symbols: 40               # KIS 제한: 41, 안전 마진으로 40
  queue_maxsize: 10000           # 내부 메시지 큐 최대 크기
  ping_interval: 30              # WebSocket ping 간격 (초)
  ping_timeout: 10               # WebSocket ping 타임아웃 (초)
  connection_timeout: 10.0       # 초기 연결 타임아웃 (초)
  subscription_delay: 0.05       # 구독 간 딜레이 (초)
  approval_key_timeout: 10       # 인증키 요청 타임아웃 (초)
  reconnect_initial_delay: 1.0   # 재접속 초기 대기 (초)
  reconnect_max_delay: 60.0      # 재접속 최대 대기 (초)
  stale_threshold_seconds: 30.0   # 종목별 tick stale 판단 기준 (DataProvider failover 기준과 정렬)

# KIS WebSocket Futures Price Feed (H0IFCNT0) 설정
futures_feed:
  max_symbols: 10               # 선물 동시 구독 심볼 수
  subscription_delay: 0.05      # 구독 간 딜레이 (초)
  connection_timeout: 10.0      # 초기 연결 타임아웃 (초)
  shutdown_timeout: 5.0         # 종료 대기 타임아웃 (초)
  orderbook_stale_threshold_seconds: 3.0    # trade-only 지속 시 호가 stale 판단 임계값
  orderbook_missing_warn_interval_seconds: 30.0  # 호가 누락 경고 최소 간격

# KIS REST API Rate Limiter 설정
rate_limiter:
  default_rate: ${KIS_API_RATE_LIMIT:5}   # 초당 최대 요청 수
  penalty_seconds: 1.0                     # 429 에러 시 패널티 대기 (초)
  request_timeout: 10.0                    # REST API 요청 타임아웃 (초)

# Data Provider Cache TTL 설정
data_provider:
  cache_ttl_websocket: 2.0       # WebSocket 사용 시 (push 기반, 짧은 TTL OK)
  cache_ttl_stock: 30.0          # 주식 REST polling 시 TTL (초)
  cache_ttl_futures: 5.0         # 선물 REST polling 시 TTL (초)
  stagger_delay: 0.25            # 배치 내 요청 간 딜레이 (초, KIS 5req/s 제한 보호)
  batch_size: 20                 # 배치 당 최대 심볼 수
  fetch_timeout_seconds: 5.0     # 데이터 조회 타임아웃 (초)

# KIS REST API Error Rate Tracker 설정 (§10.3-A, kill-switch feed for PR #164)
kis_api_error_rate:
  enabled: true                                         # opt-in switch — set false to disable Redis writes
  window_seconds: 300                                   # 5-minute rolling window
  publish_interval_seconds: 10                          # how often to write to Redis (seconds)
  redis_key: "kill_switch:metrics:api_error_rate_5min"  # target key (DB 1)

# ClickHouse Insert Failure Rate Tracker (§10.3-B)
# Published to Redis key kill_switch:metrics:clickhouse_insert_fail_rate (DB 1).
# Consumed by services/kill_switch/main.py _build_clickhouse_insert_fail_provider
# (PR #164 stub provider — this config activates the real writer).
clickhouse_insert_fail_rate:
  enabled: true
  window_seconds: 300              # Rolling window length in seconds (5 minutes)
  publish_interval_seconds: 10     # How often to write the rate to Redis (seconds)
  redis_key: "kill_switch:metrics:clickhouse_insert_fail_rate"
  redis_ttl_seconds: 600           # Key TTL: 2 × window so it self-expires if process dies

# WebSocket Failover with REST Fallback 설정
failover:
  enabled: true                  # WebSocket 실패 시 REST API로 자동 전환 활성화
  health_check_interval_seconds: 10.0  # WebSocket 연결 상태 확인 간격 (초)
  staleness_threshold_seconds: 30.0   # 데이터 stale 판단 임계값 (초, 이 시간 동안 데이터 없으면 failover)
  min_fresh_ratio: 0.25                # 저유동 종목의 정상 tick 공백을 감안한 fresh 비율
  startup_grace_seconds: 120.0         # 장 시작/재구독 직후 종목별 첫 tick 분산 구간에는 fresh 비율 판정 유예
  failover_unhealthy_threshold: 3      # 연속 N회 unhealthy일 때만 REST fallback 진입
  recovery_healthy_threshold: 3        # 연속 N회 healthy일 때만 WebSocket 복구
  rest_poll_interval_seconds: 10.0    # REST fallback 시 polling 간격 (초)
  rest_fallback_max_symbols: 10       # REST fallback 1회 polling 최대 심볼 수
  send_telegram_alerts: false    # Failover/복구 Telegram 알림 제거(로그로만 기록)
