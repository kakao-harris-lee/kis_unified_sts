# Redis Streams Configuration

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: ${REDIS_DB:1}

streams:
  # 원시 데이터 스트림
  raw_data:
    name: RAW_DATA_STREAM
    maxlen: 10000

  # 피처 스트림 (기술적 지표 포함)
  feature:
    name: FEATURE_STREAM
    maxlen: 10000

  # 예측 스트림 (CNN-LSTM 결과)
  prediction:
    name: PREDICTION_STREAM
    maxlen: 10000

  # 주문 명령 스트림
  order_command:
    name: ORDER_COMMAND_STREAM
    maxlen: 5000

consumer:
  # 메시지 읽기 설정
  read_count: 10
  block_ms: 1000

  # Consumer Group 이름
  groups:
    processor: processor_group
    prediction: prediction_group
    strategy: strategy_group
    order: order_group

# Indicator Engine 설정
indicator_engine:
  staleness_seconds: 180         # 마지막 tick 이후 N초 경과 시 지표를 stale 처리 (3분)
  mtf_timeframes: [5, 15, 'daily']  # Multi-timeframe support: 5분, 15분, 일봉
  mtf_maxlen: 250                # MTF 캔들 저장 최대 개수 (일봉 1년 = 250 거래일)

# KIS WebSocket Stock Price Feed (H0STCNT0) 설정
stock_feed:
  max_symbols: 40               # KIS 제한: 41, 안전 마진으로 40
  queue_maxsize: 10000           # 내부 메시지 큐 최대 크기
  ping_interval: 30              # WebSocket ping 간격 (초)
  ping_timeout: 10               # WebSocket ping 타임아웃 (초)
  connection_timeout: 10.0       # 초기 연결 타임아웃 (초)
  subscription_delay: 0.05       # 구독 간 딜레이 (초)
  approval_key_timeout: 10       # 인증키 요청 타임아웃 (초)
  reconnect_initial_delay: 1.0   # 재접속 초기 대기 (초)
  reconnect_max_delay: 60.0      # 재접속 최대 대기 (초)

# KIS WebSocket Futures Price Feed (H0IFCNT0) 설정
futures_feed:
  max_symbols: 10               # 선물 동시 구독 심볼 수
  subscription_delay: 0.05      # 구독 간 딜레이 (초)
  connection_timeout: 10.0      # 초기 연결 타임아웃 (초)
  shutdown_timeout: 5.0         # 종료 대기 타임아웃 (초)
  orderbook_stale_threshold_seconds: 3.0    # trade-only 지속 시 호가 stale 판단 임계값
  orderbook_missing_warn_interval_seconds: 30.0  # 호가 누락 경고 최소 간격

# KIS REST API Rate Limiter 설정
rate_limiter:
  default_rate: ${KIS_API_RATE_LIMIT:5}   # 초당 최대 요청 수
  penalty_seconds: 1.0                     # 429 에러 시 패널티 대기 (초)
  request_timeout: 10.0                    # REST API 요청 타임아웃 (초)

# Data Provider Cache TTL 설정
data_provider:
  cache_ttl_websocket: 2.0       # WebSocket 사용 시 (push 기반, 짧은 TTL OK)
  cache_ttl_stock: 30.0          # 주식 REST polling 시 TTL (초)
  cache_ttl_futures: 5.0         # 선물 REST polling 시 TTL (초)
  stagger_delay: 0.1             # 배치 내 요청 간 딜레이 (초)
