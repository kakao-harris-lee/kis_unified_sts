# Unified performance feedback report engine (Phase 6A — read-only analysis).
#
# Roadmap: docs/plans/2026-07-02-unified-investment-system-roadmap.md §Phase 6.
# Design doc: docs/통합_투자_시스템_전략_설계서.md §8 (주기별 리뷰 체계, §8.2
# 트랙별 성공/중단 판정 기준).
#
# This batch NEVER influences any strategy/execution/gate path. Outputs are
# report files (the source of truth), a Redis freshness pointer, and a
# one-shot Telegram headline.

# Report file root. Files land at
#   {reports_root}/{weekly,monthly,quarterly}/<period_label>.{md,json}
reports_root: "reports/feedback"

redis:
  latest_key: "portfolio:feedback:latest"
  # TTL 8 days: covers the weekly cadence (7 days) plus one day of scheduler
  # slack. The files above are the durable record; the Redis hash is only a
  # freshness pointer for the 6B UI lane, so expiry loses nothing.
  latest_ttl_seconds: 691200

alerts:
  # One Telegram headline per generated report (existing notifier channel).
  enabled: true
  domain: "briefing"

monthly:
  # market_structure_daily close-row score columns written by the
  # market_risk_engine close run (shared/risk/market_risk_score.py).
  risk_band_column: "risk_band"
  risk_score_column: "risk_score"

quarterly:
  # 설계서 §8.2 판정 자료 산출 파라미터. The engine only PRODUCES the
  # material — promotion/demotion decisions stay with the operator.
  track_b:
    # 6-month rolling realized return vs (backtest expectation − slippage)
    # × backtest_ratio (§8.2: 60%).
    rolling_months: 6
    backtest_ratio: 0.6
    # Backtest-expectation source: newest experiment artifact written by the
    # nightly `experiment run` job (the same files /api/experiments reads).
    experiment_reports_dir: "reports/stock_experiment"
  track_c:
    # 첫 3개월 본전 / 6개월 EV 양수 / 12개월 미확인 시 폐지 검토 (§8.2).
    breakeven_months: 3
    ev_checkpoint_months: 6
    ev_final_months: 12
  track_a:
    # KOSPI benchmark proxy: market_structure_daily currently carries the
    # KOSPI200 index close (k200_close) — switch here if/when a composite
    # KOSPI column is collected.
    benchmark_column: "k200_close"
    # §8.2: 3년 미만 구간에서는 판정 유보 (verdict "deferred").
    min_history_years: 3
