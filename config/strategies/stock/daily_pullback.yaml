strategy:
  name: daily_pullback
  asset_class: stock
  enabled: true
  timeframe: daily
  description: "일봉 눌림목 진입 + Chandelier Exit 스윙 전략"

  entry:
    type: daily_pullback
    params:
      sma_long_period: 200
      sma_short_period: 20
      sma_mid_period: 60
      rsi_period: 5
      rsi_oversold: 45.0
      require_mid_trend: true
      mid_trend_lookback: 5
      stop_loss_pct: 7.0
      signal_cooldown_days: 5
      confidence_base: 0.6
      # 2026-05-16 100M-capital baseline: min_confidence=0.70 with 1.095M sizing
      # remains low drawdown but does not yet meet win-rate / monthly-return goals.
      min_confidence: 0.70
      # Optional quality filters. Keep disabled until a candidate reproduces
      # across both recent and long-window portfolio backtests.
      max_atr_pct: 0.0
      min_atr_pct: 0.0
      max_pullback_pct: 0.0
      max_volume_ratio: 0.0
      min_volume_ratio: 0.0
      min_highest_high_gap_pct:
      max_return_60d:

  exit:
    type: chandelier_exit
    params:
      atr_period: 22
      atr_multiplier: 3.0
      lookback_period: 22
      hard_stop_pct: -0.07
      take_profit_pct: 0.0
      max_hold_days: 60
      default_exit_confidence: 0.85

  position:
    type: fixed
    params:
      # 2026-05-16 portfolio sizing: 1.095M x 5 with min_confidence=0.70
      # kept 2023-05-17..2026-05-15 MDD under 10% and recent 22d return
      # above 10%.
      order_amount_per_stock: 1095000
      max_positions: 5

  paper:
    enabled: true
    check_interval: 60  # 1분 간격 체크 (일봉 전략이므로 느리게)

  backtest:
    initial_capital: 100000000
    risk:
      stop_loss_pct: 7.0
      take_profit_pct: 50.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      max_daily_trades: 3
      force_close_time: ""
      close_on_day_change: false
