strategy:
  name: momentum_breakout
  asset_class: stock
  # Disabled after stock paper verification on 2026-05-16:
  # 20 closed trades in the 2026-04-25..2026-05-16 window, 0 wins,
  # -2.51M KRW realized PnL, mostly -5% stop_loss exits. Keep the config
  # for offline retuning; do not route live paper entries until the edge is
  # revalidated against recent ClickHouse data.
  enabled: false
  description: "멀티 타임프레임 모멘텀 돌파 전략"

  entry:
    type: momentum_breakout
    params:
      breakout_buffer_pct: 0.03      # 돌파 버퍼 완화: 추세 추종 진입 확률 확대
      intrabar_breakout_enabled: true
      intrabar_reclaim_pct: 0.05     # 꼬리 돌파 후 종가가 고점 근처면 추격 진입 허용
      intrabar_min_rvol: 1.8         # intrabar 진입은 상대적으로 높은 RVOL 요구
      rvol_threshold: 1.6            # 기준 RVOL 완화 (기존 1.9)
      accumulation_score_min: 40     # Optuna best: 스크리너 필터 약간 완화
      volume_threshold: 0.8
      min_atr_cost_ratio: 0.01
      round_trip_cost: 0.005
      skip_market_open_minutes: 10
      skip_market_close_minutes: 10
      signal_cooldown_seconds: 120   # 신호 밀집 구간 재진입 허용
      stop_atr_multiplier: 2.2
      # Trend mode (activated when regime in BULL/SIDEWAYS_UP)
      trend_mode_enabled: true
      trend_mode_regimes: ["BULL", "BULL_STRONG", "BULL_MODERATE", "SIDEWAYS_UP"]
      trend_rvol_threshold: 1.0
      trend_breakout_buffer_pct: 0.0
      trend_signal_cooldown_seconds: 60
      # EMA pullback trigger
      trend_ema_pullback_enabled: true
      trend_ema_fast: 5
      trend_ema_mid: 20
      trend_ema_slow: 60
      trend_ema_touch_buffer_atr: 1.0
      trend_rsi_min: 40.0
      # Exit overrides for trend mode positions
      trend_exit_stop_atr_multiplier: 2.5
      trend_exit_trail_activation_atr: 1.5
      trend_exit_trail_atr_multiplier: 2.5
      trend_exit_max_hold_days: 15

  exit:
    type: atr_dynamic
    params:
      atr_period: 14
      stop_atr_multiplier: 2.0      # 1.5→2.0: 넓은 손절
      trail_activation_atr: 2.0     # Optuna best: 충분한 수익 후 트레일링 시작
      trail_atr_multiplier: 1.5     # Optuna best: 적절한 트레일링 폭
      momentum_decay_exit: true
      max_hold_days: 8              # Optuna best: 보유 기간 확대
      eod_close_enabled: false
      default_exit_confidence: 0.85

  position:
    type: fixed
    params:
      order_amount_per_stock: 3000000
      max_positions: 8
  backtest:
    # Keep engine risk as safety net only; let atr_dynamic exit drive liquidation.
    risk:
      stop_loss_pct: 99.0
      take_profit_pct: 999.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      force_close_time: ""
      close_on_day_change: false
      max_daily_trades: 0
