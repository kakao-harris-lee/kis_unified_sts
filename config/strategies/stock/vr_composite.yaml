# VR Composite Strategy (Volume Ratio + RSI + MA — Daily Swing)
#
# 일봉 VR(Volume Ratio) 지표 기반 복합 스윙 전략
#
# 핵심 아이디어:
#   VR 침체/바닥권 진입 + RSI 과매도 + MA 추세 반등 → 매수
#   VR 과열권 진입 + RSI 과매수 + MA 하락 전환 → 매도
#   일봉 전용 (VR 지표의 신뢰도가 가장 높은 시간 프레임)
#
# VR(%) = (상승일 거래량 합 + 보합일 × 0.5) / (하락일 거래량 합 + 보합일 × 0.5) × 100
#
# VR 구간:
#   >= 400%: 극단적 과열 | 300~400%: 과열권 | 150~300%: 보통~과열
#   100~150%: 보통 | 75~100%: 보통~침체 | 60~75%: 침체권
#   40~60%: 바닥권 | < 40%: 극단적 바닥

strategy:
  name: vr_composite
  asset_class: stock
  enabled: true
  timeframe: daily
  description: "일봉 VR + RSI + MA 복합 스윙 전략"

  # ===========================================================================
  # 진입 조건 (Entry)
  # ===========================================================================
  entry:
    type: vr_composite
    params:
      # -----------------------------------------------------------------
      # VR (Volume Ratio) 설정
      # -----------------------------------------------------------------
      vr_period: 20             # VR 계산 기간 (거래일 수)
      vr_bottom_threshold: 60.0     # Optuna best: 원래 기준 유지 (품질↑)
      vr_depression_threshold: 70.0  # Optuna best: 원래 기준 유지

      # -----------------------------------------------------------------
      # RSI 설정
      # -----------------------------------------------------------------
      rsi_period: 14            # RSI 계산 기간
      rsi_oversold: 30.0        # 과매도 기준
      rsi_weak_oversold: 35.0   # Optuna best: 엄격한 과매도 기준 (품질↑)
      rsi_neutral_upper: 50.0   # 중립 상한

      # -----------------------------------------------------------------
      # 이동평균선 설정
      # -----------------------------------------------------------------
      ma_short: 5               # 단기 MA
      ma_mid: 20                # 중기 MA
      ma_long: 60               # 장기 MA

      # -----------------------------------------------------------------
      # 신호 신뢰도 (우선순위별)
      # -----------------------------------------------------------------
      # 1. VR ≤ 60 + RSI ≤ 30 + 하락둔화/횡보
      confidence_strong_buy_1: 0.85
      # 2. VR ≤ 75 + RSI ≤ 30
      confidence_strong_buy_2: 0.80
      # 3. VR ≤ 60 + RSI ≤ 40 + close > MA5
      confidence_buy_3: 0.75
      # 4. VR ≤ 75 + RSI ≤ 40 + close > MA20
      confidence_buy_4: 0.70
      # 5. VR ≤ 75 + 30 < RSI ≤ 50 + 상승/횡보
      confidence_buy_5: 0.60

      # -----------------------------------------------------------------
      # 거래량 경고 설정
      # -----------------------------------------------------------------
      volume_warning_short_window: 5
      volume_warning_long_window: 20
      volume_warning_threshold: 0.5  # 단기 < 장기 × 0.5 → 경고

      # -----------------------------------------------------------------
      # Risk
      # -----------------------------------------------------------------
      stop_loss_pct: 7.0        # 손절 기준 (%) — exit의 hard_stop과 연동
      signal_cooldown_days: 4   # Optuna best: 과매매 방지

      # -----------------------------------------------------------------
      # 경고 표시
      # -----------------------------------------------------------------
      show_warnings: true

      # -----------------------------------------------------------------
      # 일봉 데이터 키 (indicators dict 내)
      # -----------------------------------------------------------------
      daily_closes_key: daily_closes
      daily_volumes_key: daily_volumes

  # ===========================================================================
  # 청산 조건 (Exit)
  # ===========================================================================
  exit:
    type: vr_composite_exit
    params:
      # -----------------------------------------------------------------
      # VR 과열 임계값
      # -----------------------------------------------------------------
      vr_period: 20
      vr_overheat_threshold: 375.0      # Optuna best: 과열 판단 늦춤 → 수익 확대
      vr_extreme_overheat_threshold: 400.0  # Optuna best: 원래 수준 유지

      # -----------------------------------------------------------------
      # RSI 설정
      # -----------------------------------------------------------------
      rsi_period: 14
      rsi_overbought: 75.0     # Optuna best: 과매수 기준 완화
      rsi_moderate_high: 60.0  # 중간 과매수
      rsi_sell_lower: 50.0     # 매도 판단 하한

      # -----------------------------------------------------------------
      # MA 설정
      # -----------------------------------------------------------------
      ma_short: 5
      ma_mid: 20
      ma_long: 60

      # -----------------------------------------------------------------
      # 안전장치
      # -----------------------------------------------------------------
      hard_stop_pct: -0.07     # Optuna best: 원래 손절 폭 유지
      max_hold_days: 60        # 최대 보유 일수

      # -----------------------------------------------------------------
      # 신뢰도
      # -----------------------------------------------------------------
      # 1. VR >= 400 + RSI >= 70
      confidence_strong_sell_1: 0.85
      # 2. VR >= 300 + RSI >= 70
      confidence_strong_sell_2: 0.80
      # 3. VR >= 300 + RSI >= 60 + close < MA5
      confidence_sell_3: 0.75
      # 4. VR >= 300 + 50 < RSI < 70 + 하락 전환
      confidence_sell_4: 0.65
      default_exit_confidence: 0.70

      # -----------------------------------------------------------------
      # 경고/데이터 키
      # -----------------------------------------------------------------
      show_warnings: true
      daily_closes_key: daily_closes
      daily_volumes_key: daily_volumes

  # ===========================================================================
  # 포지션 사이징
  # ===========================================================================
  position:
    type: fixed
    params:
      order_amount_per_stock: 2000000  # 종목당 매수 금액 (200만원)
      max_positions: 5                 # 최대 동시 보유 종목 수

  # ===========================================================================
  # 모의투자 설정
  # ===========================================================================
  paper:
    enabled: true
    check_interval: 60  # 1분 간격 (일봉 전략이므로 느슨하게)

  # ===========================================================================
  # 백테스트 설정
  # ===========================================================================
  backtest:
    initial_capital: 100000000  # 1억원
    risk:
      stop_loss_pct: 7.0
      take_profit_pct: 50.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      max_daily_trades: 3
      force_close_time: ""
      close_on_day_change: false
