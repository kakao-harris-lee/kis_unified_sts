strategy:
  name: trix_golden
  asset_class: stock
  enabled: false
  description: "TRIX 5분봉 황금신호 v2 - 모멘텀 가속 포착 + 비상관 필터"

  entry:
    type: trix_golden
    params:
      # TRIX (Triple EMA Rate of Change)
      trix_n: 12
      trix_signal: 9

      # v2: acceleration mode (TRIX 음수→양전환 가속 감지)
      trix_entry_mode: "acceleration"
      trix_min_negative_bars: 3

      # CCI range (양의 모멘텀 + 과열 안 된 구간)
      cci_period: 9
      cci_lower: 0.0
      cci_upper: 300.0

      # MACD (crossover 모드에서만 사용)
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9

      # Stochastic (crossover 모드에서만 사용)
      sto_fastk: 12
      sto_slowk: 5
      sto_slowd: 5

      # v2: 비상관 필터 (MACD/Stoch 대체)
      use_uncorrelated_filters: true
      require_above_sma: true
      sma_period: 20
      rvol_filter: false
      rvol_threshold: 1.2

      # 변동성 필터 (고변동 종목 차단)
      max_atr_pct: 0.008    # ATR% > 0.8% 차단 (극단적 고변동만 제외)
      atr_period: 14

      # OBV filter (optional)
      obv_filter: false

      # Market state filter (추세 추종 → BULL/SIDEWAYS_UP만 허용)
      market_state_filter:
        enabled: true
        allowed_states:
          - BULL
          - SIDEWAYS_UP
        blocked_states: []

      # General
      stop_loss_pct: 3.0
      min_candles: 50
      timeframe_minutes: 5

      # Time filters
      market_open_hour: 9
      market_open_minute: 0
      market_close_hour: 15
      market_close_minute: 15
      skip_market_open_minutes: 30
      skip_market_close_minutes: 15

      # Cooldown (5 minutes between signals per symbol)
      signal_cooldown_seconds: 300

      # 시그널 빈도 제한 (TRIX 과진동 종목 자동 차단)
      max_signals_per_day: 3

      # Confidence scoring 정규화 계수
      trix_spread_scale: 20.0
      trix_accel_scale: 30.0
      cci_norm_range: 300.0
      sma_dist_base: 0.5
      sma_dist_scale: 10.0

  exit:
    type: trix_golden_exit
    params:
      # Stop loss
      stop_loss_pct: -0.03  # -3%

      # v2: 분할청산 비활성화 (승자를 일찍 자르지 않음)
      partial_exit_enabled: false
      partial_exit_ratio: 0.5

      # v2: 최소 보유 시간 (stop loss/EOD 제외)
      min_hold_minutes: 30

      # v2: Trailing stop
      trailing_stop_enabled: true
      trailing_activation_pct: 0.01   # +1% 도달 시 trailing 시작
      trailing_stop_pct: -0.015       # -1.5% trailing (고점 대비)

      # Indicator params (should match entry)
      trix_n: 12
      trix_signal: 9
      rsi_overbought: 70.0

      # Divergence detection
      divergence_lookback: 20

      # Swing low stop
      use_swing_low_stop: true
      swing_lookback: 10

      # Timeframe
      timeframe_minutes: 5

      # Exit signal confidence
      default_exit_confidence: 0.8

      # EOD close
      eod_close_enabled: true
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      max_position_pct: 10.0
      max_positions: 5
