strategy:
  name: trix_golden
  asset_class: stock
  enabled: true
  description: "TRIX 5분봉 황금신호 - 추세추종 + 모멘텀 가속 포착"

  entry:
    type: trix_golden
    params:
      # TRIX (Triple EMA Rate of Change)
      trix_n: 12
      trix_signal: 9

      # CCI (Commodity Channel Index)
      cci_period: 9
      cci_upper: 200.0

      # MACD (Moving Average Convergence Divergence)
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9

      # Stochastic Oscillator (Slow)
      sto_fastk: 12
      sto_slowk: 5
      sto_slowd: 5

      # Filters
      obv_filter: true
      stop_loss_pct: 3.0
      min_candles: 50
      timeframe_minutes: 5

      # Time filters
      market_open_hour: 9
      market_open_minute: 0
      market_close_hour: 15
      market_close_minute: 15
      skip_market_open_minutes: 30
      skip_market_close_minutes: 15

      # Cooldown (5 minutes between signals per symbol)
      signal_cooldown_seconds: 300

  exit:
    type: trix_golden_exit
    params:
      # Stop loss
      stop_loss_pct: -0.03  # -3%

      # Partial exit (50% on first signal)
      partial_exit_ratio: 0.5

      # Indicator params (should match entry)
      trix_n: 12
      trix_signal: 9
      rsi_overbought: 70.0

      # Divergence detection
      divergence_lookback: 20

      # Swing low stop
      use_swing_low_stop: true
      swing_lookback: 10

      # Timeframe
      timeframe_minutes: 5

      # EOD close
      eod_close_enabled: true
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      max_position_pct: 10.0
      max_positions: 5
