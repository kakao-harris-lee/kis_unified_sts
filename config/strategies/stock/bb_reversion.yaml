# BB Reversion Strategy (Mean Reversion — Swing)
#
# 단기 급락 종목의 평균 회귀를 이용하는 스윙 전략
#
# 핵심 아이디어:
#   볼린저 밴드 하단 터치 + RSI 과매도 → 평균 회귀 기대 매수
#   시장 상태(MFI/ADX)에 따라 진입 조건 조정
#   1~5일 보유 (오버나이트 허용, 시그널 기반 청산)
#
# 데이터 소스: system:dip_candidates:latest (급락 종목)
#   - Screener가 KOSPI/KOSDAQ loser 중 -2% 이상 하락 종목 발굴
#   - Orchestrator가 LLM blacklist 필터 후 bb_reversion에 전달
#
# 백테스트 결과 (2025-11 ~ 2026-02, 30종목 ClickHouse 분봉):
#   - Avg Sharpe: -1.05 (30종목), 수익 종목: 9/30, 총 거래: 1,882건
#   - Optuna 100 trials 최적화: 9종목 subset에서 0.33 달성하나 30종목 일반화 실패
#   - 결론: 파라미터 문제가 아닌 전략/시장 구조 문제 (2025-11~2026-02 약세장)

strategy:
  name: bb_reversion
  asset_class: stock
  enabled: false  # Absorbed into trend_pullback (2026-02-26 redesign)
  use_llm_context: false  # LLM market analysis integration (default disabled for backward compatibility)
  description: "단기 급락 평균 회귀 스윙 전략 (BB + RSI)"

  # ===========================================================================
  # 진입 조건 (Entry)
  # ===========================================================================
  entry:
    type: mean_reversion  # BB + RSI mean reversion
    params:
      # -----------------------------------------------------------------
      # Bollinger Bands 설정
      # -----------------------------------------------------------------
      bb_period: 20           # BB 이동평균 기간
      bb_std: 2.0             # BB 표준편차 배수
      bb_touch_buffer: 1.00   # 하단 터치 버퍼 (정확한 밴드 터치 요구)

      # -----------------------------------------------------------------
      # RSI 설정
      # -----------------------------------------------------------------
      rsi_period: 14          # RSI 기간
      rsi_oversold: 35        # 과매도 기준
      rsi_deep_oversold: 25   # 깊은 과매도 (SIDEWAYS_DOWN, 보수적)
      allow_short: false      # 현물 기준 숏 비활성화

      # -----------------------------------------------------------------
      # 거래량 확인 (선택적)
      # -----------------------------------------------------------------
      volume_confirm: false   # 거래량 확인 비활성화 (Mean Reversion은 불필요)
      volume_ma_period: 20
      volume_threshold: 1.2   # 평균 대비 1.2배 이상

      # -----------------------------------------------------------------
      # 시장 상태 필터 (MarketClassifier 기반)
      # -----------------------------------------------------------------
      market_state_filter:
        enabled: true
        # MFI/ADX 기반 시장 분류
        allowed_states:
          - SIDEWAYS_FLAT     # MFI 43-45, 보통 Mean Reversion
          - SIDEWAYS_DOWN     # MFI 41-43, 보수적 Mean Reversion
          - SIDEWAYS_UP       # MFI 45-49, 약한 상승 횡보 (MR 유효)
        blocked_states:
          - BEAR_MODERATE     # MFI 34-41, 하락 추세
          - BEAR_STRONG       # MFI < 34, 강한 하락
          - BULL_STRONG       # MFI >= 57, 강한 추세 (MR 부적합)
          - BULL_MODERATE     # MFI 55-57, 보통 상승 추세

      # -----------------------------------------------------------------
      # 시가총액 필터
      # -----------------------------------------------------------------
      min_market_cap: 0       # 비활성화 (KIS 현재가 API에 시가총액 없음; screener가 사전 필터링)

      # -----------------------------------------------------------------
      # 시간 필터
      # -----------------------------------------------------------------
      skip_market_open_minutes: 30    # 장 시작 30분 스킵 (09:00-09:30)
      skip_market_close_minutes: 15   # 장 마감 15분 전 스킵 (15:15 이후)
      market_open_hour: 9
      market_open_minute: 0
      market_close_hour: 15
      market_close_minute: 15

      # -----------------------------------------------------------------
      # 시그널 쿨다운 (동일 종목 재진입 방지)
      # -----------------------------------------------------------------
      signal_cooldown_seconds: 300    # 5분

      # -----------------------------------------------------------------
      # Phase 1: 진입 품질 필터
      # -----------------------------------------------------------------
      vwap_filter: false              # VWAP 필터 비활성화
      adx_filter: false               # ADX 필터 비활성화
      adx_max_threshold: 25.0
      percent_b_filter: true          # %B < 0.0 (밴드 이하만 진입)
      percent_b_threshold: 0.1

      # 포지션 사이징 힌트 (RiskBasedSizer에서 사용)
      stop_loss_pct: 3.0              # -3% 손절 기준 (스윙)

  # ===========================================================================
  # 청산 조건 (Exit)
  # ===========================================================================
  exit:
    type: mean_reversion_exit
    params:
      # ATR 기반 동적 손절
      atr_stop_multiplier: 2.0         # Entry - 2.0×ATR
      max_stop_loss_pct: -0.03         # ATR stop cap (최대 -3%)

      # Primary target: BB middle band (20-SMA)
      target_bb_middle: true

      # 시간 기반 청산 (수익 없이 2시간 초과)
      time_cut_minutes: 120

      # EOD — 스윙 전략이므로 비활성화
      eod_close_hour: 23
      eod_close_minute: 59             # 비활성화 (오버나이트 허용)

      # 수수료
      fee_rate: 0.003                  # 0.3% (편도 0.15% × 2)

      # BEAR 시장 즉시 청산
      enable_bear_exit: true

  # ===========================================================================
  # 포지션 사이징 (Position Sizing)
  # ===========================================================================
  position:
    type: risk_based
    params:
      # 계좌 대비 최대 포지션 비율
      max_position_pct: 10.0           # 종목당 최대 10%

      # 최대 동시 보유 종목 수
      max_positions: 5

      # 거래당 리스크 (손실 허용)
      risk_per_trade_pct: 1.0          # 계좌의 1% 리스크

      # 종목당 투자 금액 (고정 금액 방식 사용 시)
      order_amount_per_stock: 1000000  # 100만원

  # ===========================================================================
  # 지표 설정 (Indicators)
  # ===========================================================================
  indicators:
    # Bollinger Bands
    bollinger_bands:
      period: 20
      std_dev: 2.0

    # RSI
    rsi:
      period: 14

    # MACD (모멘텀 확인용)
    macd:
      fast_period: 12
      slow_period: 26
      signal_period: 9

    # MFI (시장 분류용)
    mfi:
      period: 14

    # ADX (추세 강도 측정)
    adx:
      period: 14

  # ===========================================================================
  # 시장 분류 임계값 (MarketClassifier)
  # ===========================================================================
  market_classifier:
    # MFI 기반 분류 (Money Flow Index)
    mfi_thresholds:
      bull_strong: 57      # MFI > 57: 강한 상승
      bull_moderate: 55    # MFI 55-57: 보통 상승
      sideways_up: 51      # MFI 51-55: 횡보 상승
      sideways_flat_upper: 57
      sideways_flat_lower: 43  # MFI 43-57: 횡보
      sideways_down_lower: 41  # MFI 41-43: 횡보 하락
      bear: 41             # MFI < 41: 하락

    # ADX 기반 추세 강도
    adx_thresholds:
      strong_trend: 25     # ADX > 25: 강한 추세
      moderate_trend: 20   # ADX 20-25: 보통 추세
      weak_trend: 15       # ADX < 15: 약한 추세/횡보


# ===========================================================================
# 전략 변형 (Variants)
# ===========================================================================
# 시장 상태별 다른 파라미터 조합을 사용하고 싶을 때 참고

variants:
  # 공격적 설정 (SIDEWAYS_FLAT)
  aggressive:
    entry:
      bb_touch_buffer: 1.01
      rsi_oversold: 38
    exit:
      stop_loss_pct: -0.02
      maximize_threshold_pct: 0.05

  # 보수적 설정 (SIDEWAYS_DOWN)
  conservative:
    entry:
      bb_touch_buffer: 1.00   # 정확히 터치해야 함
      rsi_oversold: 35        # 더 깊은 과매도 필요
    exit:
      stop_loss_pct: -0.015
      maximize_threshold_pct: 0.03

  # 단기 스캘핑 (빠른 익절)
  scalping:
    entry:
      bb_touch_buffer: 1.01
      rsi_oversold: 40
    exit:
      stop_loss_pct: -0.01
      breakeven_threshold_pct: 0.01
      maximize_threshold_pct: 0.016
      trailing_stop_pct: -0.015
      time_cut_minutes: 10
