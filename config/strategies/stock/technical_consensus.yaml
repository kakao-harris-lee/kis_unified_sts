strategy:
  name: technical_consensus
  asset_class: stock
  enabled: false
  timeframe: daily
  description: "Daily RSI/Williams %R/MACD 2-of-3 consensus entry experiment"

  entry:
    type: technical_consensus
    params:
      min_entry_votes: 2
      min_entry_core_votes: 2
      min_exit_votes: 2
      min_exit_core_votes: 2

      rsi_period: 14
      rsi_oversold: 35.0
      rsi_recovery: 40.0
      rsi_overbought: 70.0
      rsi_rollover: 60.0

      williams_r_period: 14
      williams_oversold: -80.0
      williams_reversal: -65.0
      williams_overbought: -20.0
      williams_exit: -35.0

      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      macd_hist_threshold: 0.0

      include_trend_vote: true
      trend_buffer_pct: 0.0
      include_volume_vote: false
      min_volume_ratio: 1.2
      volume_lookback: 20

      stop_loss_pct: 3.0
      signal_cooldown_days: 3
      min_confidence: 0.70
      confidence_base: 0.70
      confidence_vote_bonus: 0.05

  exit:
    type: technical_consensus_exit
    params:
      min_exit_votes: 2
      min_exit_core_votes: 2
      min_entry_votes: 2
      min_entry_core_votes: 2
      rsi_oversold: 35.0
      rsi_recovery: 40.0
      rsi_overbought: 70.0
      rsi_rollover: 60.0
      williams_oversold: -80.0
      williams_reversal: -65.0
      williams_overbought: -20.0
      williams_exit: -35.0
      macd_hist_threshold: 0.0
      include_trend_vote: true
      include_volume_vote: false
      hard_stop_pct: -0.03
      time_cut_minutes: 0
      eod_close_enabled: false
      default_exit_confidence: 0.85

  position:
    type: fixed
    params:
      order_amount_per_stock: 1000000
      max_positions: 5

  paper:
    enabled: false
    check_interval: 60

  backtest:
    initial_capital: 100000000
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 5.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      max_daily_trades: 3
      force_close_time: ""
      close_on_day_change: false
