strategy:
  name: pattern_pullback
  asset_class: stock
  enabled: true
  timeframe: daily
  description: "일봉 패턴 리플레이 기반 눌림목 스윙 전략"

  entry:
    type: pattern_pullback
    params:
      sma_long_period: 200
      sma_short_period: 20
      sma_mid_period: 60
      rsi_period: 5
      mid_trend_lookback: 5
      signal_cooldown_days: 1
      confidence_base: 0.72
      confidence_pattern_bonus: 0.01
      min_confidence: 0.30
      stop_loss_pct: 7.0
      entry_sort: rsi5_asc
      patterns:
        - name: pullback_reversal
          rsi5_max: 45
          min_atr_pct: 0.02
          min_highest_high_gap_pct: -0.05
          require_mid_trend: true
        - name: volume_pullback
          rsi5_max: 50
          min_volume_ratio: 1.5
          max_return_60d: 0.05
          min_atr_pct: 0.03
        - name: pullback_reversal
          rsi5_max: 40
          min_atr_pct: 0.02
          min_highest_high_gap_pct: -0.05
          require_mid_trend: true
        - name: volume_pullback
          rsi5_max: 45
          min_volume_ratio: 1.5
          max_return_60d: 0.05
          min_atr_pct: 0.03
        - name: volume_pullback
          rsi5_max: 45
          min_volume_ratio: 1.2
          max_return_60d: 0.05
          min_atr_pct: 0.03
        - name: volume_pullback
          rsi5_max: 50
          min_volume_ratio: 1.2
          max_return_60d: 0.05
          min_atr_pct: 0.03
        - name: pullback_reversal
          rsi5_max: 50
          min_atr_pct: 0.02
          min_highest_high_gap_pct: -0.05
          require_mid_trend: true
        - name: volume_pullback
          rsi5_max: 50
          min_volume_ratio: 1.2
          max_return_60d: 0.0
          min_atr_pct: 0.03
        - name: pullback_reversal
          rsi5_max: 40
          min_atr_pct: 0.035
          min_volume_ratio: 1.0
          min_highest_high_gap_pct: -0.1
          require_mid_trend: true
        - name: volume_pullback
          rsi5_max: 45
          min_volume_ratio: 1.2
          max_return_60d: 0.0
          min_atr_pct: 0.03

  exit:
    type: chandelier_exit
    params:
      atr_period: 22
      atr_multiplier: 1000.0
      lookback_period: 22
      hard_stop_pct: -0.07
      take_profit_pct: 0.0
      max_hold_days: 10
      default_exit_confidence: 0.85

  position:
    type: fixed
    params:
      order_amount_per_stock: 20000000
      max_position_pct: 20.0
      max_positions: 3

  paper:
    enabled: true
    check_interval: 60

  backtest:
    initial_capital: 100000000
    risk:
      stop_loss_pct: 7.0
      take_profit_pct: 999.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      max_daily_trades: 3
      force_close_time: ""
      close_on_day_change: false
