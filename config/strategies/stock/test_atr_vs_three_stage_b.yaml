# Test Strategy B: Three Stage Exit
#
# Temporary test configuration for comparing atr_dynamic vs three_stage exits
# Uses trend_pullback entry logic for fair comparison (identical to test_atr_vs_three_stage_a)
# This file will be deleted after backtest comparison is documented

strategy:
  name: test_atr_vs_three_stage_b
  asset_class: stock
  enabled: true
  description: "Test strategy using three_stage exit for comparison with atr_dynamic"
  entry:
    type: trend_pullback
    params:
      bb_period: 20
      bb_std: 2.0
      bb_touch_buffer: 1.01           # Optuna best: BB 하단 근접 기준
      rsi_oversold: 34.0             # Optuna best: RSI 품질 필터 (importance 69%)
      williams_r_oversold: -80.0
      williams_r_reversal: -65.0
      volume_threshold: 1.0
      min_atr_cost_ratio: 0.01
      round_trip_cost: 0.005
      skip_market_open_minutes: 30
      skip_market_close_minutes: 15
      signal_cooldown_seconds: 120   # Optuna best: 더 빠른 재진입
      stop_atr_multiplier: 3.0      # 2.5→3.0: 상승장 변동성 허용
      stop_fallback_cost_multiplier: 3.5  # 3.0→3.5: proportional
  exit:
    type: three_stage
    params:
      # Stage 1: Survival (생존)
      stop_loss_pct: -0.015  # -1.5% 손절
      # Stage 2: Breakeven (본전 확보)
      breakeven_threshold_pct: 0.015  # +1.5% 도달 시 Stage 2로 전환
      # Stage 3: Maximize (수익 극대화)
      maximize_threshold_pct: 0.03  # +3% 도달 시 Stage 3로 전환
      trailing_stop_pct: -0.03  # 최고가 대비 -3% 하락 시 청산
      # Overshooting 감지
      overshoot_threshold_pct: 0.07  # +7% 이상 급등 감지
      overshoot_trailing_pct: -0.015  # 급등 시 -1.5%로 축소
      # Time-based 청산
      time_cut_minutes: 20  # 20분 경과 + 수익 없음 → 청산
      eod_close_hour: 15    # 장 마감 청산 시각 (시)
      eod_close_minute: 15  # 장 마감 청산 시각 (분)
      # 기타 설정
      fee_rate: 0.003  # 거래 수수료 0.3%
      enable_bear_exit: true  # BEAR 시장 시 전량 청산 활성화
  position:
    type: fixed
    params:
      order_amount_per_stock: 1000000
      max_positions: 5
  indicators:
    bollinger_bands:
      period: 20
      std_dev: 2.0
    momentum:
      williams_r_period: 14
  backtest:
    # Keep engine risk as safety net only; let three_stage exit drive liquidation.
    risk:
      stop_loss_pct: 99.0
      take_profit_pct: 999.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      force_close_time: ""
      close_on_day_change: false
      max_daily_trades: 0
