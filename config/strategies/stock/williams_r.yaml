strategy:
  asset_class: stock
  description: Williams %R 과매도 반전 모멘텀 전략
  enabled: true
  entry:
    params:
      allow_short: false
      confidence_reversal_scale: 50.0
      confidence_trend_scale: 10.0
      market_close_hour: 15
      market_close_minute: 15
      market_open_hour: 9
      market_open_minute: 0
      oversold_threshold: -85.0
      reversal_threshold: -80.0
      signal_cooldown_seconds: 7200
      skip_market_close_minutes: 15
      skip_market_open_minutes: 15
      stop_loss_pct: 3.0
      trend_filter: true
      volume_confirm: true
      volume_threshold: 2.0
      williams_r_period: 14
      max_full_size_bb_distance_pct: 0.8
      overextended_position_size_multiplier: 0.1
      market_state_filter:
        enabled: true
        allowed_states:
          - BULL
          - TRENDING_BULL
          - BULL_STRONG
          - BULL_MODERATE
          - SIDEWAYS_UP
        blocked_states:
          - UNKNOWN
          - BEAR
          - TRENDING_BEAR
          - VOLATILE_SIDEWAYS
          - CALM_SIDEWAYS
          - MEAN_REVERTING
          - SIDEWAYS_FLAT
          - SIDEWAYS_DOWN
          - BEAR_MODERATE
          - BEAR_STRONG
    type: williams_r
  exit:
    params:
      default_exit_confidence: 0.8
      eod_close_hour: 15
      eod_close_minute: 15
      max_stop_loss_pct: -0.03
      overbought_threshold: 0.0
      time_cut_minutes: 240
    type: williams_r_exit
  indicators:
    bollinger_bands:
      period: 20
      std_dev: 2.0
    momentum:
      williams_r_period: 14
  name: williams_r
  position:
    params:
      # 2026-05-22: reduce active paper exposure until fresh post-cutover
      # evidence exists; previous sizing could allocate nearly half of capital
      # to a strategy with no recent active closed-trade sample.
      max_positions: 2
      max_position_pct: 5.0
      order_amount_per_stock: 1000000
    type: fixed
  paper:
    enabled: true
    activated_at: "2026-05-22T21:40:00+09:00"
    check_interval: 60
  backtest:
    initial_capital: 100000000
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 999.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      max_daily_trades: 5
      force_close_time: ""
      close_on_day_change: false
