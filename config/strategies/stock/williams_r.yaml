strategy:
  asset_class: stock
  description: Williams %R 과매도 반전 모멘텀 전략
  enabled: false
  entry:
    params:
      allow_short: false
      confidence_reversal_scale: 50.0
      confidence_trend_scale: 10.0
      market_close_hour: 15
      market_close_minute: 15
      market_open_hour: 9
      market_open_minute: 0
      oversold_threshold: -75.0
      reversal_threshold: -75.0
      signal_cooldown_seconds: 180
      skip_market_close_minutes: 15
      skip_market_open_minutes: 15
      stop_loss_pct: 3.0
      trend_filter: false
      volume_confirm: true
      volume_threshold: 1.0
      williams_r_period: 14
    type: williams_r
  exit:
    params:
      default_exit_confidence: 0.8
      eod_close_hour: 15
      eod_close_minute: 15
      max_stop_loss_pct: -0.03
      overbought_threshold: -5.0
      time_cut_minutes: 120
    type: williams_r_exit
  indicators:
    bollinger_bands:
      period: 20
      std_dev: 2.0
    momentum:
      williams_r_period: 14
  name: williams_r
  position:
    params:
      max_positions: 5
      order_amount_per_stock: 1000000
    type: fixed
