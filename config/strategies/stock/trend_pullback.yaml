strategy:
  name: trend_pullback
  asset_class: stock
  enabled: true
  description: "멀티 타임프레임 추세 추종 눌림목 전략"
  entry:
    type: trend_pullback
    params:
      bb_period: 20
      bb_std: 2.0
      bb_touch_buffer: 1.01           # Optuna best: BB 하단 근접 기준
      rsi_oversold: 34.0             # Optuna best: RSI 품질 필터 (importance 69%)
      williams_r_oversold: -80.0
      williams_r_reversal: -65.0
      volume_threshold: 1.0
      min_atr_cost_ratio: 0.01
      round_trip_cost: 0.005
      skip_market_open_minutes: 30
      skip_market_close_minutes: 15
      signal_cooldown_seconds: 120   # Optuna best: 더 빠른 재진입
      stop_atr_multiplier: 3.0      # 2.5→3.0: 상승장 변동성 허용
      stop_fallback_cost_multiplier: 3.5  # 3.0→3.5: proportional
  exit:
    type: atr_dynamic
    params:
      atr_period: 14
      stop_atr_multiplier: 3.5      # Optuna best: 넓은 손절 허용
      trail_activation_atr: 1.0     # Optuna best: 빠른 트레일링 활성
      trail_atr_multiplier: 2.0     # Optuna best: 넓은 트레일링 폭
      eod_close_enabled: false
      default_exit_confidence: 0.85
  position:
    type: fixed
    params:
      order_amount_per_stock: 1000000
      max_positions: 5
  indicators:
    bollinger_bands:
      period: 20
      std_dev: 2.0
    momentum:
      williams_r_period: 14
  backtest:
    # Keep engine risk as safety net only; let atr_dynamic exit drive liquidation.
    risk:
      stop_loss_pct: 99.0
      take_profit_pct: 999.0
      trailing_stop_enabled: false
      max_hold_bars: 0
      force_close_time: ""
      close_on_day_change: false
      max_daily_trades: 0
