# RL M-PPO profile: stricter SHORT entry threshold (candidate)

strategy:
  name: rl_mppo_profile_asym_short_strict
  asset_class: futures
  enabled: false
  description: "RL M-PPO candidate with stricter SHORT confidence than LONG"

  entry:
    type: rl_mppo
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto

      min_confidence: 0.6
      backtest_min_confidence: 0.40
      long_min_confidence: 0.60
      short_min_confidence: 0.65
      backtest_long_min_confidence: 0.40
      backtest_short_min_confidence: 0.45

      skip_market_open_minutes: 5
      skip_market_close_minutes: 30
      apply_time_filter_in_backtest: true
      day_session_enabled: true
      day_market_open: "09:00"
      day_market_close: "15:45"
      night_session_enabled: true
      night_market_open: "18:00"
      night_market_close: "05:00"

      enable_hold_override: false
      hold_override_max_gap: 0.12
      hold_override_min_entry_prob: 0.33
      hold_override_min_confidence: 0.35
      backtest_hold_override_min_confidence: 0.30

  exit:
    type: rl_mppo_exit
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto
      min_exit_confidence: 0.5
      backtest_min_exit_confidence: 0.35
      hard_stop_pct: -0.03
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1

  backtest:
    initial_capital: 100_000_000
    point_value: 250_000
    risk:
      stop_loss_pct: 999.0
      take_profit_pct: 999.0
      force_close_time: ""
      close_on_day_change: true
