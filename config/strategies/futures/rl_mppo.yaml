# RL M-PPO 전략 설정 (선물 전용)
# 학습된 M-PPO 모델을 Entry + Exit SignalGenerator로 래핑

strategy:
  name: rl_mppo
  asset_class: futures
  enabled: true
  description: "Maskable PPO RL agent for KOSPI200 futures intraday trading"

  entry:
    type: rl_mppo
    params:
      # 학습된 모델 경로
      model_path: "models/futures/rl/mppo_best/best_model.zip"

      # 추론 설정
      deterministic: true
      device: auto

      # 진입 필터
      min_confidence: 0.6            # action probability 최소값
      backtest_min_confidence: 0.35  # 백테스트 시 낮은 threshold (모델 confidence ~0.48)
      paper_min_confidence: 0.50
      paper_long_min_confidence: 0.50
      paper_short_min_confidence: 0.50
      skip_market_open_minutes: 5    # 장 시작 후 관망
      skip_market_close_minutes: 30  # 15:45-30=15:15 — EOD close와 일치
      paper_skip_market_close_minutes: 30  # 15:15 이후 신규 진입 방지 (EOD 15:15 정렬)
      paper_eod_hard_block_minutes: 10  # 잔여 10분 이내 신규 진입 하드 차단
      day_session_enabled: true
      day_market_open: "09:00"
      day_market_close: "15:45"
      night_session_enabled: false
      enable_hold_override: false    # 기본값 비활성 — near-HOLD 강제 진입 방지
      hold_override_max_gap: 0.12    # hold_prob - best_entry_prob <= 0.12
      hold_override_min_entry_prob: 0.33  # 진입 후보 최소 확률
      hold_override_min_confidence: 0.35  # 오버라이드 시 적용할 최소 확률
      backtest_hold_override_min_confidence: 0.30
      paper_enable_hold_override: false
      paper_hold_override_max_gap: 0.12
      paper_hold_override_min_entry_prob: 0.28
      paper_hold_override_min_confidence: 0.50
      # Risk-off crash protection: disabled — RL 양방향 모델이 자체 판단
      # 2026-03-09: 상승장 Sharpe -14.77→9.67, 변동성 장세에서도 방어 효과 없음 확인
      risk_off_long_block_enabled: false
      risk_off_change_threshold: -0.02
      risk_off_regime_block_enabled: false
      risk_off_short_min_confidence: 0.42
      risk_off_backtest_short_min_confidence: 0.35
      risk_off_paper_short_min_confidence: 0.40
      risk_off_hold_override_prefer_short: true
      risk_off_hold_override_max_long_advantage: 0.20
      risk_off_flip_long_to_short_enabled: false
      risk_off_flip_min_short_prob: 0.30
      risk_off_regime_keywords:
        - "BEAR"
        - "RISK_OFF"
        - "STRONG_BEARISH"
        - "BEARISH"
        - "SIDEWAYS_DOWN"

      # Shadow mode (Phase 0.3 — LLM-primary RL-minimization plan).
      # When true: inference runs fully (confidence filter included) but
      # no Signal is emitted and no order is placed.  Predictions are
      # buffered in memory and flushed to kospi.rl_shadow_predictions
      # (ClickHouse V6 migration) for counterfactual analysis vs Setup A/C.
      # Default: false (normal live execution).
      shadow_mode: false
      #
      # To enable shadow mode (operator must set explicitly):
      #   shadow_mode: true

  exit:
    type: rl_mppo_exit               # RL 학습된 청산 정책
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto
      min_exit_confidence: 0.5       # 청산은 진입(0.6)보다 적극적
      backtest_min_exit_confidence: 0.3  # 백테스트 시 낮은 threshold
      min_hold_seconds: 60
      backtest_min_hold_seconds: 0
      # 안전장치
      hard_stop_pct: -0.03           # -3% (모델 학습 시 허용 범위)
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1

  # 백테스트 설정 — 학습 환경과 일치시킴
  backtest:
    initial_capital: 100_000_000   # 학습 env.initial_balance와 동일
    point_value: 250_000           # KOSPI200 선물 계약 승수
    use_precomputed_rl_features: false  # 실시간 indicator 경로와 정합성 우선
    risk:
      stop_loss_pct: 999.0         # 비활성 — RL이 자체 exit 정책 사용
      take_profit_pct: 999.0       # 비활성 — RL이 자체 exit 정책 사용
      force_close_time: ""          # 비활성 — RL exit이 자체 EOD/hard_stop 관리
      close_on_day_change: true    # 학습 환경과 동일 — 일 경계 포지션 청산
