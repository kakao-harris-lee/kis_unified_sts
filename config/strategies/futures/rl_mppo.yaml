# RL M-PPO Ваёвъх ВёцВаЋ (Вёавг╝ ВаёВџЕ)
# ьЋЎВіхвљю M-PPO вфевЇИВЮё EntrySignalGeneratorвАю въўьЋЉ

strategy:
  name: rl_mppo
  asset_class: futures
  enabled: true
  description: "Maskable PPO RL agent for KOSPI200 futures intraday trading"

  entry:
    type: rl_mppo
    params:
      # ьЋЎВіхвљю вфевЇИ Ж▓йвАю
      model_path: "models/futures/rl/mppo_best/best_model.zip"

      # ВХћвАа ВёцВаЋ
      deterministic: true
      device: auto

      # ВДёВъЁ ьЋёьё░
      min_confidence: 0.6            # action probability ВхюВєїЖ░њ
      skip_market_open_minutes: 5    # ВъЦ ВІюВъЉ ьЏё Ж┤ђвДЮ
      skip_market_close_minutes: 10  # ВъЦ вДѕЖ░љ Ваё ВІаЖию ВДёВъЁ ЖИѕВДђ

  exit:
    type: three_stage                # ЖИ░ВА┤ 3-Stage Exit ВъгВѓгВџЕ
    params:
      hard_stop_pct: -0.015          # -1.5%
      breakeven_threshold_pct: 0.01  # +1.0%
      breakeven_buffer_pct: 0.001    # +0.1%
      maximize_threshold_pct: 0.03   # +3.0%
      trailing_stop_pct: -0.02       # -2.0% from high
      tight_trailing_pct: -0.01      # -1.0%
      tight_trailing_trigger_pct: 0.05  # +5.0%

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1
