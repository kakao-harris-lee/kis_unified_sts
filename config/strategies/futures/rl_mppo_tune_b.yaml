strategy:
  name: rl_mppo_tune_b
  asset_class: futures
  enabled: false
  description: RL M-PPO tuned profile B (long_bias)
  entry:
    type: rl_mppo
    params:
      model_path: models/futures/rl/mppo_best/best_model.zip
      deterministic: true
      device: auto
      min_confidence: 0.6
      backtest_min_confidence: 0.35
      paper_min_confidence: 0.4
      paper_long_min_confidence: 0.4
      paper_short_min_confidence: 0.48
      skip_market_open_minutes: 5
      skip_market_close_minutes: 30
      paper_skip_market_close_minutes: 30
      paper_eod_hard_block_minutes: 10
      day_session_enabled: true
      day_market_open: 09:00
      day_market_close: '15:45'
      night_session_enabled: false
      enable_hold_override: true
      hold_override_max_gap: 0.12
      hold_override_min_entry_prob: 0.33
      hold_override_min_confidence: 0.35
      backtest_hold_override_min_confidence: 0.3
      paper_enable_hold_override: true
      paper_hold_override_max_gap: 0.18
      paper_hold_override_min_entry_prob: 0.22
      paper_hold_override_min_confidence: 0.25
  exit:
    type: rl_mppo_exit
    params:
      model_path: models/futures/rl/mppo_best/best_model.zip
      deterministic: true
      device: auto
      min_exit_confidence: 0.5
      backtest_min_exit_confidence: 0.3
      hard_stop_pct: -0.03
      eod_close_hour: 15
      eod_close_minute: 15
  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1
  backtest:
    initial_capital: 100000000
    point_value: 250000
    use_precomputed_rl_features: false
    risk:
      stop_loss_pct: 999.0
      take_profit_pct: 999.0
      force_close_time: ''
      close_on_day_change: true
