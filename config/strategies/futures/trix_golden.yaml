# TRIX Golden (Futures port from stock-validated config)
#
# TRIX (EMA 3차 도함수) 황금신호 + 비상관 필터. Acceleration mode로 TRIX 음→양 전환 가속 포착.
#
# === Sanity 백테스트 결과 (2026-05-27, point_value=50000 mini) ===
# 68 trades, 승률 41.2%, PF 0.51, Sharpe -3.31, 수익률 **-95.0%**, MDD 115.7%
# 청산: EOD 59회 (87%!) + stop_loss 9회 → 추세가 인트라데이로 끝나고 다음날까지 안 이어짐.
# 진입 시그널 자체는 양호 (승률 41%) 하지만 KOSPI200 선물 EOD 강제청산 환경에서
# 추세 추종이 본질적으로 어려움. 정확한 mini multiplier로 자본 95% 손실.
#
# enabled: false — **활성화 금지**. 참조: reports/trend_following_attempt_2026-05-27.md

strategy:
  name: trix_golden_futures
  asset_class: futures
  enabled: false
  description: "TRIX Golden (futures port) — 5분봉 EMA 3차 도함수 추세"

  backtest:
    initial_capital: 10000000
    point_value: 50000   # KOSPI200 mini multiplier per execution.yaml

  entry:
    type: trix_golden
    params:
      trix_n: 12
      trix_signal: 9
      trix_entry_mode: "acceleration"
      trix_min_negative_bars: 3
      cci_period: 9
      cci_lower: 0.0
      cci_upper: 300.0
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      sto_fastk: 12
      sto_slowk: 5
      sto_slowd: 5
      use_uncorrelated_filters: true
      require_above_sma: true
      sma_period: 20
      rvol_filter: false
      rvol_threshold: 1.2
      max_atr_pct: 0.008
      atr_period: 14
      obv_filter: false

      # Futures backtest lacks regime → disable market_state filter
      market_state_filter:
        enabled: false
        allowed_states: []
        blocked_states: []

      stop_loss_pct: 3.0
      skip_market_open_minutes: 15
      skip_market_close_minutes: 15
      signal_cooldown_seconds: 300

  exit:
    type: three_stage
    params:
      stop_loss_pct: -0.025
      breakeven_threshold_pct: 0.015
      maximize_threshold_pct: 0.035
      trailing_stop_pct: -0.020
      overshoot_threshold_pct: 0.070
      overshoot_trailing_pct: -0.012
      time_cut_minutes: 480
      eod_close_hour: 15
      eod_close_minute: 40

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 2
