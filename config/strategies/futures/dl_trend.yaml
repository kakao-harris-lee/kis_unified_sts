# DL Trend Strategy Configuration (Futures Only)
# CNN-LSTM 기반 추세 추종 전략

strategy:
  name: dl_trend
  asset_class: futures
  enabled: true
  description: "Deep Learning Trend Following with Ensemble Filter"

  entry:
    type: futures_dl_trend
    params:
      # DL 확률 임계값
      dl_threshold: 0.85
      max_atr_threshold: 1.5

      # Z-score 임계값 (Multi-horizon 캘리브레이션)
      zscore_trigger_threshold: 1.0
      zscore_long_confirm_threshold: 0.5
      zscore_short_confirm_threshold: 0.0

      # 이동평균 기간
      ma_fast_period: 20
      ma_slow_period: 60

      # Multi-horizon 설정
      use_multi_horizon: true
      horizons: [1, 3, 5, 10]

  exit:
    type: atr_trailing
    params:
      # ATR 기반 트레일링 스탑
      atr_multiplier: 2.0
      initial_stop_atr: 1.5

      # 시간 기반 청산
      max_hold_minutes: 30

      # 고정 손절/익절
      stop_loss_ticks: 10
      take_profit_ticks: 20

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 2
