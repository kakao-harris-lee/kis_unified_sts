# BB Reversion Strategy (Futures)
#
# Optuna 최적화 결과 기반 선물 전용 파라미터
# - 데이터: KOSPI200 선물 (101S6000), 98,127 bars, 2024-12 ~ 2026-01
# - 최적화: 200 trials, TPE sampler, Sharpe 기준
#
# 주요 개선:
#   1. MACD 히스토그램 필터 (역추세 진입 방지)
#   2. BUY-only 모드 (상승 추세 시장에서 SELL 손실 제거)
#   3. BB 기간/표준편차 조정 (32/1.8 → 노이즈 감소)
#   4. BB bandwidth 필터 (횡보 구간 오신호 제거)

strategy:
  name: bb_reversion
  asset_class: futures
  enabled: false  # 15min 단독 운용 전환 (2026-02-06)
  description: "볼린저 밴드 하단 + RSI 과매도 + MACD 필터 선물 전략 (1분봉)"

  entry:
    type: mean_reversion
    params:
      # Bollinger Bands (Optuna: bb_period=32, bb_std=1.8)
      bb_period: 32
      bb_std: 1.8
      bb_touch_buffer: 1.03

      # RSI (Optuna: rsi_oversold=32, rsi_overbought=80)
      rsi_period: 16
      rsi_oversold: 32
      rsi_overbought: 80

      # MACD 필터 (Optuna importance 10%, top5 전원 True)
      use_macd_filter: true
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9

      # BUY-only 모드 (BUY WR 70% vs SELL WR 53%)
      buy_only: true

      # 시장 레짐 필터: 테스트 결과 효과 없음 (2026-02-06)
      # - 200 trials Optuna 최적화 (Sharpe 기준, SMA 레짐 감지)
      # - 최적 결과: 모든 레짐에서 buy_only → 기존과 동일 (Sharpe 11.74)
      # - sell_only/none/both 모드는 Sharpe 1.2~10.6으로 악화
      # - regime_bear_mode 중요도 75.6% (buy_only 아닌 값은 일관적 손실)
      # - 결론: 현행 buy_only=true 유지, 하락장 SELL 전략은 이 데이터에서 비유효
      use_regime_filter: false

      # BB bandwidth 필터 (좁은 밴드 = 횡보 → 오신호 제거)
      # Optuna 탐색 결과: 0.003 최적 (score=86.31, ret+82%, sharpe=22.3, pf=13.18)
      min_bb_bandwidth: 0.003

      # 파라미터 완화 + 오버피팅 검증 결과 (2026-02-06)
      # - 감도 분석: bb_std, bb_touch_buffer, min_bb_bandwidth 안정적; rsi_oversold가 거래 빈도 주도
      # - 완화 최적화 (200t, Sharpe*trade_penalty): bb_std=1.6, rsi=35, no_macd → 33회/Sharpe 10.9
      #   거래 4회 증가에 불과, MaxDD 6.7%→10.2% 악화
      # - Walk-Forward 3구간 (60/20/20):
      #   현재 파라미터: Train Sharpe=7.59(16t), Val=13.58(5t), Test=13.50(8t) — 거래 수 과소
      #   완화 파라미터: Train=10.21(16t), Val=18.54(6t), Test=3.61(13t) — 오버피팅 확인
      # - 결론: 현행 파라미터 유지. 거래 수 부족(29회/14개월)이 근본 문제.
      #   더 많은 데이터 축적 또는 다른 자산군 확장 필요
      #
      # 멀티 전략 통합 분석 (2026-02-06): 15min 단독 운용 전환
      # - 1min+15min 50:50 합산: 329t, Sharpe 1.52, Return +5.94%
      # - 시그널 겹침률 29.1% (70%+ 독립) — 상보성 확인
      # - 그러나 1min WF 미검증, 15min 단독이 우월 (Sharpe 5.11, Return +13.72%)
      # - 1min은 데이터 축적 후 WF 재검증 시 활성화 검토

  exit:
    type: three_stage
    params:
      stop_loss_pct: -0.04
      take_profit_pct: 0.05
      breakeven_threshold_pct: 0.02
      trailing_stop_pct: -0.03
      # ATR 기반 동적 손절: 테스트 결과 불필요 (2026-02-06)
      # - 인트라데이 전략이므로 세션 종료(15:35) 청산이 주요 청산 방식
      # - ATR x1.5~x5.0: 조기 청산으로 성능 저하 (Sharpe -1.4~+1.5 vs 기준 2.2)
      # - ATR x10+: 너무 넓어 미작동 = 손절 없음과 동일
      # - 고정 4% 손절도 세션 내 미작동 (가격 변동 < 0.1%)
      # - 결론: 현행 세션 종료 청산 유지, 필요시 스윙 전략 전환 후 재검토
      session_close_time: "15:35"

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 2

  indicators:
    bollinger_bands:
      period: 32
      std_dev: 1.8
    rsi:
      period: 16
    macd:
      fast_period: 12
      slow_period: 26
      signal_period: 9
