# RL M-PPO profile with strict volatility-regime confidence switch (backtest candidate)

strategy:
  name: rl_mppo_profile_regime_strict
  asset_class: futures
  enabled: false
  description: "RL M-PPO profile with stricter adaptive confidence in high volatility"

  entry:
    type: rl_mppo
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto

      min_confidence: 0.6
      backtest_min_confidence: 0.40
      skip_market_open_minutes: 5
      skip_market_close_minutes: 30

      enable_hold_override: false
      hold_override_max_gap: 0.12
      hold_override_min_entry_prob: 0.33
      hold_override_min_confidence: 0.35
      backtest_hold_override_min_confidence: 0.30

      adaptive_confidence_enabled: true
      adaptive_confidence_metric: atr_ratio
      adaptive_confidence_trigger: 0.0005
      adaptive_confidence_backtest_boost: 0.10
      adaptive_confidence_live_boost: 0.10
      adaptive_hold_confidence_backtest_boost: 0.06
      adaptive_hold_confidence_live_boost: 0.06
      adaptive_confidence_cap: 0.75

  exit:
    type: rl_mppo_exit
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto
      min_exit_confidence: 0.5
      backtest_min_exit_confidence: 0.35
      hard_stop_pct: -0.03
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1

  backtest:
    initial_capital: 100_000_000
    point_value: 250_000
    risk:
      stop_loss_pct: 999.0
      take_profit_pct: 999.0
      force_close_time: ""
      close_on_day_change: true
