# RL M-PPO profile: uptrend participation + spike protection (candidate)

strategy:
  name: rl_mppo_profile_uptrend_spike_guard
  asset_class: futures
  enabled: false
  description: "RL M-PPO candidate for rising markets with sudden-drop guard"

  entry:
    type: rl_mppo
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto

      # Directional confidence: favor long entries, suppress weak shorts.
      min_confidence: 0.6
      backtest_min_confidence: 0.40
      long_min_confidence: 0.60
      short_min_confidence: 0.65
      backtest_long_min_confidence: 0.40
      backtest_short_min_confidence: 0.50

      # Session filters
      skip_market_open_minutes: 5
      skip_market_close_minutes: 30
      paper_skip_market_close_minutes: 0
      day_session_enabled: true
      day_market_open: "09:00"
      day_market_close: "15:45"
      night_session_enabled: false

      # HOLD override tuned from recent cache replay (moderately aggressive).
      enable_hold_override: true
      hold_override_max_gap: 0.12
      hold_override_min_entry_prob: 0.22
      hold_override_min_confidence: 0.35
      backtest_hold_override_min_confidence: 0.35

      # Paper overrides for tomorrow monitoring (more trades than strict profile).
      paper_min_confidence: 0.40
      paper_long_min_confidence: 0.40
      paper_short_min_confidence: 0.48
      paper_enable_hold_override: true
      paper_hold_override_max_gap: 0.18
      paper_hold_override_min_entry_prob: 0.22
      paper_hold_override_min_confidence: 0.30

      # Volatility-adaptive threshold:
      # Trigger on top ~10% intraday ATR ratio to avoid spike chasing.
      adaptive_confidence_enabled: true
      adaptive_confidence_metric: atr_ratio
      adaptive_confidence_trigger: 0.000002
      adaptive_confidence_backtest_boost_long: 0.02
      adaptive_confidence_backtest_boost_short: 0.05
      adaptive_confidence_live_boost_long: 0.03
      adaptive_confidence_live_boost_short: 0.06
      adaptive_hold_confidence_backtest_boost: 0.03
      adaptive_hold_confidence_live_boost: 0.04
      adaptive_confidence_cap: 0.75

  exit:
    type: rl_mppo_exit
    params:
      model_path: "models/futures/rl/mppo_best/best_model.zip"
      deterministic: true
      device: auto
      min_exit_confidence: 0.5
      backtest_min_exit_confidence: 0.35
      hard_stop_pct: -0.03
      eod_close_hour: 15
      eod_close_minute: 15

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 1

  backtest:
    initial_capital: 100_000_000
    point_value: 250_000
    risk:
      stop_loss_pct: 999.0
      take_profit_pct: 999.0
      force_close_time: ""
      close_on_day_change: true
