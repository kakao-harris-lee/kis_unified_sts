# Setup C — Event Reaction strategy (futures, intraday)
#
# Phase 1.0 of the LLM-primary RL-minimization plan (PR #160 §2.4).
# Adapter pattern: SetupCEventReaction wrapped as an EntryRegistry strategy so
# it flows through the existing TradingOrchestrator pipeline.
#
# IMPORTANT: enabled=false until Gate 1–3 of phase5-verification.md are passed
# and the operator provides written approval.  See:
#   docs/runbooks/phase5-verification.md
#   docs/runbooks/futures-paradigm-operations.md

strategy:
  name: setup_c_event_reaction
  asset_class: futures
  enabled: false
  description: >
    Event-reaction entry: fires when a high-impact macro event occurred recently
    and the price subsequently breaks out of the 15-minute post-announcement
    trading range — confirming the market's reaction direction.

  entry:
    type: setup_c_event_reaction
    params:
      enabled: true  # inner setup flag; outer strategy.enabled guards activation

      # Event look-back window
      window_minutes: 15           # Events older than this are ignored

      # Breakout confirmation
      breakout_buffer_atr_mult: 0.5  # Breakout within this many ATRs of 15-min range

      # Exit target
      target_atr_mult: 2.5         # Take-profit = entry ± target_atr_mult × ATR14

      # Signal validity
      signal_ttl_minutes: 30

      # Impact tier filter: 1 = top tier, 3 = minor; default=2 skips tier-3 events
      min_impact_tier: 2

      # Phase 1.1 LLM-aware threshold tuning (INNER gate).
      # NOTE: This is the inner gate — see strategy.enabled (line 14) for
      # the OUTER gate that controls whether Setup C runs at all.
      # Operator must flip strategy.enabled: true after Gate 1-3
      # paper-rollout validation; llm_tuning.enabled below toggles only
      # whether the LLM scaling kicks in inside Setup C.
      llm_tuning:
        enabled: true                            # inner switch (LLM scaling on/off)
        min_context_confidence: 0.3              # below this, skip LLM adjustment
        bull_strong_regime: "BULL_STRONG"
        atr_loose_factor: 0.8
        long_blocked_regimes: ["BEAR_STRONG", "BEAR_MODERATE"]
        short_blocked_regimes: []

  exit:
    # Use the RL-based exit policy, consistent with all futures strategies.
    type: rl_mppo_exit
    params: {}

  position:
    type: fixed
    params:
      quantity: 1

