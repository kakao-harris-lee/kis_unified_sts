# Setup C — Event Reaction strategy (futures, intraday)
#
# Phase 1.0 of the LLM-primary RL-minimization plan (PR #160 §2.4).
# Adapter pattern: SetupCEventReaction wrapped as an EntryRegistry strategy so
# it flows through the existing TradingOrchestrator pipeline.
#
# Phase 2 activation (PR #171 — LLM-primary RL-minimization plan §4):
#   - Operator §7-3 decision approved LLM-primary paradigm shift.
#   - RL demoted to shadow mode (counterfactual logging only); Setup A/C are
#     now the PRIMARY entry strategies for futures paper trading.
#   - futures_live.enabled remains false (paper only); live activation still
#     requires the full Gate 1–4 procedure in phase5-verification.md.
#   - Rollback: flip enabled: false below (or revert this commit).
# See also:
#   docs/runbooks/phase5-verification.md
#   docs/runbooks/futures-paradigm-operations.md
#   docs/plans/2026-05-03-llm-primary-rl-minimization.md §4 Phase 2

strategy:
  name: setup_c_event_reaction
  asset_class: futures
  enabled: true
  description: >
    Event-reaction entry: fires when a high-impact macro event occurred recently
    and the price subsequently breaks out of the 15-minute post-announcement
    trading range — confirming the market's reaction direction.

  entry:
    type: setup_c_event_reaction
    params:
      enabled: true  # inner setup flag; outer strategy.enabled guards activation

      # Event look-back window
      window_minutes: 15           # Events older than this are ignored

      # Breakout confirmation
      breakout_buffer_atr_mult: 0.5  # Breakout within this many ATRs of 15-min range

      # Exit target
      target_atr_mult: 2.5         # Take-profit = entry ± target_atr_mult × ATR14

      # Stop cushion: the raw stop sits at the opposite 15-min range edge (~1.3×
      # 1-min ATR away) → failed breakouts whipsawed out in 3-5 min. Push the
      # stop this many ATRs BEYOND the edge so a normal pullback survives.
      stop_buffer_atr_mult: 0.5

      # Late-session entry cutoff (minutes since 09:00 KST; 360 = 15:00 KST).
      # No new entries after this → no churn from positions opened right before
      # the 15:45 force-close.
      no_entry_after_minutes_since_open: 360

      # Signal validity
      signal_ttl_minutes: 30

      # Impact tier filter: 1 = top tier, 3 = minor; default=2 skips tier-3 events
      min_impact_tier: 2

      # Daily bias filter — filters entries against the intraday directional bias.
      # Provided by DailyBiasProvider; false = disabled (default safe).
      daily_bias_filter_enabled: false
      daily_bias_min_confidence: 0.5    # Min bias confidence to apply filter

      # Phase 1.1 LLM-aware threshold tuning (INNER gate).
      # NOTE: This is the inner gate — see strategy.enabled (line 14) for
      # the OUTER gate that controls whether Setup C runs at all.
      # Operator must flip strategy.enabled: true after Gate 1-3
      # paper-rollout validation; llm_tuning.enabled below toggles only
      # whether the LLM scaling kicks in inside Setup C.
      llm_tuning:
        enabled: true                            # inner switch (LLM scaling on/off)
        min_context_confidence: 0.3              # below this, skip LLM adjustment
        bull_strong_regime: "BULL_STRONG"
        atr_loose_factor: 0.8
        long_blocked_regimes: ["BEAR_STRONG", "BEAR_MODERATE"]
        short_blocked_regimes: []
        # Phase 1.2 — LLM veto authority (entry signals only; exit/stop never vetoed)
        # Requires master enabled=true above.  Set veto_enabled=false to disable
        # veto independently of threshold/size adjustments.
        veto_enabled: true
        veto_min_confidence: 0.6          # LLM confidence threshold to activate veto
        veto_long_block_signal: "STRONG_BEARISH"   # opposing signal that blocks longs
        veto_short_block_signal: "STRONG_BULLISH"  # opposing signal that blocks shorts

      # Phase 5 forecast integration — Phase D canary activated 2026-05-13
      forecast_integration:
        enabled: true                        # feature flag
        buffer_vol_mult: 0.5
        target_vol_mult: 2.5
        min_event_impact_score: 60
        vol_baseline_window_days: 30
        stale_forecast_fallback: "atr"
        inverse_vol_position_size: true

      # P2-③ RegimeGate (spec 2026-05-22). Default off — operator opt-in.
      # When enabled: gate checks `forecast:vol:current` Redis (live HAR-RV)
      # + event_scores CH (low-frequency) after LLM veto, before signal
      # emission. Block → entry suppressed. Decisions logged to
      # regime_gate_decisions for weekly counterfactual review.
      regime_gate:
        enabled: false
        regime_percentile_max: 60.0       # T12 default; tighten/loosen after first 2wk paper
        impact_score_max: 70
        event_window_minutes: 15
        require_overnight_us_direction: false   # PERMISSIVE in live (no macro on EntryContext)
        permissive_on_missing: true

  exit:
    # Reverted to setup_target_exit 2026-06-21: real-signal holdout backtest (PR #495,
    # clean window) showed the Track A trailing exit underperforms (Sharpe -1.24 vs +2.02
    # for fixed stop/target on real Setup A). TrackAExit code + track_a_exit.yaml retained
    # (registered) for future re-tuning; re-enable by setting type back to track_a_exit.
    type: setup_target_exit
    params:
      eod_close_enabled: true
      eod_close_hour: 15
      eod_close_minute: 15
      default_exit_confidence: 0.9

  position:
    # Phase 1.3: multi-tier LLM-aware sizing replaces the previous fixed sizer.
    # base_quantity mirrors the old fixed.quantity (1 contract).
    # max_quantity_cap mirrors futures_live.max_position_size_contracts (default 1).
    # The order_router independently enforces the same cap (defense in depth).
    type: llm_adaptive
    params:
      base_quantity: 1       # Pre-scaling size (contracts); mirrors former fixed.quantity
      max_quantity_cap: 1    # Hard cap (contracts); mirrors futures_live.max_position_size_contracts

      # Phase 1.3 multi-tier risk-score scaling.
      # Evaluated in order; first tier whose upper_bound >= risk_score wins.
      # scale=0.0 means "skip entry" (exit/stop logic is unaffected).
      # Set tiers: [] to revert to legacy single-threshold mode for testing.
      tiers:
        - [30, 1.0]   # risk_score <= 30  → ×1.0 (full size)
        - [60, 0.7]   # risk_score <= 60  → ×0.7
        - [80, 0.4]   # risk_score <= 80  → ×0.4
        - [100, 0.0]  # risk_score <= 100 → ×0.0 (entry skip)
