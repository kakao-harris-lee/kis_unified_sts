# MA Crossover Strategy (Futures)
#
# SMA 골든크로스/데드크로스 기반 추세추종 선물 전략
# - 데이터: KOSPI200 선물 (101S6000), kospi200f_1m, ~98K bars, 14개월
# - bb_reversion(평균회귀)과 상호보완적 (추세추종)
#
# ⚠ 전략 평가: 1분봉에서 비유효 (2026-02-06 분석 완료)
#
# Optuna 최적화 결과 (200 trials, TPE, Sharpe×trade_penalty):
#   Best: short=11, long=19, buy_only=True, min_bw=0.005
#   전체 데이터: Trades=200, Sharpe=2.55, Return=+5.16%, WR=57%, PF=1.49
#   전원 force_close (세션 종료 청산)
#
# Walk-Forward 검증 (60/20/20):
#   Optuna 최적: Train Sharpe=4.57 → Test=0.51 (저하율 88.7%) → 오버피팅
#   WF 재최적화: Train Sharpe=2.86 → Test=0.44 (저하율 84.8%) → 동일
#
# 감도 분석 결론:
#   - 순수 MA crossover: 전 조합 손실 (Sharpe -0.75~-2.48, 거래 1000~8000회)
#   - buy_only=True: Sharpe 0.67까지 개선, 여전히 수익률 음수
#   - 1분봉 SMA crossover는 whipsaw에 본질적으로 취약
#   - 최적화된 파라미터는 out-of-sample에서 일관되게 실패
#
# 결론: 1분봉 KOSPI200 선물에서 MA crossover는 비유효.
#   향후 검토 가능: 5분/15분봉 리샘플링, EMA 대체, 추가 필터

strategy:
  name: ma_crossover
  asset_class: futures
  enabled: false  # Walk-Forward 실패로 비활성화
  description: "SMA 크로스오버 추세추종 선물 전략 (1분봉 비유효)"

  entry:
    type: trend_following
    params:
      # Optuna 최적 파라미터 (참고용, 실전 배포 불가)
      short_period: 11
      long_period: 19
      buy_only: true
      use_macd_filter: false
      min_bb_bandwidth: 0.005
      use_volume_filter: false

  exit:
    type: three_stage
    params:
      stop_loss_pct: -0.05
      take_profit_pct: 0.05
      breakeven_threshold_pct: 0.02
      trailing_stop_pct: -0.03
      session_close_time: "15:35"

  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 2

  indicators:
    sma_short:
      period: 11
    sma_long:
      period: 19
