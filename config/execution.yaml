execution:
  trading_mode: ${TRADING_MODE:PAPER}
  max_retries: 3
  retry_delay: 1.0
  orders_per_second: 5.0
  account_no: ${KIS_ACCOUNT_NO:}
  order_request_timeout_seconds: 5.0

  # Futures live execution safety: fill inquiry + timeout cancel
  futures_fill_check_enabled: true
  futures_fill_check_poll_interval_seconds: 0.2
  futures_fill_check_timeout_seconds: 1.0
  futures_auto_cancel_unfilled: true

# 유동성 부족 포지션 자동 청산 — 틱 수신 없는 포지션 타임아웃 강제 청산
stale_position:
  enabled: true
  timeout_seconds: 600        # 10분 이상 틱 없으면 청산 (IndicatorEngine stale 180s + 버퍼)
  min_holding_seconds: 120    # 진입 후 최소 2분은 대기 (진입 직후 스프레드 안정화)
  asset_classes: [stock]      # 주식만 적용 (선물은 유동성 충분)

# Position tracker batch insert settings
position_tracker:
  batch_size: 50                  # Number of closed positions to batch before flush
  flush_interval_seconds: 5.0     # Max seconds to wait before auto-flush (0 = disabled)
  # Durably mirror open positions to the SQLite runtime ledger
  # (position_snapshots) on every auto-flush so open positions survive a
  # Redis loss / container recreate. Idempotent UPSERT per position id
  # (no duplicate-row spam). Applies to BOTH stock and futures.
  snapshot_open_positions: true

# Post-exit re-entry guard — prevents same-symbol churn after a loss/exit signal.
# This is especially important for stock paper trading where a stop-loss can
# otherwise be followed by immediate re-entry while the same noisy condition persists.
entry_reentry_guard:
  enabled: true
  scope: symbol_strategy           # symbol_strategy | symbol
  default_cooldown_seconds: 900    # 15 min for ordinary exits (stock)
  reason_cooldown_seconds:
    stop_loss: 3600                # 60 min after hard stop
    stale_timeout: 3600            # 60 min when tick data disappeared
    momentum_decay: 1800           # 30 min after failed momentum follow-through
    vwap_breakdown: 1800           # 30 min after structural intraday breakdown
    trailing_stop: 600             # 10 min after profit-protecting exit
  # Futures override (merged when asset_class==futures). Shorter than stock —
  # futures has more intraday opportunity, but a shake-out stop must NOT be
  # followed by immediate re-entry (round-trip slippage churn). Setup A/C.
  futures:
    default_cooldown_seconds: 600  # 10 min for ordinary exits (target/session)
    reason_cooldown_seconds:
      stop_loss: 1800              # 30 min after a shake-out stop
      momentum_decay: 900          # 15 min
      vwap_breakdown: 900          # 15 min
      trailing_stop: 600           # 10 min
      force_close: 1800            # 30 min after crash guard FORCE_CLOSE (Track A exit)

# 전략별 승률 기반 투자금액 동적 조정
adaptive_sizing:
  enabled: true
  min_trades: 5              # 최소 거래 수 (미달 시 1.0x)
  lookback_trades: 30        # 최근 N거래 기준
  max_multiplier: 2.0
  min_multiplier: 0.5
  tiers:                     # [min_wr, max_wr, multiplier]
    - [0.0,  0.30, 0.5]     # 0~30%: 절반
    - [0.30, 0.45, 0.75]    # 30~45%: 축소
    - [0.45, 0.55, 1.0]     # 45~55%: 기본
    - [0.55, 0.65, 1.3]     # 55~65%: 확대
    - [0.65, 1.0,  1.8]     # 65%+: 대폭 확대

# 브로커 잔고 검증 — 시작 시 Redis 포지션과 실제 브로커 잔고 비교
broker_verification:
  enabled: true                  # 검증 활성화
  auto_track_external: true      # 브로커 보유/Redis 누락 포지션 자동 추적
  remove_redis_only: true        # 브로커 미보유/Redis 잔존 포지션은 런타임 추적에서 제거
  reconcile_quantity: true       # 수량 불일치 시 브로커 기준 보정
  reconcile_price: true          # 평균단가 불일치 시 브로커 기준 보정
  sync_runtime_ledger: true      # 검증 결과를 RuntimeLedger open snapshot에 동기화
  notify_on_mismatch: true       # 불일치 시 Telegram 알림

# KOSPI200 Mini 슬리피지 모델 (백테스트/페이퍼 트레이딩 전용)
# 실제 실행 슬리피지를 모델링하여 백테스트 P&L과 실전 결과 격차 최소화
slippage_model:
  enabled: true                  # 슬리피지 모델 활성화
  base_spread_bps: 1.5           # 기본 스프레드 비용 (1.5 bps = 0.015%)
  depth_impact_factor: 0.8       # 유동성 부족 시 추가 슬리피지 배수 (mini는 유동성 1/9~1/42로 높게 설정)
  min_slippage_bps: 0.5          # 최소 슬리피지 (0.5 bps)
  max_slippage_bps: 15.0         # 최대 슬리피지 (15 bps, 극단적 상황 방지)
  typical_spread: 0.05           # 스프레드 정규화 기준값 (mini futures 일반적 스프레드)
  default_spread: 0.05           # 호가 데이터 없을 때 기본 스프레드 (backtest/paper fallback)
  default_depth: 10.0            # 호가 데이터 없을 때 기본 잔량 (backtest/paper fallback)

  # 시간대별 슬리피지 배수 (HH:MM-HH:MM 형식)
  time_of_day_multipliers:
    "08:45-09:15": 1.5           # 장 초반 변동성 높음 (08:45 개장~09:15)
    "09:15-11:30": 1.0           # 정상 거래
    "11:30-13:00": 1.2           # 점심 시간대 유동성 감소
    "13:00-15:00": 1.0           # 오후 정상 거래
    "15:00-15:20": 1.3           # 장 마감 전 변동성 증가
    "15:20-15:45": 1.8           # 장 마감 직전 스프레드 확대

# Korean ATS (넥스트레이드) Routing Configuration
# 주식 전용: KRX vs ATS 간 주문 라우팅 의사결정
ats_routing:
  enabled: false                             # ATS 라우팅 활성화 (기본값: 비활성)
  default_venue: KRX                         # 기본 실행 거래소 (KRX | ATS)

  # Rule 1: 가격 개선 임계값
  price_improvement_threshold_bps: 5.0       # ATS 선택을 위한 최소 가격 개선 (5 bps = 0.05%)

  # Rule 2: 유동성 요구사항
  min_liquidity_depth: 100.0                 # 최소 호가 잔량 (주문 크기의 배수)
  min_depth_multiplier: 2.0                  # 주문 크기 대비 최소 잔량 배수

  # Rule 3: 스프레드 제한
  max_spread_bps: 30.0                       # ATS 사용 최대 스프레드 (30 bps)
  spread_comparison_enabled: true            # KRX vs ATS 스프레드 비교 활성화

  # Rule 4: 체결 확률 모델
  ats_fill_rate_threshold: 0.7               # 최소 체결 확률 (70%)
  prefer_certainty: true                     # 불확실성 높을 때 KRX 선호

  # Rule 5: 시간대별 라우팅 선호도
  time_of_day_preferences:
    "09:00-09:30": KRX                       # 장 초반: KRX 선호 (높은 유동성)
    "09:30-11:30": AUTO                      # 오전: 자동 라우팅
    "11:30-13:00": KRX                       # 점심: KRX 선호 (ATS 유동성 감소)
    "13:00-15:00": AUTO                      # 오후: 자동 라우팅
    "15:00-15:30": KRX                       # 장 마감: KRX 선호

  # Rule 6: 종목별 필터
  min_market_cap: 1000000000000              # 최소 시가총액 (1조원, ATS 유동성 고려)
  excluded_sectors: []                       # 제외 섹터 (예: ["금융", "보험"])

  # 백테스트/페이퍼 트레이딩용 ATS 시뮬레이션 파라미터
  simulation:
    ats_fill_rate: 0.65                      # ATS 평균 체결률 (65%)
    price_improvement_mean_bps: 3.0          # 평균 가격 개선 (3 bps)
    price_improvement_std_bps: 2.0           # 가격 개선 표준편차
    latency_penalty_ms: 15.0                 # ATS 추가 레이턴시 (15ms)

# KOSPI200 실시간 진입 슬리피지 제어 (선물 전용)
# tick_size는 거래 상품에 맞춰야 한다: mini=0.02, full(F200)=0.05. 환경변수로
# 오버라이드 — F200 paper 검증 시 FUTURES_SLIPPAGE_TICK_SIZE=0.05 (기본 mini 0.02).
# spread_ticks = spread_points / tick_size 이므로 틀리면 진입이 전량 차단된다.
futures_slippage_control:
  enabled: true
  tick_size: ${FUTURES_SLIPPAGE_TICK_SIZE:0.02}

  # Rule 1: 유동성/스프레드 필터
  max_spread_ticks: 1
  min_depth_multiplier: 3.0

  # Rule 2: 지정가 후 TIF 관리
  passive_timeout_seconds: 0.7
  retry_policy: market_once        # market_once | abort
  max_price_deviation_ticks: 2
  max_signal_age_seconds: 2.0

  # Rule 3: 변동성 필터
  volatility:
    window_ticks: 20
    spike_multiplier: 2.5
    cooldown_seconds: 2.0

  # Rule 3 (Cross-Asset): 대형선물 호가 상태 참조
  cross_asset:
    enabled: true
    reference_symbol: "101S6000"   # KOSPI200 선물 근월 연결코드
    max_spread_ticks: 2

  # Rule 4: 시간대 필터 (포함 범위)
  blocked_time_windows:
    - start: "08:45"
      end: "08:50"
    - start: "15:40"
      end: "15:45"

  # 주요 경제지표 발표 등 수동 블랙아웃 구간
  event_time_windows: []

  # Paper 전용 완화 오버라이드 (live에는 적용되지 않음)
  # 목적: 강한 신호 구간에서 진입 시도 수를 늘려 실험 가능성 확보
  paper_override:
    enabled: true
    max_spread_ticks: ${FUTURES_PAPER_MAX_SPREAD_TICKS:6}
    min_depth_multiplier: ${FUTURES_PAPER_MIN_DEPTH_MULTIPLIER:1.0}
    max_price_deviation_ticks: ${FUTURES_PAPER_MAX_PRICE_DEVIATION_TICKS:6}
    max_signal_age_seconds: ${FUTURES_PAPER_MAX_SIGNAL_AGE_SECONDS:3.5}
    blocked_time_windows: []
    volatility:
      spike_multiplier: ${FUTURES_PAPER_VOL_SPIKE_MULTIPLIER:4.0}
      cooldown_seconds: ${FUTURES_PAPER_VOL_COOLDOWN_SECONDS:0.5}
    cross_asset:
      enabled: ${FUTURES_PAPER_CROSS_ASSET_ENABLED:false}
      max_spread_ticks: ${FUTURES_PAPER_CROSS_ASSET_MAX_SPREAD_TICKS:6}

# Paper trading broker price guard configuration
# Applied to VirtualBroker to validate fill prices against recent market data
paper_broker:
  # Price source freshness guard — reject fills whose price source time
  # is older than this many seconds (0 disables guard)
  max_price_staleness_seconds: 30.0

  # Price deviation guard — reject fills deviating more than this fraction
  # from reference median price (0 disables guard)
  max_price_deviation_pct: 0.10

  # Lookback window (minutes) for computing reference median price
  reference_price_lookback_minutes: 5

# KOSPI200 선물 계약 스펙 (계약당 승수, 틱 크기, 수수료)
# 모든 계약 상수는 여기서 로드 — 코드에 하드코딩 금지
futures_contract_spec:
  kospi200_mini:
    multiplier_krw_per_point: 50000      # KRW per index point (mini = 50,000)
    tick_size_points: 0.02               # minimum price movement (index points)
    tick_value_krw: 1000                 # tick_size_points × multiplier_krw_per_point
    commission_rate: 0.00003             # 0.003% per side (KIS futures rate)
    symbol_prefix: "A05"                 # KIS symbol prefix for KOSPI200 mini futures

  kospi200_full:
    multiplier_krw_per_point: 250000     # KRW per index point (full = 250,000)
    tick_size_points: 0.05               # minimum price movement (index points)
    tick_value_krw: 12500                # tick_size_points × multiplier_krw_per_point
    commission_rate: 0.00003             # 0.003% per side (KIS futures rate)
    symbol_prefix: "101,A01"             # KIS prefixes: 101=연결선물(backtest), A01=live 근월물(F200)

# Phase 4 — passive maker + force-close timings (spec §3.2 / §4.3).
# Loaded by services.order_router._build_and_run via Phase4ExecutionConfig.
phase4_execution:
  passive_timeout_seconds: 30          # PassiveMaker._wait_for_fill timeout
  eod_kst_hour: 15                     # ForceCloseExecutor EOD KST hour
  eod_kst_minute: 10                   # ForceCloseExecutor EOD KST minute
  base_quantity: 1                     # OrderRouterDaemon base contracts per signal
  final_stream_maxlen: 10000           # stream:signal.final XADD MAXLEN ~
  xread_block_ms: 2000                 # XREADGROUP block (idle wait)
  xread_batch_size: 10                 # XREADGROUP COUNT
