risk:
  account_equity_krw: 5000000
  daily_mdd_limit_pct: 0.03
  weekly_mdd_limit_pct: 0.07
  max_position_risk_pct: 0.015
  max_daily_trades: 3
  max_position_size_contracts: 2
  consecutive_loss_soft_threshold: 4
  consecutive_loss_hard_threshold: 6
  # 설계서 §4.2 (Phase 3C C2): 연속 4패 도달 시점부터 14일(KST)간 사이즈 x0.5
  # 유지 — 승리로 streak가 리셋돼도 윈도우는 유지되며 재기동에도 생존한다
  # (risk:state:{asset}:period 해시의 size_reduce_until_kst). 0이면 지속성
  # 비활성(과거 동작: 첫 승 시 즉시 원복).
  soft_reduce_persist_days: 14
  # floor-at-1 정책 — operator 결정 사항. 기본값 false 변경 금지(변경은 백테스트/
  # 운영 근거 필요). false: 현행 유지 — base 1계약에서는 x0.5 축소가 order_router의
  # floor-at-1로 사실상 무효(필터 INFO 로그로만 관찰 가능). true: 축소가 실효를
  # 가질 수 없는 1계약 운용에서 축소 대신 진입 자체를 차단(보수,
  # skip_reason=consecutive_losses_floor_block).
  reduce_blocks_at_floor: false
  max_spread_ticks: 2
  # Phase 3B unified portfolio-MDD circuit-breaker gate (filter #9).
  # Enabled by default but a NO-OP until config/portfolio.yaml
  # circuit_breaker.mode=enforce (fail-open on missing/stale snapshot or
  # shadow/off mode). Stage thresholds/size factor: config/portfolio.yaml.
  portfolio_mdd:
    enabled: true
    latest_key: "portfolio:equity:latest"
    stale_max_age_seconds: 93600   # 26h — daily 19:00 KST cadence + slack
  # Phase 4-e: 총량 + 자산별 동시진입 캡 (World-A RiskManager 능력의 World-B 이식).
  # 기본 enabled:false ⇒ 필터 자체를 만들지 않음(구조적 무동작). enabled:true여도
  # count provider 미주입/캡 미설정이면 fail-open(통과). 캡 키명은 World-A와 정합
  # (max_total_positions=risk_management.max_total_positions,
  #  max_positions_per_asset=asset_limits.futures.max_positions) — P4-h2 통일 대비.
  # 캡은 World-A risk_management.yaml과 동일한 env 인다이렉션(${VAR:default})을
  # 재사용 — 같은 env 변수로 두 세계가 함께 움직인다(P4-h2 수렴 대비).
  concurrent_positions:
    enabled: false
    max_total_positions: ${RISK_MAX_TOTAL_POSITIONS:20}      # World-A risk_management.max_total_positions
    max_positions_per_asset: ${RISK_FUTURES_MAX_POSITIONS:5} # World-A asset_limits.futures.max_positions

trading_windows:
  - "09:00-10:30"
  - "14:30-15:20"

# Stock intraday risk parameters (Phase M4-R — StockRiskFilterDaemon).
# Same field set as `risk:` (FuturesRiskConfig is asset-neutral); stock values.
risk_stock:
  account_equity_krw: 10000000
  daily_mdd_limit_pct: 0.03
  weekly_mdd_limit_pct: 0.07
  max_position_risk_pct: 0.02
  max_daily_trades: 10
  max_position_size_contracts: 1000
  consecutive_loss_soft_threshold: 4
  consecutive_loss_hard_threshold: 6
  # Track C 설계서 §4.2의 2주 지속성은 선물 대상 — 주식은 현행 유지
  # (0 = 첫 승 시 즉시 원복). 주식 적용 여부는 별도 결정 사항.
  soft_reduce_persist_days: 0
  reduce_blocks_at_floor: false
  max_spread_ticks: 5
  # Phase 3B unified portfolio-MDD gate — same semantics as risk.portfolio_mdd
  # (stock M4-R chain reads this section). Shadow mode ⇒ no-op.
  portfolio_mdd:
    enabled: true
    latest_key: "portfolio:equity:latest"
    stale_max_age_seconds: 93600
  # Phase 4-e: 주식 총량 + 자산별 동시진입 캡 — risk.concurrent_positions와 동일 의미.
  # 기본 enabled:false ⇒ 무동작. 캡 키명은 World-A와 정합(max_positions_per_asset=
  # asset_limits.stock.max_positions=15). P4-h2 두 세계 통일 대비.
  # 캡은 World-A risk_management.yaml과 동일한 env 인다이렉션을 재사용
  # (total은 futures와 같은 RISK_MAX_TOTAL_POSITIONS 공유). P4-h2 통일 대비.
  concurrent_positions:
    enabled: false
    max_total_positions: ${RISK_MAX_TOTAL_POSITIONS:20}     # World-A risk_management.max_total_positions
    max_positions_per_asset: ${RISK_STOCK_MAX_POSITIONS:15} # World-A asset_limits.stock.max_positions
  # Phase 5B Track A/B 상관관계 규칙 (설계서 §7.2 / roadmap §5.1) — 주식 전용
  # (StockRiskConfig에만 존재; 선물 체인은 이 필터들을 만들지 않는다).
  # 두 규칙 모두 트랙 A 수동 원장(config/portfolio/core_holdings.yaml)을 읽으며,
  # 원장이 비어 있는 동안(현 상태) 자동 NO-OP. 원장 로드 실패 → fail-open(통과+경고).
  core_correlation:
    # 규칙 1 — 트랙 A '보유'(holdings) 종목과 동일 종목 신규 진입 금지
    # (skip_reason: track_a_overlap). 후보(candidates) 종목은 미보유 → 차단 안 함.
    overlap_enabled: true
    # 원장 파일 mtime 재확인 주기(초) — mtime 변경 시에만 YAML 재파싱
    # (핫패스에서 후보마다 재파싱하지 않음).
    reload_interval_seconds: 60
    # 규칙 2 — 트랙 B 오픈 포지션 명목가 중 반도체 섹터 비중이 cap 이상이면
    # 반도체 섹터 신규 진입 거절 (skip_reason: sector_cap_semiconductor).
    sector_cap:
      enabled: true
      sector_key: "semiconductor_equipment" # core_holdings.yaml sectors 키
      cap: 0.40 # 설계서 §7.2 — 트랙 B 포지션의 40%
      skip_reason: "sector_cap_semiconductor"
      # 축소판(보수적): 신뢰 가능한 전종목 섹터 분류 소스가 리포에 없어
      # (screener/universe/theme/market_structure 모두 종목별 섹터 필드 부재),
      # 분류는 core_holdings 원장(holdings+candidates)의 operator 지정 sector만
      # 사용한다. 원장 밖 종목은 분류 불가 → 상한 미적용(관대). 전종목 분류
      # 파이프라인(KRX 업종 수집 등) 도입 시 소스 값을 확장한다.
      classification_source: "core_holdings"

# Korean equity regular session, KST. Half-open [start, end).
trading_windows_stock:
  - "09:00-15:30"

# Position sizer parameters for SizerRegistry[fixed_fractional_futures].
# Mirrors the "risk" section above for the fields a sizer actually needs,
# separated so the sizer config is independently overridable.
fixed_fractional_futures:
  max_position_risk_pct: 0.015
  max_position_size: 2
  soft_reduce_threshold: 4
