# Decision Engine configuration — Setup A & Setup C parameters.
# All numeric thresholds are loaded from this file; no hardcoded values in code.
# See: docs/plans/2026-04-20-futures-paradigm-phase3-decision-engine.md §4.2 §5.2

setup_a_gap_reversion:
  enabled: true
  valid_minutes_min: 10          # minutes after 09:00 KST open (inclusive)
  valid_minutes_max: 90
  min_sp500_gap_pct: 0.5         # minimum absolute S&P 500 overnight gap (%)
  min_kr_gap_pct: 0.3            # minimum absolute Korean open gap vs prev close (%)
  retrace_min: 0.30              # minimum retrace fraction of the gap
  retrace_max: 0.55              # maximum retrace fraction of the gap
  stop_atr_mult: 1.5             # hard stop = entry ± stop_atr_mult × ATR14
  target_gap_fill_ratio: 0.9     # take-profit = fill this fraction of the gap
  signal_ttl_minutes: 10         # signal validity window in minutes

setup_c_event_reaction:
  enabled: true
  # Window covers overnight US macro → next KST day-session open.
  # FOMC 14:00 ET (≈ 03:00 KST) → KR session opens 09:00 KST → 6 h later.
  # US CPI / NFP 08:30 ET (≈ 21:30 KST) → KR next session ≈ 12 h later.
  # Spec default was 15 minutes (matches US futures post-release breakouts).
  # 720 minutes (12 h) catches the first KR-session breakout after either
  # announcement window while remaining short enough that BOK (09:00 KST)
  # still only triggers on the same trading day.
  window_minutes: 720
  breakout_buffer_atr_mult: 0.5  # breakout must be within this many ATRs of the 15-min high/low
  target_atr_mult: 2.5           # take-profit = entry ± target_atr_mult × ATR14
  signal_ttl_minutes: 30
  min_impact_tier: 2             # ignore events with impact_tier > this value (higher = less important)

# Setup D — High-Vol Intraday VWAP Reversion (Thesis A; paper-only, NEEDS-VALIDATION).
# Fades ATR-scaled VWAP extremes throughout the session on high-vol bars
# (long/short symmetric). The high-vol reference is a CAUSAL trailing ATR
# percentile the setup self-computes (no look-ahead, no external indicator).
# Defaults are the Dec2025–Apr2026 research operating point.
# See docs/superpowers/specs/2026-06-25-futures-mr-highvol-setup-d.md.
setup_d_vwap_reversion:
  enabled: false
  valid_minutes_min: 15                    # skip the 09:00 open auction (15 = 09:15 KST)
  no_entry_after_minutes_since_open: 345   # no entries after 14:45 KST (force-close avoidance)
  min_atr_ratio: 0.9                       # high-vol gate: atr_14 >= 0.9 × causal vol reference
  vol_window_bars: 780                     # causal trailing window (~2 sessions)
  vol_warmup_bars: 120                     # gate permissive until this many past ATRs seen
  vol_percentile: 90.0                     # percentile of the causal ATR window
  extreme_atr_mult: 1.8                    # fade trigger: |(price-vwap)/atr_14| >= 1.8
  stall_buffer_atr_mult: 1.0               # trend-day guard vs 15-min extreme
  stop_atr_mult: 1.5                       # hard stop = entry ± 1.5 × ATR14
  min_reward_risk: 1.0                     # VWAP-revert target at least 1.0R away
  signal_ttl_minutes: 10
