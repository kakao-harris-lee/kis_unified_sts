    owner: TBD
    rationale: "MEASURE. Maximum interval from committed Monitoring Gap to denial at every dependent new-risk authority issuer; alert delivery and acknowledgement cannot extend this bound (ADR-002-028 §§13, 17)."
    measurement_source: monitoring_gap_authority_and_restrictive_ingress_trace
    failure_response: HALT_OR_CONTAIN
  B_monitoring_gap_to_egress_deny:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from committed Monitoring Gap to denial at every dependent final egress under active currentness; cache, heartbeat, dashboard state, and absence of alert are not proof (ADR-002-028 §18)."
    measurement_source: monitoring_gap_currentness_and_egress_boundary_trace
    failure_response: HALT
  B_critical_alert_delivery:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from Critical alert commit to independently verifiable delivery or explicit delivery-gap escalation. This detective path runs in parallel and cannot delay restriction or egress denial (ADR-002-028 §16)."
    measurement_source: safety_alert_delivery_and_gap_trace
    failure_response: KEEP_RESTRICTED_AND_ALTERNATE_ESCALATE
  B_alert_escalation:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from missed delivery or acknowledgement deadline to the next required independent escalation stage without resetting the original safety deadline (ADR-002-028 §16)."
    measurement_source: alert_escalation_ordering_and_effective_principal_trace
    failure_response: INCIDENT_REMAINS_OPEN_AND_ESCALATE
  B_monitoring_generation_fence:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a new policy, manifest, gap, owner, restore, or Monitor Generation to rejection of superseded publishers and snapshots at every dependent consumer, authority issuer, and final egress (ADR-002-028 §§12, 18, 24)."
    measurement_source: monitor_generation_writer_consumer_and_egress_fence_trace
    failure_response: HALT
  B_supply_chain_compromise_detect:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from source, builder, dependency, toolchain, signer, registry, admission, deployment, or runtime-artifact compromise or contradiction to a committed release restriction for the greatest credible affected scope (ADR-002-029)."
    measurement_source: source_build_dependency_signer_registry_admission_and_runtime_trace
    failure_response: STOP_NEW_RISK_AND_RESTRICT_RELEASE_SCOPE
  B_release_restriction_to_authority_restrict:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from committed release restriction to denial at every dependent new-risk authority issuer; scan, alert, deployment, or operator acknowledgement cannot extend this preventive bound (ADR-002-029)."
    measurement_source: release_restriction_authority_and_currentness_trace
    failure_response: HALT_OR_CONTAIN
  B_release_restriction_to_egress_deny:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from committed release restriction to denial at every dependent final egress under active artifact currentness; cached admission, tags, health, or absence of revocation are not proof (ADR-002-029)."
    measurement_source: release_restriction_generation_runtime_attestation_and_egress_trace
    failure_response: HALT
  B_release_generation_fence:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from Release Generation advance, restore, rollback, revocation, or set replacement to rejection of superseded publishers, deployments, consumers, and runtime attestations (ADR-002-029)."
    measurement_source: release_generation_registry_deployment_runtime_and_consumer_fence_trace
    failure_response: HALT
  B_runtime_artifact_drift_detect:
    value_ms: null
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from actual executable, image, plugin, sidecar, proxy, signer, SDK, or dynamically loaded artifact divergence to restrictive detection and runtime fencing (ADR-002-029)."
    measurement_source: expected_release_manifest_and_actual_runtime_artifact_attestation_trace
    failure_response: HALT_AND_FENCE_RUNTIME
  B_final_quantity_proof:
    value_ms: null   # MEASURE per broker/order type
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Time within which Final Quantity Proof (final filled qty + zero remaining) can be established for a given broker and order type; drives how long capacity stays RELEASE_PENDING_PROOF (ADR-002-002 §16)."
    measurement_source: broker_capability_profile
    failure_response: QUARANTINE_UNKNOWN
  B_late_fill_observation:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum credible interval in which a late fill may still arrive after a claimed terminal state; a late fill inside this window must not have caused early capacity release (ADR-002-002 §16.4)."
    measurement_source: broker_capability_profile
    failure_response: PROFILE_CONTRADICTORY
  B_protective_request_start:
    value_ms: 1000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Time from degraded-mode entry to first bounded protective request being started, using reserved protective capacity (ADR-002-001)."
    measurement_source: protective_controller_log
    failure_response: CONTAIN
  B_protective_request_complete:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Broker-dependent completion time for a protective action; informs protection-gap bounding (ADR-002-001 §12)."
    measurement_source: broker_capability_profile
    failure_response: CONTAIN
  B_broker_query_consistency:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Interval over which broker query sources are expected to converge; absence within it is not proof of non-existence (ADR-002-004)."
    measurement_source: broker_capability_profile
    failure_response: CONSERVATIVE_UNKNOWN
  B_rate_limit_recovery:
    value_ms: null   # MEASURE per broker, account, session, and endpoint class
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Recovery time after hitting the applicable broker account or session rate limit; protective/reconciliation traffic budget must survive this (ADR-002-001 §7.5)."
    measurement_source: broker_capability_profile
    failure_response: RESTRICT_OR_CONTAIN
  B_failure_domain_detect:
    value_ms: null   # APPROVE per concrete Failure-Domain Allocation Matrix
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a safety-critical dependency failure or isolation-assumption breach to authoritative detection for the affected Safety Cell (ADR-002-009)."
    measurement_source: failure_domain_and_authority_log
    failure_response: STOP_NEW_RISK
  B_failure_domain_contain:
    value_ms: null   # APPROVE per concrete deployment profile
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from authoritative failure-domain detection to completed denial or broader HALT at every affected final egress (ADR-002-009)."
    measurement_source: failure_domain_and_egress_log
    failure_response: HALT
  B_protection_gap:
    value_ms: null   # APPROVE per broker/order/replacement profile
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted interval without sufficient protection during an explicitly approved cancel-first replacement; an unknown or exceeded gap is containment (ADR-002-011)."
    measurement_source: protective_replacement_and_broker_log
    failure_response: CONTAIN
  B_protection_overlap:
    value_ms: null   # APPROVE per broker/order/replacement profile
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted interval in which old and new protective orders may both execute while worst-case reversal risk remains capacity-covered (ADR-002-011)."
    measurement_source: protective_replacement_and_broker_log
    failure_response: CONTAIN
  B_protective_replacement_contain:
    value_ms: null   # APPROVE after replacement workflow and fallback are selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from replacement deviation or proof failure to authoritative containment of further transmission and new risk (ADR-002-011)."
    measurement_source: protective_controller_ledger_and_egress_log
    failure_response: HALT_OR_CONTAIN
  B_non_trade_event_detect:
    value_ms: null   # APPROVE per source and broker capability profile
    semantics: source_and_broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum interval from an externally effective non-trade change to authoritative detection; entry limits must remain safe throughout this interval (ADR-002-010)."
    measurement_source: reference_source_and_broker_capability_profile
    failure_response: CONTAIN
  B_non_trade_transition_apply:
    value_ms: null   # APPROVE after conservative transition protocol is selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval for local instrument, projection, RCL, protection, and authority state to reach a complete non-permissive transition or containment (ADR-002-010)."
    measurement_source: non_trade_transition_and_ledger_log
    failure_response: REMAIN_HALTED
  B_non_trade_reconcile:
    value_ms: null   # APPROVE per event/instrument/broker scope
    semantics: source_and_broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted unreconciled interval after a non-trade event while old and new effects remain conservatively capacity-covered (ADR-002-010)."
    measurement_source: reconciliation_and_broker_capability_profile
    failure_response: QUARANTINE_UNKNOWN
  B_operator_escalation:
    value_ms: 30000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Maximum time to raise an operator escalation on a Critical operational event (capacity exhaustion, trapped exposure, unresolved UNKNOWN)."
    measurement_source: alerting_pipeline_log
    failure_response: HALT
  B_evidence_persist:
    value_ms: null   # APPROVE after pre-effect and emergency durability mechanisms are selected and measured
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval allowed by the applicable durability class for a required safety record to receive a verifiable durable commit. Risk-increasing send cannot outrun exact pre-effect and SEND_STARTED durability (ADR-002-016 §10)."
    measurement_source: source_ingress_store_and_egress_receipt_trace
    failure_response: STOP_NEW_RISK
  B_evidence_gap_detect:
    value_ms: null   # APPROVE per record class, source continuity, and Evidence Integrity Policy
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a required record omission, conflict, truncation, fork, or continuity break to authoritative Evidence Gap detection for the affected scope (ADR-002-016 §14)."
    measurement_source: source_sequence_causal_index_anchor_and_inventory_trace
    failure_response: STOP_NEW_RISK
  B_evidence_gap_contain:
    value_ms: null   # APPROVE after gap-to-authority and egress containment is selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from confirmed safety-relevant Evidence Gap to completed new-risk denial at every affected authority and final egress; unknown scope expands containment (ADR-002-016 §§14, 18)."
    measurement_source: evidence_gap_authority_and_egress_trace
    failure_response: HALT_OR_CONTAIN

limits:
  MAX_normal_capability_age_ms: 1000          # PROPOSED: max consumer-local age of the normal capability/currentness proof before denial
  MAX_time_health_snapshot_age_ms: null       # APPROVE: max consumer-held Time Health proof age, including transport uncertainty
  MAX_degraded_lease_holdover_ms: 5000        # PROPOSED: max monotonic lifetime of a pre-issued degraded protective lease
  MAX_clock_drift_ppm: 200                    # PROPOSED: beyond this, time confidence is lost -> fail closed (ADR-002-003)
  MAX_process_suspension_ms: 2000             # PROPOSED: a process suspended longer than this is fenced on resume
  MAX_unresolved_send_per_scope: 1            # from template: at most one unresolved send per scope
  MAX_human_approval_age_ms: null             # APPROVE per approval type; stale or unknown age denies authority increase
  MAX_human_session_age_ms: null              # APPROVE per human authority direction; unknown age denies the command
  MAX_human_delegation_age_ms: null           # APPROVE per delegation policy; expiry never transfers or revives approval
  MIN_evidence_retention_ms: null              # APPROVE per record class; economic-effect and verification horizons dominate
  MAX_replay_start_delay_ms: null              # APPROVE incident/review target; exceeding it never relaxes isolation or completeness
  MAX_recovery_readiness_age_ms: null           # APPROVE per recovery scope; expiry or unknown age denies later authority issuance
  MAX_critical_input_snapshot_age_ms: null       # APPROVE per source/input/decision scope; unknown age denies dependent new risk
  MAX_decision_context_age_ms: null              # APPROVE per action class; Capsule expiry never expires economic effect
  MAX_venue_constraint_snapshot_age_ms: null     # APPROVE per venue/session/account/action scope; unknown age denies dependent new risk
  MAX_order_admissibility_decision_age_ms: null  # APPROVE per exact order/action class; expiry never expires economic effect
  MAX_canonical_broker_command_age_ms: null       # APPROVE per broker/action scope; unknown age denies send and expiry never expires economic effect
  MAX_order_conformance_proof_age_ms: null         # APPROVE per exact command; stale proof denies send and cannot release capacity
  MAX_aggregate_risk_state_snapshot_age_ms: null   # APPROVE per aggregate scope; unknown age denies allocation and dependent new risk
  MAX_aggregate_risk_decision_age_ms: null         # APPROVE per exact effect/allocation scope; expiry never expires economic effect
  MAX_action_flow_state_snapshot_age_ms: null      # APPROVE per shared broker-resource scope; unknown age denies allocation and send
  MAX_action_flow_decision_age_ms: null            # APPROVE per exact action/scope; expiry never expires possible broker or economic effect
  MAX_action_flow_permit_age_ms: null              # APPROVE per exact action/claim path; stale permit denies send and cannot release economic capacity
  MAX_action_amplification_per_cause: null          # APPROVE per cause/action class; unknown or exceeded amplification invokes containment
  MAX_proposal_approval_request_age_ms: null        # APPROVE per action class; stale or unknown request age denies approval and consumption
  MAX_independent_approval_decision_age_ms: null    # APPROVE per exact request/Intent scope; expiry never expires economic effect
  MAX_egress_currentness_proof_age_ms: null         # APPROVE per send boundary; every normal send still requires a new single-use proof
  MAX_currentness_vector_age_ms: null               # APPROVE per complete dependency scope; unknown or stale vector age denies admission
  MAX_trial_authorized_economic_effect: null         # APPROVE per exact trial scope; unknown or unbounded credible effect prohibits the trial
  MAX_trial_concurrent_potential_effect: null        # APPROVE per shared capacity scope; includes potentially-live and abort/recovery overlap
  MAX_trial_action_count: null                       # APPROVE per exact plan; unavailable or ambiguous counter denies later trial action
  MAX_trial_duration_ms: null                        # APPROVE per exact run; expiry ends future action but never economic effect
  MAX_trial_evidence_age_ms: null                    # APPROVE per promotion scope; stale evidence denies promotion and never releases capacity
  MAX_deviation_duration_ms: null                    # APPROVE per exact reduced scope; expiry restricts future authority and never expires economic effect
  MAX_deviation_decision_age_ms: null                # APPROVE per exact request/configuration consumption; stale or unknown age denies activation and send
  MAX_residual_risk_review_interval_ms: null          # APPROVE per risk class; missed or unproven review restricts scope and never auto-renews
  MAX_incident_scope_snapshot_age_ms: null             # APPROVE per dependency scope; stale or unknown scope expands containment and denies new risk
  MAX_incident_containment_plan_age_ms: null            # APPROVE per incident/action scope; stale plan cannot request action or justify shutdown progress
  MAX_incident_recovery_handoff_age_ms: null            # APPROVE per Recovery Session; stale handoff transfers no obligation and keeps the barrier closed
  MAX_incident_closure_decision_age_ms: null             # APPROVE per exact incident generation; expiry denies closure and never clears HALT or economic effect
  MAX_critical_telemetry_age_ms: null                     # APPROVE per telemetry class/scope; unknown or stale age creates a Monitoring Gap
  MAX_continuous_conformance_snapshot_age_ms: null        # APPROVE per exact scope; stale Snapshot denies dependent new risk and creates no permission
  MAX_safety_alert_age_ms: null                           # APPROVE per alert class; stale alert cannot prove delivery, containment, or resolution
  MAX_monitoring_suppression_duration_ms: null            # APPROVE per exact suppressible scope; expiry or ambiguity keeps restriction and never auto-resumes
  MAX_alert_acknowledgement_age_ms: null                  # APPROVE per escalation stage; acknowledgement age cannot extend restriction or egress-denial bounds
  MAX_build_provenance_age_ms: null                       # APPROVE per release class; stale or unknown provenance denies admission and never proves artifact safety
  MAX_artifact_admission_decision_age_ms: null             # APPROVE per exact scope; stale admission denies future use and never expires economic effect
  MAX_admitted_release_set_age_ms: null                    # APPROVE per scope; stale set cannot prove current eligibility or revive a release
  MAX_runtime_artifact_attestation_age_ms: null            # APPROVE per runtime identity; stale attestation denies dependent new risk
  MAX_release_key_status_age_ms: null                      # APPROVE per signer/key class; stale or unknown status is restrictive

review:
  independent_reviewer: TBD    # MUST NOT be the author/integrator of the architecture
  evidence_location: TBD
  approval_record: TBD
