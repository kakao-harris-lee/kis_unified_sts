# VERIFICATION-PROFILE-002 — PROPOSED (NOT APPROVED)
#
# STATUS: PROPOSED engineering draft. These are strawman candidate bounds for
# review and ratification. They are NOT approved and MUST NOT be relied upon.
# Per VER-002-001 §6, an unapproved or placeholder bound is not an approved bound.
#
# Rules for ratification (all required before status -> APPROVED):
#   - each `value_ms` is confirmed or replaced by the accountable owner;
#   - broker_specific bounds are MEASURED from an approved Broker Capability
#     Profile (ADR-002-004), not guessed;
#   - `approved_by` lists the accountable authority (separation of duties:
#     the identity approving bounds SHALL NOT also arm live trading);
#   - `effective_from` / `review_due` are set.
# Values below marked MEASURE are deliberately left null pending broker-specific measurement.

profile_id: VERIFICATION-PROFILE-002
version: "0.7-PROPOSED"
status: PROPOSED               # PROPOSED -> (human review) -> APPROVED
approved_by: []                # MUST be non-empty before APPROVED
effective_from: null
review_due: null

scope:
  environment: non-live-test   # applies to EV-L1..L3 test harness only
  accounts: []                 # assign approved test account scope
  broker_capability_profiles: []   # link approved Broker Capability Profile(s)
  hard_safety_envelope_id: TBD
  hard_safety_envelope_version: TBD
  hard_safety_envelope_generation: null
  hard_safety_envelope_digest: TBD
  runtime_safety_profile_id: TBD
  runtime_safety_profile_version: TBD
  runtime_safety_profile_generation: null
  runtime_safety_profile_digest: TBD
  safety_configuration_activation_record_id: TBD
  safety_configuration_activation_record_digest: TBD
  human_authority_policy_id: TBD
  human_authority_policy_generation: null
  human_authority_policy_digest: TBD
  effective_principal_graph_id: TBD
  effective_principal_graph_generation: null
  effective_principal_graph_digest: TBD
  evidence_integrity_policy_id: TBD
  evidence_integrity_policy_generation: null
  evidence_integrity_policy_digest: TBD

# ---------------------------------------------------------------------------
# Bounds. `semantics: hard_maximum` = must be met every time (pass/fail gate).
# All values PROPOSED; rationale states the engineering basis for review.
# ---------------------------------------------------------------------------
bounds:
  B_authority_partition_detect:
    value_ms: 2000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Loss of verifiable Safety-Authority contact detected within a small multiple of the heartbeat interval; assumes ~500ms heartbeat x 3 missed. Confirm against chosen heartbeat design (ADR-002-003)."
    measurement_source: harness_clock_on_execution_path
    failure_response: CONTAIN
  B_risk_increase_revoke:
    value_ms: 500
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. After a loss condition is detected, the authoritative new-risk permission is revoked within this bound. Final egress denial then follows within B_revocation_to_egress; neither interval may be hidden in cache or retry delay."
    measurement_source: egress_decision_log
    failure_response: HALT_OR_CONTAIN
  B_revocation_to_egress:
    value_ms: null   # APPROVE after the selected currentness protocol is implemented and measured
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from committed authoritative revocation/restriction generation to denial at every final egress (ADR-002-007 §§9, 16)."
    measurement_source: authority_and_egress_generation_log
    failure_response: HALT
  B_halt_to_egress:
    value_ms: null   # APPROVE after HALT generation propagation and fenced-send design are selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from authoritative HALT commit, or a final egress's locally verified acceptance of the same restrictive command, to denial of later risk-increasing transmissions at every affected final egress (ADR-002-007 §§16-17; ADR-002-015 §15)."
    measurement_source: halt_and_egress_boundary_log
    failure_response: HALT
  B_human_halt_to_commit:
    value_ms: null   # APPROVE after the independent human HALT ingress, local latch, and authoritative commit path are implemented
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from acceptance of a current authenticated Human HALT Command to an authoritative monotonic HALT commit or a proven local restrictive egress latch. It precedes or overlaps B_halt_to_egress but cannot be hidden inside it (ADR-002-015 §15)."
    measurement_source: human_halt_ingress_local_latch_and_safety_commit_log
    failure_response: LATCH_LOCAL_HALT_AND_ESCALATE
  B_time_health_to_egress:
    value_ms: null   # APPROVE after Time Health currentness distribution is selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a less-trusted Time Health generation to rejection of dependent transmission at every final egress (ADR-002-008 §§8, 14.6)."
    measurement_source: time_health_and_egress_generation_log
    failure_response: STOP_NEW_RISK
  B_capability_claim_to_send:
    value_ms: null   # APPROVE after the fenced egress journal and broker transport are implemented
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from durable single-use capability claim and SEND_STARTED persistence to transmission of the first broker-directed byte. Expiry or inability to prove this interval denies the send; post-claim ambiguity remains potentially live and capacity-covered (ADR-002-007 §§9.4-9.5)."
    measurement_source: egress_journal_and_broker_transport_trace
    failure_response: QUARANTINE_UNKNOWN
  B_egress_hard_fence:
    value_ms: null   # APPROVE after credential, session, signer, route, and broker fence mechanisms are selected and measured
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from an authoritative egress-generation invalidation or credential-compromise containment trigger to proof that the superseded principal cannot create a broker-accepted order mutation (ADR-002-013 §§13-16). Unknown completion keeps replacement authority non-live."
    measurement_source: egress_identity_route_session_and_broker_denial_log
    failure_response: HALT
  B_stale_epoch_reject:
    value_ms: 0
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Rejection of a stale ledger/authority epoch is synchronous at the ledger transition and final egress (compare-and-set); 0 = no time window in which a stale epoch may mutate or transmit (ADR-002-002 INV-008, ADR-002-003)."
    measurement_source: ledger_and_egress_decision_log
    failure_response: HALT
  B_external_activity_detect:
    value_ms: null   # MEASURE: bounded by the broker account-event/poll cadence
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE from Broker Capability Profile. For a poll-only broker this is bounded by the poll interval; new-action size must be constrained so plausible external activity in this window cannot breach the Hard Safety Envelope (ADR-002-002 §23.4)."
    measurement_source: broker_capability_profile
    failure_response: CONTAIN
  B_external_activity_contain:
    value_ms: 1000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Once unattributed external activity is detected, new-risk authority suspended and reconciliation begun within this bound."
    measurement_source: reconciliation_log
    failure_response: CONTAIN
  B_startup_reconciliation:
    value_ms: 60000
    semantics: operational_target_and_hard_gate
    owner: TBD
    rationale: "PROPOSED target. No new risk before reconciliation completes (hard gate). 60s is an operational target; exceeding it triggers escalation, not relaxation of the gate."
    measurement_source: recovery_coordinator_log
    failure_response: REMAIN_HALTED
  B_final_quantity_proof:
    value_ms: null   # MEASURE per broker/order type
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Time within which Final Quantity Proof (final filled qty + zero remaining) can be established for a given broker and order type; drives how long capacity stays RELEASE_PENDING_PROOF (ADR-002-002 §16)."
    measurement_source: broker_capability_profile
    failure_response: QUARANTINE_UNKNOWN
  B_late_fill_observation:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum credible interval in which a late fill may still arrive after a claimed terminal state; a late fill inside this window must not have caused early capacity release (ADR-002-002 §16.4)."
    measurement_source: broker_capability_profile
    failure_response: PROFILE_CONTRADICTORY
  B_protective_request_start:
    value_ms: 1000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Time from degraded-mode entry to first bounded protective request being started, using reserved protective capacity (ADR-002-001)."
    measurement_source: protective_controller_log
    failure_response: CONTAIN
  B_protective_request_complete:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Broker-dependent completion time for a protective action; informs protection-gap bounding (ADR-002-001 §12)."
    measurement_source: broker_capability_profile
    failure_response: CONTAIN
  B_broker_query_consistency:
    value_ms: null   # MEASURE
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Interval over which broker query sources are expected to converge; absence within it is not proof of non-existence (ADR-002-004)."
    measurement_source: broker_capability_profile
    failure_response: CONSERVATIVE_UNKNOWN
  B_rate_limit_recovery:
    value_ms: null   # MEASURE per broker, account, session, and endpoint class
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Recovery time after hitting the applicable broker account or session rate limit; protective/reconciliation traffic budget must survive this (ADR-002-001 §7.5)."
    measurement_source: broker_capability_profile
    failure_response: RESTRICT_OR_CONTAIN
  B_failure_domain_detect:
    value_ms: null   # APPROVE per concrete Failure-Domain Allocation Matrix
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a safety-critical dependency failure or isolation-assumption breach to authoritative detection for the affected Safety Cell (ADR-002-009)."
    measurement_source: failure_domain_and_authority_log
    failure_response: STOP_NEW_RISK
  B_failure_domain_contain:
    value_ms: null   # APPROVE per concrete deployment profile
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from authoritative failure-domain detection to completed denial or broader HALT at every affected final egress (ADR-002-009)."
    measurement_source: failure_domain_and_egress_log
    failure_response: HALT
  B_protection_gap:
    value_ms: null   # APPROVE per broker/order/replacement profile
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted interval without sufficient protection during an explicitly approved cancel-first replacement; an unknown or exceeded gap is containment (ADR-002-011)."
    measurement_source: protective_replacement_and_broker_log
    failure_response: CONTAIN
  B_protection_overlap:
    value_ms: null   # APPROVE per broker/order/replacement profile
    semantics: broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted interval in which old and new protective orders may both execute while worst-case reversal risk remains capacity-covered (ADR-002-011)."
    measurement_source: protective_replacement_and_broker_log
    failure_response: CONTAIN
  B_protective_replacement_contain:
    value_ms: null   # APPROVE after replacement workflow and fallback are selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from replacement deviation or proof failure to authoritative containment of further transmission and new risk (ADR-002-011)."
    measurement_source: protective_controller_ledger_and_egress_log
    failure_response: HALT_OR_CONTAIN
  B_non_trade_event_detect:
    value_ms: null   # APPROVE per source and broker capability profile
    semantics: source_and_broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum interval from an externally effective non-trade change to authoritative detection; entry limits must remain safe throughout this interval (ADR-002-010)."
    measurement_source: reference_source_and_broker_capability_profile
    failure_response: CONTAIN
  B_non_trade_transition_apply:
    value_ms: null   # APPROVE after conservative transition protocol is selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval for local instrument, projection, RCL, protection, and authority state to reach a complete non-permissive transition or containment (ADR-002-010)."
    measurement_source: non_trade_transition_and_ledger_log
    failure_response: REMAIN_HALTED
  B_non_trade_reconcile:
    value_ms: null   # APPROVE per event/instrument/broker scope
    semantics: source_and_broker_specific
    owner: TBD
    rationale: "MEASURE. Maximum permitted unreconciled interval after a non-trade event while old and new effects remain conservatively capacity-covered (ADR-002-010)."
    measurement_source: reconciliation_and_broker_capability_profile
    failure_response: QUARANTINE_UNKNOWN
  B_operator_escalation:
    value_ms: 30000
    semantics: hard_maximum
    owner: TBD
    rationale: "PROPOSED. Maximum time to raise an operator escalation on a Critical operational event (capacity exhaustion, trapped exposure, unresolved UNKNOWN)."
    measurement_source: alerting_pipeline_log
    failure_response: HALT
  B_evidence_persist:
    value_ms: null   # APPROVE after pre-effect and emergency durability mechanisms are selected and measured
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval allowed by the applicable durability class for a required safety record to receive a verifiable durable commit. Risk-increasing send cannot outrun exact pre-effect and SEND_STARTED durability (ADR-002-016 §10)."
    measurement_source: source_ingress_store_and_egress_receipt_trace
    failure_response: STOP_NEW_RISK
  B_evidence_gap_detect:
    value_ms: null   # APPROVE per record class, source continuity, and Evidence Integrity Policy
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from a required record omission, conflict, truncation, fork, or continuity break to authoritative Evidence Gap detection for the affected scope (ADR-002-016 §14)."
    measurement_source: source_sequence_causal_index_anchor_and_inventory_trace
    failure_response: STOP_NEW_RISK
  B_evidence_gap_contain:
    value_ms: null   # APPROVE after gap-to-authority and egress containment is selected
    semantics: hard_maximum
    owner: TBD
    rationale: "MEASURE. Maximum interval from confirmed safety-relevant Evidence Gap to completed new-risk denial at every affected authority and final egress; unknown scope expands containment (ADR-002-016 §§14, 18)."
    measurement_source: evidence_gap_authority_and_egress_trace
    failure_response: HALT_OR_CONTAIN

limits:
  MAX_normal_capability_age_ms: 1000          # PROPOSED: max consumer-local age of the normal capability/currentness proof before denial
  MAX_time_health_snapshot_age_ms: null       # APPROVE: max consumer-held Time Health proof age, including transport uncertainty
  MAX_degraded_lease_holdover_ms: 5000        # PROPOSED: max monotonic lifetime of a pre-issued degraded protective lease
  MAX_clock_drift_ppm: 200                    # PROPOSED: beyond this, time confidence is lost -> fail closed (ADR-002-003)
  MAX_process_suspension_ms: 2000             # PROPOSED: a process suspended longer than this is fenced on resume
  MAX_unresolved_send_per_scope: 1            # from template: at most one unresolved send per scope
  MAX_human_approval_age_ms: null             # APPROVE per approval type; stale or unknown age denies authority increase
  MAX_human_session_age_ms: null              # APPROVE per human authority direction; unknown age denies the command
  MAX_human_delegation_age_ms: null           # APPROVE per delegation policy; expiry never transfers or revives approval
  MIN_evidence_retention_ms: null              # APPROVE per record class; economic-effect and verification horizons dominate
  MAX_replay_start_delay_ms: null              # APPROVE incident/review target; exceeding it never relaxes isolation or completeness

review:
  independent_reviewer: TBD    # MUST NOT be the author/integrator of the architecture
  evidence_location: TBD
  approval_record: TBD
