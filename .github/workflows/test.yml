# .github/workflows/test.yml
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run performance tests weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard backstop: a hung test (e.g. a blocking Redis read on an empty stream
    # under xdist) must not stall the job for the 6h default. With the per-test
    # --timeout below this should rarely be hit, but it guarantees fail-fast.
    timeout-minutes: 25

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install prometheus-client

      - name: Run tests
        # Two passes:
        #  1. Parallel (pytest-xdist `-n auto`) over everything NOT marked
        #     `serial` — the bulk of the suite, ~3-4x faster than serial.
        #  2. Serial over `serial`-marked tests (timing- or shared-external-
        #     state-sensitive: real Redis DB 1 keys, uncontended wall-clock
        #     assertions — see the `serial` marker in pyproject.toml). Running
        #     them with no concurrent workers removes the cross-worker races.
        # `&&` fails the step if the parallel pass fails; coverage from the
        # parallel pass is appended to by the serial pass before reporting.
        # tests/performance/ is excluded here; the dedicated `performance` job
        # below runs it with its own Redis isolation and regression baseline.
        #
        # --timeout=180 --timeout-method=thread: if any single test exceeds 180s
        # (no legit test runs that long), pytest-timeout dumps all thread stacks
        # and fails — NAMING the hung test instead of stalling the job. `thread`
        # is the xdist-safe method (works inside parallel workers).
        run: |
          pytest tests/ --ignore=tests/performance -n auto -m "not serial" \
            --timeout=180 --timeout-method=thread \
            -q --cov=shared --cov=services --cov=domains --cov-report= && \
          pytest tests/ --ignore=tests/performance -m serial \
            --timeout=180 --timeout-method=thread \
            -q --cov=shared --cov=services --cov=domains --cov-append \
            --cov-report=xml --cov-report=term-missing
        env:
          REDIS_URL: redis://localhost:6379/1
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install ruff black

      - name: Run ruff
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Check formatting with black
        run: black --check --diff .
        continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy types-redis types-requests

      - name: Run mypy
        run: mypy shared/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  performance:
    runs-on: ubuntu-latest
    # Run on PRs to main and weekly schedule
    if: github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.base_ref == 'main')

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install prometheus-client pytest-json-report

      - name: Run performance tests
        run: |
          pytest tests/performance/ -v -s --json-report --json-report-file=tests/performance/current.json
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Check for performance regressions
        # Thresholds tuned for shared GitHub-hosted runner variance: only a
        # >=2x slowdown fails the build; 1.5x-2x is an informational warning
        # (non-fatal); tests under 50ms are exempt (their wall-clock ratios are
        # noise-dominated). Baseline is regenerated on ubuntu-latest hardware.
        run: |
          python scripts/performance/check_regression.py \
            --baseline tests/performance/baselines.json \
            --current tests/performance/current.json \
            --warning-threshold 1.5 \
            --error-threshold 2.0 \
            --min-duration 0.05
        continue-on-error: false

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: tests/performance/current.json
          retention-days: 30
