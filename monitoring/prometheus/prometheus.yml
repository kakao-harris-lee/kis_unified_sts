# Prometheus Configuration
# KIS Unified Trading Platform 메트릭 수집 설정

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'kis-unified-sts'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # KIS Dashboard API 메트릭 (compose network; legacy services/api gateway 통합됨).
  # Caddy 가 /metrics 를 dashboard 로 라우팅하지만, 같은 네트워크의 Prometheus 는
  # dashboard:8001 을 직접 스크랩한다. 호스트에서 대시보드를 띄우면
  # host.docker.internal:8001 로 바꾼다.
  - job_name: 'kis-dashboard'
    static_configs:
      - targets: ['dashboard:8001']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    honor_labels: true

  # Trading Orchestrator 메트릭 (호스트에서 실행 중)
  - job_name: 'trading-stock'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          asset: 'stock'
    scrape_interval: 5s
    scrape_timeout: 5s

  - job_name: 'trading-futures'
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          asset: 'futures'
    scrape_interval: 5s
    scrape_timeout: 5s

  # Redis 메트릭 (Redis Exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Redis Stream Exporter (stream -> Prometheus bridge)
  - job_name: 'stream-exporter'
    static_configs:
      - targets: ['host.docker.internal:9093']
    scrape_interval: 2s
    scrape_timeout: 2s
