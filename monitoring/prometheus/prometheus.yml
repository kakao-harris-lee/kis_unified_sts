# Prometheus Configuration
# KIS Unified Trading Platform 메트릭 수집 설정

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'kis-unified-sts'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # KIS Trading API 메트릭 (호스트에서 실행 중)
  - job_name: 'kis-trading-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    honor_labels: true

  # Trading Orchestrator 메트릭 (호스트에서 실행 중)
  - job_name: 'trading-stock'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          asset: 'stock'
    scrape_interval: 5s
    scrape_timeout: 5s

  - job_name: 'trading-futures'
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          asset: 'futures'
    scrape_interval: 5s
    scrape_timeout: 5s

  # Redis 메트릭 (Redis Exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
