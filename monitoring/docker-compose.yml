# Monitoring Stack for KIS Unified Trading Platform
# Prometheus + Grafana + Redis Exporter
#
# Usage:
#   cd monitoring && docker compose up -d
#   docker compose -f monitoring/docker-compose.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: sts-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - monitoring_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sts-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - monitoring_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: sts-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  monitoring_prometheus_data:
    external: true
  monitoring_grafana_data:
    external: true
