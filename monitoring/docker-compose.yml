# Monitoring Stack for KIS Unified Trading Platform
# Prometheus + Grafana + Redis Exporter
#
# Usage:
#   cd monitoring && docker compose up -d
#   docker compose -f monitoring/docker-compose.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: sts-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - monitoring_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sts-grafana
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    volumes:
      - monitoring_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: sts-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=${MONITORING_REDIS_ADDR:-host.docker.internal:6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  stream-exporter:
    build:
      context: ..
      dockerfile: Dockerfile.stream_exporter
    container_name: sts-stream-exporter
    restart: unless-stopped
    network_mode: host
    command: ["python", "/app/services/monitoring/stream_exporter.py"]
    environment:
      - REDIS_HOST=${MONITORING_STREAM_EXPORTER_REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${MONITORING_STREAM_EXPORTER_REDIS_PORT:-6379}
      - REDIS_DB=${MONITORING_STREAM_EXPORTER_REDIS_DB:-1}
      - REDIS_PASSWORD=${MONITORING_STREAM_EXPORTER_REDIS_PASSWORD:-}
      - STREAM_EXPORTER_PORT=9093
      - STREAM_EXPORTER_STREAMS=market:ticks,raw_data
      - STREAM_EXPORTER_READ_COUNT=200
      - STREAM_EXPORTER_BLOCK_MS=1000
      - STREAM_EXPORTER_SYMBOL_TTL_SECONDS=1800
      - STREAM_EXPORTER_MAX_SYMBOLS_PER_ASSET=60

volumes:
  monitoring_prometheus_data:
    external: true
  monitoring_grafana_data:
    external: true
