# Grafana Datasource Provisioning
# Prometheus + ClickHouse 데이터소스 자동 프로비저닝

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.40.0"

  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: true
    jsonData:
      host: localhost
      port: 9000
      protocol: native
      defaultDatabase: kospi
      username: default
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
