strategy:
  name: bb_reversion_15m
  asset_class: futures
  enabled: false
  timeframe: minute
  description: 볼린저 밴드 평균회귀 선물 전략 (15분봉)
  entry:
    type: mean_reversion
    params:
      bb_period: 60
      bb_std: 1.3
      bb_touch_buffer: 1.005
      rsi_period: 17
      rsi_oversold: 30
      rsi_overbought: 88
      use_macd_filter: true
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      buy_only: true
      min_bb_bandwidth: 0.006
  exit:
    type: three_stage
    params:
      stop_loss_pct: -0.04
      take_profit_pct: 0.05
      breakeven_threshold_pct: 0.02
      trailing_stop_pct: -0.03
      session_close_time: '15:35'
  position:
    type: fixed
    params:
      contracts: 1
      max_contracts: 2
  indicators:
    bollinger_bands:
      period: 43
      std_dev: 1.4
    rsi:
      period: 16
    macd:
      fast_period: 12
      slow_period: 26
      signal_period: 9
