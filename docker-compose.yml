# KIS Unified Trading Platform - Docker Compose
# 개발/운영 환경 통합 구성

version: '3.8'

services:
  # =============================================================================
  # 트레이딩 애플리케이션
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kis-trading-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # KIS API 인증 (환경변수)
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_IS_REAL=${KIS_IS_REAL:-false}
      # API 인증
      - API_KEY=${API_KEY}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      # Telegram 알림
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Redis (선택)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # 환경
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./.cache:/app/.cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # 대시보드 API
  # =============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: kis-dashboard
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - API_KEY=${API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis (상태 캐시, 세션)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: kis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # =============================================================================
  # Prometheus (메트릭 수집)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: kis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - trading-network

  # =============================================================================
  # Grafana (대시보드)
  # =============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: kis-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      # 익명 접근 (개발용)
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading-network

# =============================================================================
# 네트워크
# =============================================================================
networks:
  trading-network:
    driver: bridge

# =============================================================================
# 볼륨
# =============================================================================
volumes:
  redis-data:
  prometheus-data:
  grafana-data:
