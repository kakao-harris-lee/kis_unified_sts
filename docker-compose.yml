# KIS Unified Trading Platform - Docker Compose
# 개발/운영 환경 통합 구성

services:
  # =============================================================================
  # 트레이딩 애플리케이션
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kis-trading-app
    restart: unless-stopped
    environment:
      # KIS API 인증 (환경변수)
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_IS_REAL=${KIS_IS_REAL:-false}
      # API 인증
      - API_KEY=${API_KEY}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - METRICS_REQUIRE_AUTH=${METRICS_REQUIRE_AUTH:-false}
      # Telegram 알림
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Redis
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_DB=1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # Redis TLS Configuration (see docs/TLS_SETUP.md)
      - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED:-false}
      - REDIS_TLS_CERT_REQS=${REDIS_TLS_CERT_REQS:-required}
      - REDIS_TLS_CA_CERTS=${REDIS_TLS_CA_CERTS:-}
      # 환경
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./.cache:/app/.cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # 대시보드 API
  # =============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: kis-dashboard
    restart: unless-stopped
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # API 인증
      - API_KEY=${API_KEY}
      # Dashboard 인증
      - DASHBOARD_REQUIRE_AUTH=${DASHBOARD_REQUIRE_AUTH:-true}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_DEV_MODE=${DASHBOARD_DEV_MODE:-false}
      # Metrics 인증
      - METRICS_REQUIRE_AUTH=${METRICS_REQUIRE_AUTH:-false}
      # Redis
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_DB=1
      # Empty default: host Redis runs without auth (production deploy). Set REDIS_PASSWORD in .env to override.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Redis TLS Configuration (see docs/TLS_SETUP.md)
      - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED:-false}
      - REDIS_TLS_CERT_REQS=${REDIS_TLS_CERT_REQS:-required}
      - REDIS_TLS_CA_CERTS=${REDIS_TLS_CA_CERTS:-}
      # Trading
      - TRADING_ASSET_CLASS=stock
      # ClickHouse
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_STOCK_DATABASE=${CLICKHOUSE_STOCK_DATABASE:-market}
      # ClickHouse TLS Configuration (see docs/TLS_SETUP.md)
      - CLICKHOUSE_SECURE=${CLICKHOUSE_SECURE:-false}
      - CLICKHOUSE_VERIFY_SSL=${CLICKHOUSE_VERIFY_SSL:-true}
      - CLICKHOUSE_CA_CERT=${CLICKHOUSE_CA_CERT:-}
      # 환경
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Strategy Builder UI (visual strategy builder, Next.js)
  # =============================================================================
  strategy-builder-ui:
    build:
      context: .
      dockerfile: Dockerfile.strategy_builder_ui
    container_name: kis-strategy-builder-ui
    restart: unless-stopped
    # External access goes through caddy on host port 5080. Bind 3100 to
    # 127.0.0.1 so a local operator can still hit Next.js directly without
    # exposing it on the public interface.
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - KIS_BUILDER_API_BASE=http://dashboard:8001
      - KIS_BUILDER_API_KEY=${DASHBOARD_API_KEY:-}
    depends_on:
      dashboard:
        condition: service_healthy
    # Healthcheck mirrors the Dockerfile so docker-compose can express
    # dependency ordering on it (caddy depends_on service_healthy).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Caddy reverse proxy — single external entry on host port 5080.
  # Routes /builder, /execute, /_next/*, /api/kis-builder/* → strategy-builder-ui:3100.
  # Everything else → dashboard:8001 (Vite SPA + FastAPI).
  # HTTP-only; operator constraint allows only port 5080 externally.
  # =============================================================================
  caddy:
    image: caddy:2
    container_name: kis-caddy
    restart: unless-stopped
    ports:
      - "5080:5080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      dashboard:
        condition: service_healthy
      strategy-builder-ui:
        condition: service_healthy
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Forecasting daemon (HAR-RV vol + event impact scoring)
  # =============================================================================
  forecasting:
    build:
      context: .
      dockerfile: Dockerfile.forecasting
    container_name: kis-forecasting
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_DB=1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_STOCK_DATABASE=kospi
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis (상태 캐시, 세션)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: kis-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$${REDIS_PASSWORD:-changeme} redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # =============================================================================
  # Prometheus (메트릭 수집)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: kis-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - trading-network

  # =============================================================================
  # Redis Stream Exporter (Redis Stream -> Prometheus)
  # =============================================================================
  stream-exporter:
    build:
      context: .
      dockerfile: Dockerfile.stream_exporter
    container_name: kis-stream-exporter
    restart: unless-stopped
    command: ["python", "/app/services/monitoring/stream_exporter.py"]
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # Redis TLS Configuration (see docs/TLS_SETUP.md)
      - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED:-false}
      - REDIS_TLS_CERT_REQS=${REDIS_TLS_CERT_REQS:-required}
      - REDIS_TLS_CA_CERTS=${REDIS_TLS_CA_CERTS:-}
      - STREAM_EXPORTER_PORT=9093
      - STREAM_EXPORTER_STREAMS=market:ticks,raw_data
      - STREAM_EXPORTER_READ_COUNT=200
      - STREAM_EXPORTER_BLOCK_MS=1000
      - STREAM_EXPORTER_SYMBOL_TTL_SECONDS=1800
      - STREAM_EXPORTER_MAX_SYMBOLS_PER_ASSET=60
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-network

# =============================================================================
# 네트워크
# =============================================================================
networks:
  trading-network:
    driver: bridge

# =============================================================================
# 볼륨
# =============================================================================
volumes:
  redis-data:
  prometheus-data:
  caddy-data:
  caddy-config:
