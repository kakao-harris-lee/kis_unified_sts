# KIS Unified Trading Platform - Docker Compose
# 개발/운영 환경 통합 구성

services:
  # =============================================================================
  # 트레이딩 애플리케이션
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kis-trading-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # KIS API 인증 (환경변수)
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_IS_REAL=${KIS_IS_REAL:-false}
      # API 인증
      - API_KEY=${API_KEY}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - METRICS_REQUIRE_AUTH=${METRICS_REQUIRE_AUTH:-false}
      # Telegram 알림
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Redis (선택)
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379/1}
      # 환경
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./.cache:/app/.cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # 대시보드 API
  # =============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: kis-dashboard
    restart: unless-stopped
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # API 인증
      - API_KEY=${API_KEY}
      # Dashboard 인증
      - DASHBOARD_REQUIRE_AUTH=${DASHBOARD_REQUIRE_AUTH:-true}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_DEV_MODE=${DASHBOARD_DEV_MODE:-false}
      # Metrics 인증
      - METRICS_REQUIRE_AUTH=${METRICS_REQUIRE_AUTH:-false}
      # Redis
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_DB=1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # Trading
      - TRADING_ASSET_CLASS=stock
      # ClickHouse
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_STOCK_DATABASE=${CLICKHOUSE_STOCK_DATABASE:-market}
      # 환경
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis (상태 캐시, 세션)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: kis-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD:-changeme} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # =============================================================================
  # Prometheus (메트릭 수집)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: kis-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - trading-network

  # =============================================================================
  # Grafana (대시보드)
  # =============================================================================
  # SECURITY WARNING: Default admin/admin credentials are insecure!
  # Set GRAFANA_ADMIN_PASSWORD to a strong password (16+ chars) in production.
  grafana:
    image: grafana/grafana:10.2.0
    container_name: kis-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clickhouse-datasource
      # 익명 접근 (개발용)
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading-network

  # =============================================================================
  # Redis Stream Exporter (Redis Stream -> Prometheus)
  # =============================================================================
  stream-exporter:
    build:
      context: .
      dockerfile: Dockerfile.stream_exporter
    container_name: kis-stream-exporter
    restart: unless-stopped
    command: ["python", "/app/services/monitoring/stream_exporter.py"]
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - STREAM_EXPORTER_PORT=9093
      - STREAM_EXPORTER_STREAMS=market:ticks,raw_data
      - STREAM_EXPORTER_READ_COUNT=200
      - STREAM_EXPORTER_BLOCK_MS=1000
      - STREAM_EXPORTER_SYMBOL_TTL_SECONDS=1800
      - STREAM_EXPORTER_MAX_SYMBOLS_PER_ASSET=60
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-network

# =============================================================================
# 네트워크
# =============================================================================
networks:
  trading-network:
    driver: bridge

# =============================================================================
# 볼륨
# =============================================================================
volumes:
  redis-data:
  prometheus-data:
  grafana-data:
