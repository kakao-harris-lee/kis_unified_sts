# KIS Unified Trading Platform - Docker Compose
# 개발/운영 환경 통합 구성

# NOTE: REDIS_PASSWORD uses ${VAR-default} (no colon) on purpose — an explicitly
# empty REDIS_PASSWORD must pass through as "no auth" (e.g. the paper stack points
# at a password-less host redis via host.docker.internal). With ${VAR:-default} an
# empty value would become "changeme" and AUTH would fail against that server.
# Unset still defaults to changeme. Do NOT re-add the colon.
x-redis-runtime-env: &redis-runtime-env
  REDIS_HOST: "${REDIS_HOST:-redis}"
  REDIS_PORT: "${REDIS_PORT:-6379}"
  REDIS_DB: "${REDIS_DB:-1}"
  REDIS_STOCK_DB: "${REDIS_STOCK_DB:-1}"
  REDIS_FUTURES_DB: "${REDIS_FUTURES_DB:-1}"
  REDIS_SYSTEM_DB: "${REDIS_SYSTEM_DB:-1}"
  REDIS_PASSWORD: "${REDIS_PASSWORD-changeme}"
  REDIS_URL: "${REDIS_URL:-redis://:${REDIS_PASSWORD-changeme}@redis:6379/1}"
  REDIS_TLS_ENABLED: "${REDIS_TLS_ENABLED:-false}"
  REDIS_TLS_CERT_REQS: "${REDIS_TLS_CERT_REQS:-required}"
  REDIS_TLS_CA_CERTS: "${REDIS_TLS_CA_CERTS:-}"

x-runtime-storage-env: &runtime-storage-env
  ENVIRONMENT: "${ENVIRONMENT:-dev}"
  RUNTIME_STORAGE_BACKEND: "${RUNTIME_STORAGE_BACKEND:-sqlite}"
  RUNTIME_STORAGE_SQLITE_PATH: "${RUNTIME_STORAGE_SQLITE_PATH:-data/runtime/dev/runtime.db}"
  RUNTIME_STORAGE_SQLITE_WAL: "${RUNTIME_STORAGE_SQLITE_WAL:-true}"
  RUNTIME_STORAGE_SQLITE_BUSY_TIMEOUT_MS: "${RUNTIME_STORAGE_SQLITE_BUSY_TIMEOUT_MS:-5000}"
  RUNTIME_STORAGE_SQLITE_SYNCHRONOUS: "${RUNTIME_STORAGE_SQLITE_SYNCHRONOUS:-NORMAL}"
  MARKET_DATA_SOURCE: "${MARKET_DATA_SOURCE:-parquet}"
  MARKET_DATA_PARQUET_ROOT: "${MARKET_DATA_PARQUET_ROOT:-data/market}"
  DASHBOARD_TRADE_STATS_SOURCE: "${DASHBOARD_TRADE_STATS_SOURCE:-runtime_ledger}"

x-kis-runtime-env: &kis-runtime-env
  KIS_APP_KEY: "${KIS_APP_KEY:-}"
  KIS_APP_SECRET: "${KIS_APP_SECRET:-}"
  KIS_STOCK_APP_KEY: "${KIS_STOCK_APP_KEY:-}"
  KIS_STOCK_APP_SECRET: "${KIS_STOCK_APP_SECRET:-}"
  KIS_FUTURES_APP_KEY: "${KIS_FUTURES_APP_KEY:-}"
  KIS_FUTURES_APP_SECRET: "${KIS_FUTURES_APP_SECRET:-}"
  # Account numbers pair with the app keys — KISClient._resolve_account_no reads
  # KIS_{STOCK,FUTURES}_ACCOUNT_NO (fallback KIS_ACCOUNT_NO) and warns if absent.
  KIS_STOCK_ACCOUNT_NO: "${KIS_STOCK_ACCOUNT_NO:-}"
  KIS_FUTURES_ACCOUNT_NO: "${KIS_FUTURES_ACCOUNT_NO:-}"
  KIS_ACCOUNT_NO: "${KIS_ACCOUNT_NO:-}"
  KIS_ACCOUNT_PRODUCT_CODE: "${KIS_ACCOUNT_PRODUCT_CODE:-01}"
  KIS_IS_REAL: "${KIS_IS_REAL:-false}"
  KIS_REAL_TRADING: "${KIS_REAL_TRADING:-false}"
  KIS_MARKET: "${KIS_MARKET:-mock}"
  KIS_STOCK_MARKET: "${KIS_STOCK_MARKET:-mock}"
  KIS_FUTURES_MARKET: "${KIS_FUTURES_MARKET:-real}"
  KIS_TOKEN_CACHE_DIR: "${KIS_TOKEN_CACHE_DIR:-/app/.cache}"

x-alert-runtime-env: &alert-runtime-env
  TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
  TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
  TELEGRAM_STOCK_BOT_TOKEN: "${TELEGRAM_STOCK_BOT_TOKEN:-}"
  TELEGRAM_STOCK_CHAT_ID: "${TELEGRAM_STOCK_CHAT_ID:-}"
  TELEGRAM_FUTURES_BOT_TOKEN: "${TELEGRAM_FUTURES_BOT_TOKEN:-}"
  TELEGRAM_FUTURES_CHAT_ID: "${TELEGRAM_FUTURES_CHAT_ID:-}"
  TELEGRAM_BRIEFING_BOT_TOKEN: "${TELEGRAM_BRIEFING_BOT_TOKEN:-}"
  TELEGRAM_BRIEFING_CHAT_ID: "${TELEGRAM_BRIEFING_CHAT_ID:-}"

x-trading-runtime-volumes: &trading-runtime-volumes
  - ./config:/app/config:ro
  - ./logs:/app/logs
  - ./.cache:/app/.cache
  - ./data/runtime:/app/data/runtime
  - ./data/market:/app/data/market:ro

x-pipeline-service: &pipeline-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes: *trading-runtime-volumes
  depends_on:
    redis:
      condition: service_healthy
  networks:
    - trading-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # =============================================================================
  # Trading loop daemon (optional profile)
  # =============================================================================
  trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-trader
    restart: unless-stopped
    profiles: ["trading"]
    command: ["bash", "scripts/docker/trading_loop_entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env, *alert-runtime-env]
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      TRADING_MODE: "${TRADING_MODE:-paper}"
      TRADING_ASSET_CLASS: "${TRADING_ASSET_CLASS:-stock}"
      TRADING_STRATEGY: "${TRADING_STRATEGY:-}"
      TRADING_INITIAL_CAPITAL: "${TRADING_INITIAL_CAPITAL:-10000000}"
      TRADING_RUN_MODE: "${TRADING_RUN_MODE:-daemon}"
      TRADING_LIVE_CONFIRM: "${TRADING_LIVE_CONFIRM:-}"
    volumes: *trading-runtime-volumes
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Futures trading loop daemon (orchestrator path; asset-pinned).
  # Mirror of `trader` but TRADING_ASSET_CLASS=futures. paper/live is the STACK
  # distinction (TRADING_MODE / KIS_REAL_TRADING), NOT hardcoded — the same
  # service runs in the paper stack and the live stack. Run both assets:
  #   docker compose --profile trading up -d trader trader-futures
  # =============================================================================
  trader-futures:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-trader-futures
    restart: unless-stopped
    profiles: ["trading"]
    command: ["bash", "scripts/docker/trading_loop_entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env, *alert-runtime-env]
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      TRADING_MODE: "${TRADING_MODE:-paper}"
      TRADING_ASSET_CLASS: "futures"
      TRADING_STRATEGY: "${FUTURES_TRADING_STRATEGY:-}"
      TRADING_INITIAL_CAPITAL: "${TRADING_INITIAL_CAPITAL:-10000000}"
      TRADING_RUN_MODE: "${TRADING_RUN_MODE:-daemon}"
      TRADING_LIVE_CONFIRM: "${TRADING_LIVE_CONFIRM:-}"
    volumes: *trading-runtime-volumes
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Stock decoupled pipeline daemons (Compose-managed M4/M5)
  # =============================================================================
  stock-market-ingest:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-market-ingest
    profiles: ["stock-ingest"]
    command: ["python", "-m", "services.market_ingest.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env]
      INGEST_ASSET: "stock"
      INGEST_MAX_SYMBOLS: "${INGEST_MAX_SYMBOLS:-40}"
      INGEST_REFRESH_SECONDS: "${INGEST_REFRESH_SECONDS:-30}"
      TRADE_TARGETS_LATEST_KEY: "${TRADE_TARGETS_LATEST_KEY:-system:trade_targets:latest}"

  stock-strategy:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-strategy
    profiles: ["stock-pipeline"]
    command: ["python", "-m", "services.stock_strategy.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env]
      STOCK_STRATEGY_DAEMON: "${STOCK_PIPELINE_MODE:-shadow}"
      STOCK_TICK_STREAM: "${STOCK_TICK_STREAM:-market:ticks}"
      STOCK_WATCHLIST_KEY: "${STOCK_WATCHLIST_KEY:-system:daily_watchlist:latest}"
      STOCK_MAX_SYMBOLS: "${STOCK_MAX_SYMBOLS:-40}"

  stock-risk-filter:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-risk-filter
    profiles: ["stock-pipeline"]
    command: ["python", "-m", "services.stock_risk_filter.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      STOCK_RISK_FILTER: "${STOCK_PIPELINE_MODE:-shadow}"
      STOCK_POSITIONS_KEY: "${STOCK_POSITIONS_KEY:-stock:daemon:positions}"

  stock-order-router:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-order-router
    profiles: ["stock-pipeline"]
    command: ["python", "-m", "services.stock_order_router.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      STOCK_ORDER_ROUTER: "${STOCK_PIPELINE_MODE:-shadow}"
      STOCK_POSITIONS_KEY: "${STOCK_POSITIONS_KEY:-stock:daemon:positions}"
      STOCK_PAPER_SLIPPAGE_RATE: "${STOCK_PAPER_SLIPPAGE_RATE:-0.0001}"

  stock-exit:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-exit
    profiles: ["stock-pipeline"]
    command: ["python", "-m", "services.stock_exit.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      STOCK_EXIT_DAEMON: "${STOCK_PIPELINE_MODE:-shadow}"
      STOCK_POSITIONS_KEY: "${STOCK_POSITIONS_KEY:-stock:daemon:positions}"
      STOCK_TICK_STREAM: "${STOCK_TICK_STREAM:-market:ticks}"
      STOCK_EXIT_INTERVAL: "${STOCK_EXIT_INTERVAL:-5}"
      STOCK_PAPER_SLIPPAGE_RATE: "${STOCK_PAPER_SLIPPAGE_RATE:-0.0001}"

  stock-monitor:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stock-monitor
    profiles: ["stock-pipeline"]
    command: ["python", "-m", "services.stock_monitor.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *alert-runtime-env]
      STOCK_MONITOR_DAEMON: "${STOCK_PIPELINE_MODE:-shadow}"
      STOCK_POSITIONS_KEY: "${STOCK_POSITIONS_KEY:-stock:daemon:positions}"
      STOCK_TICK_STREAM: "${STOCK_TICK_STREAM:-market:ticks}"
      STOCK_MONITOR_STATUS_INTERVAL: "${STOCK_MONITOR_STATUS_INTERVAL:-5}"
      STOCK_MONITOR_SIGNAL_META_MAX: "${STOCK_MONITOR_SIGNAL_META_MAX:-1000}"
      TRADING_STATE_KEY_SUFFIX: "${STOCK_TRADING_STATE_KEY_SUFFIX:-}"

  # =============================================================================
  # Futures decoupled pipeline daemons (Compose-managed, DORMANT by default).
  # Profile-gated: nothing starts unless a futures-* profile is passed to
  # `docker compose up`. Modes default to the SAFE end (shadow / paper). Cutover
  # is operator-gated (Phase-5 Gate 1-3 + written approval) — see
  # docs/runbooks/futures-pipeline-cutover-f9.md. Double-trade guard: set
  # FUTURES_ORCHESTRATOR_ENABLED=false on trader-futures at cutover.
  #
  #   Shadow run (reuses trader-futures' raw_data; NO ingest):
  #     docker compose --profile futures-pipeline up -d \
  #       futures-decision-engine futures-risk-filter futures-order-router futures-monitor
  #   Cutover (live): also bring up futures-ingest + futures-killswitch and set
  #     FUTURES_PIPELINE_MODE=live FUTURES_ORDER_ROUTER_MODE=live.
  # =============================================================================
  futures-market-ingest:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-market-ingest
    profiles: ["futures-ingest"]
    command: ["python", "-m", "services.market_ingest.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env]
      INGEST_ASSET: "futures"
      INGEST_REFRESH_SECONDS: "${FUTURES_INGEST_REFRESH_SECONDS:-3600}"

  futures-decision-engine:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-decision-engine
    profiles: ["futures-pipeline"]
    command: ["python", "-m", "services.decision_engine.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      FUTURES_STRATEGY_DAEMON: "${FUTURES_PIPELINE_MODE:-shadow}"
      FUTURES_STRATEGY_SYMBOL: "${FUTURES_STRATEGY_SYMBOL:-}"
      FUTURES_TICK_STREAM: "${FUTURES_TICK_STREAM:-raw_data}"

  futures-risk-filter:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-risk-filter
    profiles: ["futures-pipeline"]
    command: ["python", "-m", "services.risk_filter.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      FUTURES_RISK_FILTER: "${FUTURES_PIPELINE_MODE:-shadow}"

  futures-order-router:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-order-router
    profiles: ["futures-pipeline"]
    command: ["python", "-m", "services.order_router.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *kis-runtime-env]
      FUTURES_ORDER_ROUTER: "${FUTURES_ORDER_ROUTER_MODE:-paper}"
      # Executor real/paper gate (config/execution.yaml::execution.trading_mode
      # reads ${TRADING_MODE}). Dedicated knob, safe default PAPER — distinct from
      # the orchestrator's paper/live TRADING_MODE space (executor enum is
      # PAPER/MOCK/REAL). LIVE order placement requires FUTURES_EXECUTOR_TRADING_MODE=REAL.
      TRADING_MODE: "${FUTURES_EXECUTOR_TRADING_MODE:-PAPER}"

  futures-monitor:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-monitor
    profiles: ["futures-pipeline"]
    command: ["python", "-m", "services.futures_monitor.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *alert-runtime-env]
      FUTURES_MONITOR_DAEMON: "${FUTURES_PIPELINE_MODE:-shadow}"
      FUTURES_MONITOR_STATUS_INTERVAL: "${FUTURES_MONITOR_STATUS_INTERVAL:-5}"
      FUTURES_TICK_STREAM: "${FUTURES_TICK_STREAM:-raw_data}"

  futures-kill-switch:
    <<: *pipeline-service
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-futures-kill-switch
    profiles: ["futures-killswitch"]
    command: ["python", "-m", "services.kill_switch.main"]
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env, *alert-runtime-env]
      KIS_FUTURES_EQUITY_KRW: "${KIS_FUTURES_EQUITY_KRW:-100000000}"

  # =============================================================================
  # 대시보드 API
  # =============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-dashboard
    restart: unless-stopped
    expose:
      - "8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      API_KEY: "${API_KEY:-}"
      DASHBOARD_REQUIRE_AUTH: "${DASHBOARD_REQUIRE_AUTH:-true}"
      DASHBOARD_API_KEY: "${DASHBOARD_API_KEY:-}"
      DASHBOARD_DEV_MODE: "${DASHBOARD_DEV_MODE:-false}"
      METRICS_REQUIRE_AUTH: "${METRICS_REQUIRE_AUTH:-false}"
      TRADING_ASSET_CLASS: "${TRADING_ASSET_CLASS:-stock}"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports:ro
      - ./data/runtime:/app/data/runtime
      - ./data/market:/app/data/market:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Strategy Builder UI (visual strategy builder, Next.js)
  # =============================================================================
  strategy-builder-ui:
    build:
      context: .
      dockerfile: Dockerfile.strategy_builder_ui
      args:
        NEXT_PUBLIC_API_KEY: "${NEXT_PUBLIC_API_KEY:-${DASHBOARD_API_KEY:-}}"
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-strategy-builder-ui
    restart: unless-stopped
    # External access goes through caddy on host port 5080. Port 3100 is
    # container-internal only and must not be published on the host.
    expose:
      - "3100"
    environment:
      - KIS_BUILDER_API_BASE=http://dashboard:8001
      - KIS_BUILDER_API_KEY=${DASHBOARD_API_KEY:-}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY:-${DASHBOARD_API_KEY:-}}
    depends_on:
      dashboard:
        condition: service_healthy
    # Healthcheck mirrors the Dockerfile so docker-compose can express
    # dependency ordering on it (caddy depends_on service_healthy).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Caddy reverse proxy — single external entry on host port 5080.
  # STS API → dashboard:8001 (FastAPI, API-only): /api/kis-builder/*,
  #   /api/{trading,signals,trades,strategies,strategy-lab,strategy-builder,
  #   metrics,health}*, plus /health, /docs, /openapi.json, /redoc, /metrics.
  # Everything else → strategy-builder-ui:3100 (Next.js): UI pages, /_next/*,
  #   and the upstream-compat
  #   /api/{auth,account,orders,market,symbols,files,experiments} proxy handled
  #   by the Next.js catch-all.
  # HTTP-only; operator constraint allows only port 5080 externally.
  # =============================================================================
  caddy:
    image: caddy:2
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-caddy
    restart: unless-stopped
    ports:
      - "${DASHBOARD_HOST_PORT:-5080}:5080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      dashboard:
        condition: service_healthy
      strategy-builder-ui:
        condition: service_healthy
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Forecasting daemon (HAR-RV vol + event impact scoring)
  # =============================================================================
  forecasting:
    build:
      context: .
      dockerfile: Dockerfile.forecasting
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-forecasting
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: [*redis-runtime-env, *runtime-storage-env]
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data/runtime:/app/data/runtime
      - ./data/market:/app/data/market:ro
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis (상태 캐시, 세션)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD-changeme}"
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - "${REDIS_PASSWORD-changeme}"
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$${REDIS_PASSWORD-changeme} redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # =============================================================================
  # Prometheus (메트릭 수집)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - trading-network

  # =============================================================================
  # Redis Stream Exporter (Redis Stream -> Prometheus)
  # =============================================================================
  stream-exporter:
    build:
      context: .
      dockerfile: Dockerfile.stream_exporter
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-stream-exporter
    restart: unless-stopped
    command: ["python", "/app/services/monitoring/stream_exporter.py"]
    ports:
      - "127.0.0.1:${STREAM_EXPORTER_HOST_PORT:-9093}:9093"
    environment:
      <<: *redis-runtime-env
      STREAM_EXPORTER_PORT: "9093"
      STREAM_EXPORTER_STREAMS: "market:ticks,raw_data"
      STREAM_EXPORTER_READ_COUNT: "200"
      STREAM_EXPORTER_BLOCK_MS: "1000"
      STREAM_EXPORTER_SYMBOL_TTL_SECONDS: "1800"
      STREAM_EXPORTER_MAX_SYMBOLS_PER_ASSET: "60"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-network

  # =============================================================================
  # MLflow (실험 추적 UI 서버 — sqlite backend + 로컬 아티팩트)
  # =============================================================================
  # UI-only over the shared store: the app clients (shared/backtest/mlflow_tracker.py,
  # cli `sts mlflow`, scripts/optimize_strategies.py) WRITE directly to
  # ./mlflow.db via `sqlite:///mlflow.db` — they do not route writes through this
  # server. This container serves the browse UI over that same store. Routing
  # client writes through the server (set MLFLOW_TRACKING_URI + `--serve-artifacts`
  # proxy + migrate existing absolute artifact URIs) is a separate follow-up.
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: ${COMPOSE_PROJECT_NAME:-kis}-mlflow
    restart: unless-stopped
    profiles: ["research"]
    ports:
      # localhost-bound (dev/ops tool); browse at http://localhost:5000
      - "127.0.0.1:${MLFLOW_HOST_PORT:-5000}:5000"
    # ${PWD} = repo root (run `docker compose` from here). Existing runs store
    # ABSOLUTE artifact paths in mlflow.db (e.g.
    # /home/.../kis_unified_sts/mlruns/<id>/...), so mlruns must be mounted at
    # that same absolute path — and the artifact root must match it — or the UI
    # cannot resolve artifacts (figures, trades.csv, models). A plain `:/mlruns`
    # mount silently breaks artifact display.
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow.db
      - --default-artifact-root
      - file://${PWD}/mlruns
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    volumes:
      # mlflow.db / mlruns are gitignored runtime data and must pre-exist on the
      # host (a bind mount over a missing file/dir is created as an empty dir,
      # which breaks the sqlite backend). `make` target / runbook ensures this.
      - ./mlflow.db:/mlflow.db
      - ./mlruns:${PWD}/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 20s
    networks:
      - trading-network

# =============================================================================
# 네트워크
# =============================================================================
networks:
  trading-network:
    driver: bridge

# =============================================================================
# 볼륨
# =============================================================================
volumes:
  redis-data:
  prometheus-data:
  caddy-data:
  caddy-config:
